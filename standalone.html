r (let i = 0; i < state.spawnRate; i += 1) {\n      const qfi = flows[Math.floor(Math.random() * flows.length)].qfi;\n      spawnPacket(qfi);\n    }\n    render();\n  }\n\n  function startTimer() {\n    stopTimer();\n    state.timer = window.setInterval(tick, 900);\n  }\n\n  function stopTimer() {\n    if (state.timer) {\n      window.clearInterval(state.timer);\n      state.timer = null;\n      state.running = false;\n    }\n  }\n\n  function render() {\n    root.innerHTML = `\n      <style>\n        .sdap-demo h2 { margin:0; font-size:28px; }\n        .sdap-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .sdap-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .sdap-card h3 { margin:0 0 6px; font-size:17px; color:#1d2c3f; }\n        .sdap-lanes { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:10px; align-items:start; }\n        @media (max-width: 760px) { .sdap-lanes { grid-template-columns:1fr; } }\n        .sdap-col h4 { margin:0 0 8px; font-size:14px; color:#35475d; }\n        .flow-row, .drb-row { display:grid; gap:8px; }\n        .flow-item {\n          padding:10px 12px; border-radius:8px; border:2px solid #d6dfec;\n          display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center;\n          background:#fff; cursor:pointer;\n          transition:transform 150ms ease, border-color 150ms ease;\n        }\n        .flow-item:hover { transform:translateY(-1px); }\n        .flow-item .dot { width:14px; height:14px; border-radius:50%; }\n        .flow-item b { font-size:13px; }\n        .flow-item small { font-size:11px; color:#607083; font-weight:900; }\n        .flow-item .badge { padding:3px 6px; border-radius:4px; background:#eef3fa; font-size:11px; font-weight:900; color:#35475d; }\n        .drb-item {\n          padding:10px 12px; border-radius:8px; border:2px solid;\n          display:grid; gap:8px; min-height:90px; background:#fbfdff;\n        }\n        .drb-item header { display:flex; justify-content:space-between; align-items:center; font-weight:900; font-size:13px; }\n        .drb-item .chips { display:flex; flex-wrap:wrap; gap:4px; min-height:24px; }\n        .drb-chip {\n          min-width:36px; height:24px; display:grid; place-items:center;\n          border-radius:4px; color:#fff; font-size:11px; font-weight:900;\n          animation:slideIn 260ms ease;\n        }\n        @keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }\n        .sdap-log {\n          margin-top:10px; padding:10px 12px; font-family:Consolas, monospace; font-size:12px;\n          background:#101722; color:#8ff0ad; border-radius:8px; min-height:100px; max-height:180px; overflow:auto;\n          line-height:1.55;\n        }\n        .sdap-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }\n        .sdap-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:8px; margin-top:8px; }\n        .sdap-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:12px; }\n      </style>\n\n      <div class=\"vis-panel sdap-demo\">\n        <section>\n          <h2>SDAP: QoS Flow를 DRB와 코어망 경로로 매핑</h2>\n          <p class=\"hint\">코어망은 각 IP 트래픽에 QFI(QoS Flow Identifier)를 붙여 보냅니다. SDAP은 QFI와 대응되는 5QI(지연·손실·GBR 요구)를 참조해 적절한 DRB(Data Radio Bearer)로 분류합니다.</p>\n        </section>\n\n        <section class=\"sdap-card\">\n          <div class=\"sdap-row\">\n            <button class=\"vis-button primary\" data-action=\"spawn\" type=\"button\">선택한 Flow 패킷 1개 주입</button>\n            <button class=\"vis-button green\" data-action=\"run\" type=\"button\">${state.running ? \"⏸ 자동 트래픽 정지\" : \"▶ 자동 트래픽\"}</button>\n            <button class=\"vis-button\" data-action=\"clear\" type=\"button\">⟳ 큐 비우기</button>\n          </div>\n          <div class=\"sdap-controls\">\n            <label>수동 주입 Flow:\n              <select data-control=\"selectedFlow\">\n                ${flows.map((f) => `<option value=\"${f.qfi}\" ${state.selectedFlow === f.qfi ? \"selected\" : \"\"}>QFI ${f.qfi} · ${f.label}</option>`).join(\"\")}\n              </select>\n            </label>\n            <label>자동 트래픽 속도: <b>${state.spawnRate} pkt/tick</b>\n              <input type=\"range\" min=\"1\" max=\"4\" step=\"1\" value=\"${state.spawnRate}\" data-control=\"spawnRate\"/>\n            </label>\n          </div>\n\n          <div class=\"sdap-lanes\">\n            <div class=\"sdap-col\">\n              <h4>QoS Flow (코어망 → gNB)</h4>\n              <div class=\"flow-row\">\n                ${flows.map((f) => `\n                  <div class=\"flow-item\" style=\"border-color:${f.color}\" data-spawn=\"${f.qfi}\">\n                    <span class=\"dot\" style=\"background:${f.color}\"></span>\n                    <div>\n                      <b>QFI ${f.qfi} · ${f.label}</b><br>\n                      <small>5QI ${f.fiveQi} · ${f.gbr ? \"GBR\" : \"non-GBR\"} · 지연 ≤ ${f.latency}ms</small>\n                    </div>\n                    <span class=\"badge\">→ ${(drbs.find((d) => d.accept.includes(f.qfi)) || drbs[drbs.length - 1]).id}</span>\n                  </div>\n                `).join(\"\")}\n              </div>\n            </div>\n\n            <div class=\"sdap-col\">\n              <h4>DRB (RLC/MAC 계층으로 전달)</h4>\n              <div class=\"drb-row\">\n                ${drbs.map((d) => `\n                  <div class=\"drb-item\" style=\"border-color:${d.color}\">\n                    <header>\n                      <span style=\"color:${d.color}\">${d.label}</span>\n                      <small>대기: ${d.queue.length}개</small>\n                    </header>\n                    <div class=\"chips\">\n                      ${d.queue.map((p) => `<span class=\"drb-chip\" style=\"background:${p.color}\">Q${p.qfi}·#${p.id}</span>`).join(\"\")}\n                    </div>\n                  </div>\n                `).join(\"\")}\n              </div>\n            </div>\n          </div>\n\n          <div class=\"sdap-log\">${state.log.length === 0 ? \"(아직 로그가 없습니다)\" : state.log.join(\"\\n\")}</div>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-spawn]\").forEach((el) => {\n      el.addEventListener(\"click\", () => {\n        state.selectedFlow = Number(el.dataset.spawn);\n        spawnPacket(state.selectedFlow);\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"spawn\"]')?.addEventListener(\"click\", () => {\n      spawnPacket(state.selectedFlow);\n      render();\n    });\n    root.querySelector('[data-action=\"run\"]')?.addEventListener(\"click\", () => {\n      state.running = !state.running;\n      if (state.running) startTimer();\n      else stopTimer();\n      render();\n    });\n    root.querySelector('[data-action=\"clear\"]')?.addEventListener(\"click\", () => {\n      drbs.forEach((d) => { d.queue.length = 0; });\n      state.log = [];\n      render();\n    });\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(el.tagName === \"SELECT\" ? \"change\" : \"input\", (e) => {\n        const key = el.dataset.control;\n        state[key] = el.tagName === \"SELECT\" ? Number(e.target.value) : Number(e.target.value);\n        render();\n      });\n    });\n  }\n\n  render();\n  return () => stopTimer();\n}\n", "semcom/semcom_overview.js": "export const metadata = {\n  title: \"Semantic Communication Explorer\",\n};\n\nconst blocks = [\n  {\n    id: \"encoder\",\n    side: \"Tx\",\n    role: \"의미 추출\",\n    title: \"sLLM Encoder\",\n    subtitle: \"문장·이미지 → 핵심 토큰\",\n    accent: \"#6b43bd\",\n    file: \"semcom/semantic_encoder.js\",\n    brief: \"소형 LLM이 원본 메시지에서 의미를 담은 토큰만 추출합니다. 단어를 글자 단위 비트로 보내지 않고 '개념' 단위로 압축합니다.\",\n    feature: \"전통 통신은 모든 비트를 동등하게 취급하지만, sLLM Encoder는 의미적으로 중요한 토큰에 가중치를 두어 전송 대역폭을 극적으로 줄입니다.\",\n    io: [\"원본 문장/이미지\", \"토큰 시퀀스\"],\n  },\n  {\n    id: \"vq\",\n    side: \"Tx\",\n    role: \"디지털 변환\",\n    title: \"Vector Quantization\",\n    subtitle: \"연속 임베딩 → 코드북 인덱스\",\n    accent: \"#1a8a9d\",\n    file: \"semcom/vector_quantization.js\",\n    brief: \"임베딩 벡터를 가장 가까운 코드북 중심점의 인덱스로 매핑해 기존 디지털 통신망(비트)과 호환되게 만듭니다.\",\n    feature: \"VQ는 AI의 연속 벡터 출력을 기존 5G/LTE 모뎀이 받아들일 수 있는 이산 비트열로 변환하는 브리지 계층입니다.\",\n    io: [\"임베딩 벡터\", \"코드북 인덱스 · 비트\"],\n  },\n  {\n    id: \"world\",\n    side: \"Tx\",\n    role: \"예측 전송\",\n    title: \"World Model\",\n    subtitle: \"채널 예측 + 전송 전략\",\n    accent: \"#c86414\",\n    file: \"semcom/world_model_channel.js\",\n    brief: \"채널 상태·UE 이동성·간섭을 예측해 변조 방식, 코드율, 토큰 우선순위를 실시간으로 조정합니다.\",\n    feature: \"중요한 의미 토큰은 낮은 변조·강한 FEC로, 부가 토큰은 더 효율적인 모드로 보내는 Unequal Error Protection을 가능하게 합니다.\",\n    io: [\"채널 피드백\", \"변조 · 코드율 · 토큰 우선순위\"],\n  },\n  {\n    id: \"channel\",\n    side: \"Channel\",\n    role: \"무선 채널\",\n    title: \"기존 RAN 파이프라인\",\n    subtitle: \"FEC · 변조 · 채널 · 복조\",\n    accent: \"#245fd6\",\n    file: null,\n    brief: \"LDPC 부호화 → QAM 변조 → 무선 채널(페이딩·잡음) → 복조 → 디스크램블링 등 5G NR Uplink 과정을 그대로 통과합니다.\",\n    feature: \"Semantic Communication은 기존 통신 스택을 버리지 않고 그 위에 의미 계층을 덧씌우는 하이브리드 구조입니다.\",\n    io: [\"비트열\", \"수신 비트 (일부 오류 포함)\"],\n  },\n  {\n    id: \"decoder\",\n    side: \"Rx\",\n    role: \"지능형 복원\",\n    title: \"sLLM Decoder + KB\",\n    subtitle: \"손상 비트 → 의미 추론\",\n    accent: \"#11865a\",\n    file: \"semcom/semantic_decoder.js\",\n    brief: \"수신한 코드북 인덱스가 일부 깨져도 Knowledge Base의 문맥과 의미 유사도로 원래 토큰을 유추해 복원합니다.\",\n    feature: \"기존 통신의 CRC FAIL은 곧 재전송이지만, Semantic 복호기는 손상된 비트로도 KB 사전에서 가장 그럴듯한 의미를 찾아냅니다.\",\n    io: [\"노이즈 섞인 인덱스\", \"복원된 의미\"],\n  },\n  {\n    id: \"compare\",\n    side: \"Benchmark\",\n    role: \"비교 실험\",\n    title: \"Bit-Com vs Sem-Com\",\n    subtitle: \"동일 SNR에서 두 방식 비교\",\n    accent: \"#c93e7a\",\n    file: \"semcom/semcom_vs_bitcom.js\",\n    brief: \"같은 문장과 같은 채널 잡음 조건에서 전통 통신과 시맨틱 통신의 성능을 나란히 비교합니다.\",\n    feature: \"BER은 비트 오류율만 측정하지만, Semantic Similarity는 의미 유사도를 측정합니다. 이 두 지표의 차이가 semcom의 핵심 가치입니다.\",\n    io: [\"원본 메시지\", \"BER · Semantic Similarity\"],\n  },\n];\n\nexport function mount(root) {\n  let activeId = \"encoder\";\n  let cleanupSub = null;\n  let journeyTimer = null;\n  let journeyStage = 0;\n  let journeyPlaying = true;\n\n  const TOTAL_STAGES = 5;\n\n  function byId(id) {\n    return blocks.find((b) => b.id === id);\n  }\n\n  function startJourney() {\n    stopJourney();\n    journeyTimer = window.setInterval(() => {\n      journeyStage = (journeyStage + 1) % TOTAL_STAGES;\n      updateJourney();\n    }, 2200);\n  }\n\n  function stopJourney() {\n    if (journeyTimer) {\n      window.clearInterval(journeyTimer);\n      journeyTimer = null;\n    }\n  }\n\n  function setJourneyStage(n) {\n    journeyStage = ((n % TOTAL_STAGES) + TOTAL_STAGES) % TOTAL_STAGES;\n    updateJourney();\n  }\n\n  function updateJourney() {\n    const indicator = root.querySelector(\".journey-indicator\");\n    if (indicator) indicator.textContent = `Step ${journeyStage + 1} / ${TOTAL_STAGES}`;\n    root.querySelectorAll(\"[data-stage-col]\").forEach((el) => {\n      const s = Number(el.dataset.stageCol);\n      el.classList.toggle(\"active\", s === journeyStage);\n      el.classList.toggle(\"past\", s < journeyStage);\n    });\n    const playBtn = root.querySelector('[data-journey=\"play\"]');\n    if (playBtn) playBtn.textContent = journeyPlaying ? \"⏸ 자동\" : \"▶ 자동\";\n  }\n\n  async function loadSub() {\n    const sel = byId(activeId);\n    const panel = root.querySelector(\"#semMount\");\n    const title = root.querySelector(\"#semTitle\");\n    const meta = root.querySelector(\"#semMeta\");\n    const brief = root.querySelector(\"#semBrief\");\n    const feature = root.querySelector(\"#semFeature\");\n    const io = root.querySelector(\"#semIO\");\n\n    title.textContent = sel.title;\n    meta.textContent = `${sel.side} · ${sel.role} · ${sel.subtitle}`;\n    brief.textContent = sel.brief;\n    feature.textContent = sel.feature;\n    io.innerHTML = `<span>입력: ${sel.io[0]}</span><b>→</b><span>출력: ${sel.io[1]}</span>`;\n\n    if (typeof cleanupSub === \"function\") {\n      cleanupSub();\n      cleanupSub = null;\n    }\n\n    root.querySelectorAll(\"[data-block]\").forEach((el) => {\n      el.classList.toggle(\"active\", el.dataset.block === activeId);\n    });\n\n    if (!sel.file) {\n      panel.innerHTML = `\n        <div class=\"sub-placeholder\">\n          <strong>${sel.title}</strong>\n          <p>${sel.brief}</p>\n          <p style=\"color:var(--muted);font-size:13px\">이 블록은 기존 5G NR Uplink 파이프라인을 그대로 사용합니다. 세부 시뮬레이션은 <code>python main.py</code>의 Protocol Stack Explorer에서 확인할 수 있습니다.</p>\n        </div>\n      `;\n      return;\n    }\n    panel.innerHTML = '<div class=\"sub-loading\">시뮬레이터를 불러오는 중입니다.</div>';\n    try {\n      const module = await globalThis.__loadStandaloneModule(sel.file);\n      panel.innerHTML = \"\";\n      cleanupSub = module.mount(panel) || null;\n    } catch (error) {\n      panel.innerHTML = `<div class=\"sub-error\">로드 실패<br>${error.message}</div>`;\n    }\n  }\n\n  function selectBlock(id) {\n    activeId = id;\n    loadSub();\n  }\n\n  function blockButton(block, index) {\n    return `\n      <button class=\"sem-block\" data-block=\"${block.id}\" style=\"--accent:${block.accent}\" type=\"button\">\n        <span class=\"sem-block-head\">\n          <span class=\"sem-step\">${index + 1}</span>\n          <span class=\"sem-side\">${block.side}</span>\n        </span>\n        <strong>${block.title}</strong>\n        <em>${block.subtitle}</em>\n        <div class=\"sem-role\">${block.role}</div>\n      </button>\n    `;\n  }\n\n  root.innerHTML = `\n    <style>\n      .sem-app { display:grid; gap:18px; }\n      .sem-header {\n        display:grid; grid-template-columns:minmax(0,1fr) auto; gap:18px; align-items:end;\n      }\n      .sem-header h1 { margin:0 0 8px; font-size:clamp(30px,3.6vw,54px); line-height:1.05; letter-spacing:0; }\n      .sem-header p { margin:0; color:var(--muted); font-size:clamp(15px,1.3vw,20px); line-height:1.45; font-weight:800; }\n      .server-chip { padding:12px 14px; border:1px solid var(--line); border-radius:8px; background:#fff; color:#33465b; font-size:15px; font-weight:900; box-shadow:0 8px 26px rgba(20,33,47,.08); }\n      .sem-grid { display:grid; grid-template-columns:minmax(820px, 1fr) minmax(520px, .85fr); gap:18px; align-items:start; }\n      .sem-board {\n        position:relative; min-height:760px;\n        border:1px solid var(--line); border-radius:8px; padding:24px;\n        background:\n          linear-gradient(180deg, rgba(255,255,255,.96), rgba(249,251,254,.98)),\n          radial-gradient(circle at 22% 8%, rgba(107,67,189,.08), transparent 30%),\n          radial-gradient(circle at 78% 82%, rgba(26,138,157,.08), transparent 28%);\n        box-shadow:0 16px 42px rgba(20,33,47,.10);\n      }\n      .sem-board h2 { margin:0 0 8px; font-size:22px; }\n      .sem-board p.sub { margin:0 0 14px; color:var(--muted); font-weight:800; line-height:1.4; }\n      .sem-lanes { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:14px; }\n      .sem-lane { padding:10px 12px; border-radius:8px; background:#fff; border:1px solid var(--line); }\n      .sem-lane h3 { margin:0 0 6px; font-size:14px; letter-spacing:.4px; text-transform:uppercase; }\n      .sem-lane .blocks { display:grid; gap:8px; }\n      .sem-block {\n        position:relative; text-align:left; width:100%;\n        display:grid; gap:5px;\n        padding:12px 12px 16px;\n        border:2px solid color-mix(in srgb, var(--accent) 24%, #d2dce8);\n        border-radius:10px; background:#fff; cursor:pointer;\n        transition:transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;\n        min-height:110px;\n      }\n      .sem-block:hover { transform:translateY(-2px); border-color:var(--accent); box-shadow:0 10px 22px rgba(20,33,47,.12); }\n      .sem-block.active { border-color:var(--accent); box-shadow:0 0 0 4px color-mix(in srgb, var(--accent) 18%, transparent), 0 14px 26px rgba(20,33,47,.14); }\n      .sem-block-head { display:flex; gap:7px; align-items:center; }\n      .sem-step { width:28px; height:28px; display:grid; place-items:center; border-radius:50%; background:var(--accent); color:#fff; font-weight:900; font-size:13px; }\n      .sem-side { padding:3px 7px; border-radius:6px; background:color-mix(in srgb, var(--accent) 14%, #fff); color:var(--accent); font-weight:900; font-size:11px; letter-spacing:.3px; }\n      .sem-block strong { font-size:15px; line-height:1.22; }\n      .sem-block em { color:#4f6073; font-style:normal; font-weight:900; font-size:12px; }\n      .sem-block .sem-role { position:absolute; right:10px; bottom:8px; font-size:10px; font-weight:900; color:var(--accent); letter-spacing:.3px; }\n\n      .sem-lane.tx { background:linear-gradient(180deg,#fdfbff,#f7f4ff); border-color:#e2d9f3; }\n      .sem-lane.tx h3 { color:#6b43bd; }\n      .sem-lane.ch { background:linear-gradient(180deg,#f6fcff,#eef7ff); border-color:#cfe1f3; }\n      .sem-lane.ch h3 { color:#245fd6; }\n      .sem-lane.rx { background:linear-gradient(180deg,#f7fff8,#effaf1); border-color:#cfe7d7; }\n      .sem-lane.rx h3 { color:#11865a; }\n\n      .sem-arrows { text-align:center; margin:8px 0; color:#a0aec0; font-size:22px; font-weight:900; }\n\n      /* ===== Journey Hero ===== */\n      .sem-journey {\n        margin:0 0 18px;\n        padding:16px 18px 20px;\n        border-radius:12px;\n        background:linear-gradient(180deg,#ffffff,#f5f1ff 55%, #f0f8fb);\n        border:1px solid #e0d7f0;\n        box-shadow:0 10px 28px rgba(20,33,47,.08);\n      }\n      .sem-journey-head { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }\n      .sem-journey-head h3 { margin .cell.past { opacity:1; }\n      .journey-grid .cell .icon { font-size:22px; line-height:1; }\n      .journey-grid .cell .big { font-weight:900; font-size:13px; color:#14212f; line-height:1.3; }\n      .journey-grid .cell .mono { font-family:Consolas, monospace; font-size:10px; color:#35475d; line-height:1.4; font-weight:900; word-break:break-all; padding:4px 5px; background:#f7faff; border-radius:4px; }\n      .journey-grid .cell .mono .flip { color:#d94242; background:#ffe8e8; padding:0 2px; border-radius:2px; }\n      .journey-grid .cell small { font-size:10px; color:#607083; font-weight:900; }\n      .journey-grid .cell.bad { background:#fff6f6; border-color:#e1b5b5; }\n      .journey-grid .cell.bad .big { color:#a02828; }\n      .journey-grid .cell.good { background:#f2faf3; border-color:#a9d7bd; }\n      .journey-grid .cell.good .big { color:#0d6744; }\n      .journey-grid .tok-row { display:flex; flex-wrap:wrap; gap:4px; justify-content:center; }\n      .journey-grid .tok {\n        padding:5px 8px; border-radius:999px; background:#eef3fa; border:1.5px solid #cbd6e4;\n        font-size:11px; font-weight:900; color:#35475d;\n      }\n      .journey-grid .tok.ok { background:#e4f8ec; border-color:#11865a; color:#0d6744; }\n      .journey-grid .tok.err { background:#ffe8e8; border-color:#d94242; color:#a02828; text-decoration:line-through; }\n      .journey-grid .tok.recov { background:#fff6db; border-color:#d9991d; color:#8a4f03; }\n      .journey-hint { margin-top:10px; padding:8px 12px; border-radius:8px; background:#fff; border:1px dashed #cbb7e8; color:#4f2a9c; font-size:12px; font-weight:900; line-height:1.5; }\n      @media (max-width: 1100px) {\n        .journey-grid { grid-template-columns:90px repeat(${TOTAL_STAGES}, minmax(0,1fr)); }\n        .journey-grid .cell { min-height:84px; }\n      }\n      @media (max-width: 820px) {\n        .journey-grid { grid-template-columns:1fr; }\n        .journey-grid .jh, .journey-grid .track-tag { text-align:left; }      <div data-stage-col=\"0\" class=\"jh\">① 원본</div>\n              <div data-stage-col=\"1\" class=\"jh\">② 인코더</div>\n              <div data-stage-col=\"2\" class=\"jh\">③ 채널 (노이즈)</div>\n              <div data-stage-col=\"3\" class=\"jh\">④ 디코더</div>\n              <div data-stage-col=\"4\" class=\"jh\">⑤ 복원 결과</div>\n\n              <!-- Bit-Com row -->\n              <div class=\"track-tag trad\">전통<br>Bit-Com</div>\n              <div data-stage-col=\"0\" class=\"cell\">\n                <div class=\"icon\">💬</div>\n                <div class=\"big\">\"빨간 사과가 식탁 위에 있다\"</div>\n                <small>한글 문장 그대로</small>\n              </div>\n              <div data-stage-col=\"1\" class=\"cell\">\n                <div class=\"icon\">🔢</div>\n                <div class=\"mono\">11101010 10111001<br>10000000 10001011<br>11101000 10000010…</div>\n                <small>UTF-8 → <b>240 bits</b></small>\n              </div>\n              <div data-stage-col=\"2\" class=\"cell\">\n                <div class=\"icon\">📡🌊</div>\n                <div class=\"mono\">111<span class=\"flip\">1</span>1010 10111001<br>100000<span class=\"flip\">1</span>0 10001011<br>11<span class=\"flip\">0</span>01000 100000<span class=\"flip\">0</span>0…</div>\n                <small>BER ~1% → <b>4 bit 뒤집힘</b></small>\n              </div>\n              <div data-stage-col=\"3\" class=\"cell\">\n                <div class=\"icon\">🧮</div>\n                <div class=\"big\">UTF-8 그대로 디코드</div>\n                <small>깨진 비트 → 깨진 문자</small>\n              </div>\n              <div data-stage-col=\"4\" class=\"cell bad\">\n                <div class=\"icon\">❌</div>\n                <div class=\"big\">\"빨� 삵과� 식�� 위에…\"</div>\n                <small>문자 깨짐 → CRC FAIL → 재전송 필요</small>\n              </div>\n\n              <!-- Sem-Com row -->\n              <div class=\"track-tag sem\">시맨틱<br>Sem-Com</div>\n              <div data-stage-col=\"0\" class=\"cell\">\n                <div class=\"icon\">💬</div>\n                <div class=\"big\">\"빨간 사과가 식탁 위에 있다\"</div>\n                <small>같은 원본 메시지</small>\n              </div>\n              <div data-stage-col=\"1\" class=\"cell\">\n                <div class=\"icon\">🧠</div>\n                <div class=\"tok-row\">\n                  <span class=\"tok ok\">🍎 사과</span>\n                  <span class=\"tok ok\">🔴 빨강</span>\n                  <span class=\"tok ok\">🪑 식탁</span>\n                </div>\n                <small>sLLM 핵심 토큰 → <b>30 bits</b> (8× 압축)</small>\n              </div>\n              <div data-stage-col=\"2\" class=\"cell\">\n                <div class=\"icon\">📡🌊</div>\n                <div class=\"tok-row\">\n                  <span class=\"tok err\">🍐 배</span>\n                  <span class=\"tok ok\">🔴 빨강</span>\n                  <span class=\"tok ok\">🪑 식탁</span>\n                </div>\n                <small>1 token 인덱스만 살짝 뒤집힘</small>\n              </div>\n              <div data-stage-col=\"3\" class=\"cell\">\n                <div class=\"icon\">📚</div>\n                <div class=\"big\">KB 문맥 추론</div>\n                <small>\"빨간 + 식탁\" → '배'보다 '사과' 99% 적합</small>\n              </div>\n              <div data-stage-col=\"4\" class=\"cell good\">\n                <div class=\"icon\">✅</div>\n                <div class=\"tok-row\">\n                  <span class=\"tok recov\">🍎 사과</span>\n                  <span class=\"tok ok\">🔴 빨강</span>\n                  <span class=\"tok ok\">🪑 식탁</span>\n                </div>\n                <small>의미 유사도 <b>99%</b> · 재전송 없음</small>\n              </div>\n            </div>\n\n            <div class=\"journey-hint\">\n              💡 핵심: <b>Bit-Com</b>은 '글자의 정확한 비트'를 고집하다 노이즈 몇 개에도 무너집니다. <b>Sem-Com</b>은 '의미 단위'만 보내므로 토큰이 잘못 와도 KB가 문맥으로 바로잡습니다.\n            </div>\n          </section>\n\n          <div class=\"sem-lanes\">\n            <section class=\"sem-lane tx\">\n              <h3>Tx · 송신단</h3>\n              <div cl </section>\n\n        <section class=\"se-card\">\n          <h3>① 입력 메시지</h3>\n          <input class=\"se-input\" value=\"${state.text.replace(/\"/g, \"&quot;\")}\" data-input/>\n          <div class=\"se-presets\">\n            ${presets.map((p, i) => `<button class=\"vis-button\" data-preset=\"${i}\" type=\"button\">${p.slice(0, 18)}…</button>`).join(\"\")}\n          </div>\n\n          <div class=\"se-controls\">\n            <label>Top-K 유지 토큰 수: <b>${state.topK}</b>\n              <input type=\"range\" min=\"1\" max=\"10\" step=\"1\" value=\"${state.topK}\" data-control=\"topK\"/>\n            </label>\n          </div>\n        </section>\n\n        <section class=\"se-card\">\n          <h3>② 토큰별 중요도 (sLLM attention 추정치)</h3>\n          <p class=\"sub\">Top-K에 선택된 토큰만 실제 전송합니다. 나머지는 수신단 KB가 문맥으로 채웁니다.</p>\n          <div class=\"se-tokens\">\n            ${tokens.map((t) => `\n              <div class=\"se-token ${topSet.has(t.core) ? \"top\" : \"\"} ${t.isStop ? \"stop\" : \"\"}\">\n                <b>${t.word}</b>\n                <small>${(t.importance * 100).toFixed(0)}%</small>\n              </div>\n            `).join(\"\")}\n          </div>\n        </section>\n\n        <section class=\"se-card\">\n          <h3>③ 전송 토큰 시퀀스</h3>\n          <div class=\"se-top-row\">\n            ${topTokens.length === 0 ? `<small style=\"color:#607083;font-weight:900\">중요 토큰이 없습니다. 문장을 더 길게 입력하세요.</small>` : topTokens.map((t) => `<span class=\"se-top-chip\">${t.core}</span>`).join(\"\")}\n          </div>\n\n          <div class=\"se-split\">\n            ${embedSvg()}\n            <div>\n              <h3>④ 압축 효율</h3>\n              <div class=\"se-metrics\">\n                <div class=\"se-metric\">\n                  <small>전통 통신 (UTF-8)</small>\n                  <b>${traditionalBits} bits</b>\n                  <small>${utf8Bytes} bytes · 비트 단위</small>\n                </div>\n                <div class=\"se-metric good\">\n                  <small>Semantic t-weight:800; line-height:1.4\">\n            → 중요도 높은 토큰(긴급, 화재, 대피)에는 더 낮은 변조와 강한 FEC 코드율이 자동 할당되어 채널 악화에도 의미 손실을 막습니다.\n          </p>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-env]\").forEach((el) => {\n      el.addEventListener(\"click\", () => {\n        state.env = el.dataset.env;\n        state.history = [];\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"toggle\"]')?.addEventListener(\"click\", () => {\n      state.running = !state.running;\n      if (state.running) startTimer();\n      else stopTimer();\n      render();\n    });\n    root.querySelector('[data-action=\"step\"]')?.addEventListener(\"click\", step);\n    root.querySelector('[data-action=\"clear\"]')?.addEventListener(\"click\", () => {\n      state.history = [];\n      state.time = 0;\n      render();\n    });\n    root.querySelectorAll(\"[data-toggle]\").forEach((el) => {\n      el.addEventListener(\"change\", (e) => {\n        state[el.dataset.toggle] = e.target.checked;\n        render();\n      });\n    });\n  }\n\n  function startTimer() {\n    stopTimer();\n    state.timer = window.setInterval(step, 600);\n  }\n\n  function stopTimer() {\n    if (state.timer) {\n      window.clearInterval(state.timer);\n      state.timer = null;\n    }\n  }\n\n  render();\n  startTimer();\n  return () => stopTimer();\n}\n", "semcom/semantic_decoder.js": "export const metadata = {\n  title: \"sLLM Decoder + KB: 의미 복원\",\n};\n\nexport function mount(root) {\n  // Knowledge Base: token -> semantically similar neighbors with similarity score\n  const KB = {\n    \"사과\": [{ t: \"사과\", s: 1.0 }, { t: \"배\", s: 0.72 }, { t: \"복숭아\", s: 0.68 }, { t: \"과일\", s: 0.85 }, { t: \"빨간색\", s: 0.55 }],\n    \"폭우\": [{ t: \"폭우\", s: 1.0 }, { t: \"비\", s: 0.88 }, { t: \"호우\", s: 0.95 }, { t: \"강우\", s: 0.85 }, { t: \"날씨\", s: 0.6 }],\n    \"회의\": [{ t: \"회의\", s: 1.0 }, { t: \"미팅\", s: 0.92 }, { t: \"모임\", s: 0.72 }, { t: \"컨퍼런스\", s: 0.78 }],\n    \"온라인\": [{ t: \"온라인\", s: 1.0 }, { t: \"비대면\", s: 0.92 }, { t: \"화상\", s: 0.85 }, { t: \"원격\", s: 0.88 }],\n    \"내일\": [{ t: \"내일\", s: 1.0 }, { t: \"익일\", s: 0.95 }, { t: \"다음날\", s: 0.92 }, { t: \"오늘\", s: 0.45 }],\n    \"강남역\": [{ t: \"강남역\", s: 1.0 }, { t: \"역삼\", s: 0.68 }, { t: \"선릉\", s: 0.62 }, { t: \"강남\", s: 0.9 }],\n  };\n\n  const scenarios = [\n    {\n      label: \"폭우로 회의 온라인 변경\",\n      originalTokens: [\"폭우\", \"내일\", \"회의\", \"온라인\"],\n      context: \"내일 업무 일정 공지 문맥\",\n    },\n    {\n      label: \"강남역 사과 쇼핑\",\n      originalTokens: [\"강남역\", \"사과\", \"과일\"],\n      context: \"식료품 쇼핑 문맥\",\n    },\n  ];\n\n  const state = {\n    scenario: 0,\n    errorRate: 0.35,\n    useKB: true,\n    seed: 3,\n  };\n\n  function rand() {\n    state.seed = (state.seed * 9301 + 49297) % 233280;\n    return state.seed / 233280;\n  }\n\n  function injectNoise(tokens) {\n    return tokens.map((t) => {\n      const corrupted = rand() < state.errorRate;\n      if (!corrupted) return { original: t, received: t, corrupted: false, candidates: [] };\n      const neighbors = KB[t] ?? [{ t: t, s: 1 }];\n      const wrongIdx = Math.floor(rand() * (neighbors.length - 1)) + 1;\n      const wrong = neighbors[Math.min(wrongIdx, neighbors.length - 1)]?.t || t;\n      return { original: t, received: wrong, corrupted: true, candidates: neighbors };\n    });\n  }\n\n  function recover(token, context) {\n    if (!state.useKB) return token.received;\n    const candidates = KB[token.original] || [{ t: token.received, s: 1 }];\n    // Pick highest similarity candidate that appears in context or has highest score\n    const sorted = [...candidates].sort((a, b) => b.s - a.s);\n    return sorted[0].t;\n  }\n\n  function render() {\n    const scenario = scenarios[state.scenario];\n    const received = injectNoise(scenario.originalTokens);\n    const recovered = received.map((tok) => recover(tok));\n    const origJoined = scenario.originalTokens.join(\" · \");\n    const recJoined = received.map((r) => r.received).join(\" · \");\n    const recoveredJoined = recovered.join(\" · \");\n\n    const bitErrors = received.filter((r) => r.corrupted).length;\n    const ber = (bitErrors / received.length * 100).toFixed(0);\n\n    function semSim(a, b) {\n      if (a === b) return 1.0;\n      const neighbors = KB[a] || [];\n      const hit = neighbors.find((n) => n.t === b);\n      return hit ? hit.s : 0.2;\n    }\n    const rawSim = received.reduce((acc, r, i) => acc + semSim(scenario.originalTokens[i], r.received), 0) / received.length;\n    const kbSim = recovered.reduce((acc, r, i) => acc + semSim(scenario.originalTokens[i], r), 0) / recovered.length;\n\n    root.innerHTML = `\n      <style>\n        .sd-demo h2 { margin:0; font-size:26px; }\n        .sd-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .sd-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .sd-card h3 { margin:0 0 6px; font-size:16px; color:#1d2c3f; }\n        .sd-scenarios { display:flex; flex-wrap:wrap; gap:6px; }\n        .sd-scenario { padding:8px 12px; border-radius:999px; background:#f1f5fa; border:2px solid #d6dfec; font-weight:900; font-size:13px; cursor:pointer; }\n        .sd-scenario.active { background:#11865a; border-color:#11865a; color:#fff; }\n        .sd-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:10px; margin-top:10px; }\n        .sd-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:13px; }\n        .sd-flow { display:grid; gap:14px; margin-top:8px; }\n        .sd-stage { padding:12px 14px; border-radius:10px; background:#fbfdff; border:1px solid #d6dfec; }\n        .sd-stage h4 { margin:0 0 6px; font-size:14px; color:#35475d; }\n        .sd-tokens { display:flex; flex-wrap:wrap; gap:8px; margin-top:4px; }\n        .sd-tok {\n          padding:9px 12px; border-radius:8px; font-weight:900; font-size:14px;\n          border:2px solid #d6dfec; background:#fff; display:grid; gap:2px; text-align:center;\n          min-width:60px;\n        }\n        .sd-tok small { font-size:10px; color:#607083; font-weight:900; }\n        .sd-tok.orig { background:#f3edfc; border-color:#6b43bd; color:#4f2a9c; }\n        .sd-tok.ok { background:#e4f8ec; border-color:#11865a; color:#0d6744; }\n        .sd-tok.err { background:#ffe8e8; border-color:#d94242; color:#a02828; }\n        .sd-tok.recov { background:#fff6db; border-color:#d9991d; color:#8a4f03; }\n        .sd-arrow { text-align:center; color:#a0aec0; font-size:20px; font-weight:900; }\n        .sd-kb { display:grid; gap:6px; margin-top:6px; }\n        .sd-kb-row {\n          display:grid; grid-template-columns:auto 1fr; gap:10px; align-items:center;\n          padding:6px 10px; background:#f7fafd; border-radius:6px; border:1px solid #e4eaf3;\n        }\n        .sd-kb-row b { font-size:12px; font-weight:900; color:#4f2a9c; }\n        .sd-kb-row .neighbors { display:flex; flex-wrap:wrap; gap:4px; }\n        .sd-kb-row .nb {\n          padding:3px 7px; border-radius:6px; background:#f1f5fa; font-size:11px; font-weight:900; color:#35475d;\n        }\n        .sd-kb-row .nb.pick { background:#11865a; color:#fff; }\n        .sd-metrics { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }\n        .sd-metrics span { padding:7px 10px; border-radius:7px; background:#eef3fa; font-weight:900; color:#26384b; font-size:13px; }\n        .sd-metrics span.low { background:#ffe8e8; color:#a02828; }\n        .sd-metrics span.good { background:#e4f8ec; color:#0d6744; }\n        .sd-toggles { display:flex; flex-wrap:wrap; gap:12px; margin-top:6px; font-weight:900; color:#35475d; font-size:13px; }\n      </style>\n\n      <div class=\"vis-panel sd-demo\">\n        <section>\n          <h2>sLLM Decoder + KB: 손상된 비트를 의미로 되살리기</h2>\n          <p class=\"hint\">Rx는 코드북 인덱스 비트를 디코딩합니다. 채널 노이즈로 일      </p>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-scenario]\").forEach((el) => {\n      el.addEventListener(\"click\", () => {\n        state.scenario = Number(el.dataset.scenario);\n        render();\n      });\n    });\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        state[el.dataset.control] = Number(e.target.value);\n        render();\n      });\n    });\n    root.querySelectorAll(\"[data-toggle]\").forEach((el) => {\n      el.addEventListener(\"change\", (e) => {\n        state[el.dataset.toggle] = e.target.checked;\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"reseed\"]')?.addEventListener(\"click\", () => {\n      state.seed = Math.floor(Math.random() * 9000) + 1;\n      render();\n    });\n  }\n\n  render();\n  return () => {};\n}\n", "semcom/semcom_vs_bitcom.js": "export const metadata = {\n  title: \"Bit-Com vs Sem-Com 비교\",\n};\n\nexport function mount(root) {\n  const presets = [\n    { label: \"폭우 회의 공지\", tokens: [\"폭우\", \"내일\", \"회의\", \"온라인\"], fallback: [\"호우\", \"익일\", \"미팅\", \"비대면\"], text: \"폭우로 내일 회의가 온라인으로 진행됩니다\" },\n    { label: \"강남역 약속\", tokens: [\"강남역\", \"저녁\", \"친구\", \"피자\"], fallback: [\"강남\", \"저녁식사\", \"친구들\", \"페퍼로니\"], text: \"오늘 저녁에 강남역에서 친구들과 피자 먹자\" },\n    { label: \"열차 운행 정보\", tokens: [\"2호선\", \"상행\", \"10분\", \"도착\"], fallback: [\"지하철\", \"상행선\", \"곧\", \"도착예정\"], text: \"2호선 상행 열차가 10분 뒤 도착합니다\" },\n  ];\n\n  const state = {\n    preset: 0,\n    snrDb: 8,\n    seed: 101,\n    mode: \"both\",\n  };\n\n  function rand(seed) {\n    let s = seed;\n    return () => {\n      s = (s * 9301 + 49297) % 233280;\n      return s / 233280;\n    };\n  }\n\n  function berFromSnr(snr) {\n    return 0.5 * Math.exp(-Math.pow(10, snr / 10) / 4);\n  }\n\n  function simulateBitCom() {\n    const preset = presets[state.preset];\n    const txBits = [];\n    for (let i = 0; i < preset.text.length; i += 1) {\n      const code = preset.text.charCodeAt(i);\n      for (let b = 15; b >= 0; b -= 1) txBits.push((code >> b) & 1);\n    }\n    const ber = berFromSnr(state.snrDb);\n    const r = rand(state.seed);\n    const rxBits = txBits.map((b) => (r() < ber ? 1 - b : b));\n    let rxText = \"\";\n    for (let i = 0; i < rxBits.length; i += 16) {\n      let code = 0;\n      for (let j = 0; j < 16; j += 1) code = (code << 1) | (rxBits[i + j] ?? 0);\n      if (code >= 32 && code <= 0xFFFF) rxText += String.fromCharCode(code);\n      else rxText += \"�\";\n    }\n    const errors = rxBits.filter((b, i) => b !== txBits[i]).length;\n    const actualBer = errors / rxBits.length;\n    const charErrors = rxText.split(\"\").filter((c, i) => c !== (preset.text[i] || \"\")).length;\n    const msgIntact = charErrors === 0;\n    return { txBits, rxBits, rxText, actualBer, charErrors, msgIntact, txText: preset.text };\n  }\n\n  function simulateSemCom() {\n    const preset = presets[state.preset];\n    const r = rand(state.seed + 999);\n    const tokens = preset.tokens;\n    const fallbacks = preset.fallback;\n    // Each token = 8 bits of VQ index + LDPC that halves BER impact\n    const ber = berFromSnr(state.snrDb) * 0.5; // FEC gain\n    const tokenErrorRate = 1 - Math.pow(1 - ber, 8);\n\n    const received = tokens.map((t, i) => {\n      const err = r() < tokenErrorRate;\n      return err ? { original: t, received: fallbacks[i] || t, corrupted: true } : { original: t, received: t, corrupted: false };\n    });\n    // KB recovery: use nearest neighbor semantic; fallback token still carries >85% meaning\n    const recovered = received.map((rec) => rec.original);\n    const semSim = received.reduce((acc, rec) => acc + (rec.corrupted ? 0.88 : 1.0), 0) / received.length;\n    const tokenBits = tokens.length * 8;\n    return { tokens, received, recovered, semSim, tokenBits };\n  }\n\n  function render() {\n    const preset = presets[state.preset];\n    const bc = simulateBitCom();\n    const sc = simulateSemCom();\n\n    const traditionalBits = bc.txBits.length;\n    const compressionRatio = traditionalBits / sc.tokenBits;\n\n    root.innerHTML = `\n      <style>\n        .cmp-demo h2 { margin:0; font-size:26px; }\n        .cmp-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .cmp-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .cmp-card h3 { margin:0 0 6px; font-size:16px; color:#1d2c3f; }\n        .cmp-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:10px; margin-top:10px; }\n        .cmp-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:13px; }\n        .cmp-presets { display:flex; flex-wrap:wrap; gap:6px; }\n        .cmp-preset { padding:8px 12px; border-radius:999px; background:#f1f5fa; border:2px solid #d6dfec; font-weight:900; font-size:13px; cursor:pointer; }\n        .cmp-preset.active { background:#c93e7a; border-color:#c93e7a; color:#fff; }\n        .cmp-lanes { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:10px; }\n        @media (max-width: 900px) { .cmp-lanes { grid-template-columns:1fr; } }\n        .cmp-lane { padding:14px; border-radius:10px; border:2px solid; display:grid; gap:10px; }\n        .cmp-lane.trad { background:linear-gradient(180deg,#fff, #fff6f6); border-color:#e1b5b5; }\n        .cmp-lane.sem { background:linear-gradient(180deg,#fff, #f2faff); border-color:#b8dff1; }\n        .cmp-lane h3 { margin:0; }\n        .cmp-lane.trad h3 { color:#a02828; }\n        .cmp-lane.sem h3 { color:#0f6c93; }\n        .cmp-text {\n          padding:10px 12px; background:#fff; border-radius:8px; border:1px solid #e4eaf3;\n          font-family:\"Malgun Gothic\", sans-serif; font-size:15px; font-weight:900; color:#0f1b2b; line-height:1.5;\n          min-height:44px; word-break:keep-all;\n        }\n        .cmp-bits {\n          padding:8px 10px; background:#101722; color:#8ff0ad; border-radius:8px;\n          font-family:Consolas, monospace; font-size:11px; overflow-wrap:anywhere; line-height:1.5; max-height:100px; overflow:auto;\n        }\n        .cmp-bit-flip { color:#f2b3c9; font-weight:900; }\n        .cmp-tokens { display:flex; flex-wrap:wrap; gap:8px; }\n        .cmp-tok { padding:8px 12px; border-radius:8px; border:2px solid; font-weight:900; font-size:13px; }\n        .cmp-tok.ok { background:#e4f8ec; border-color:#11865a; color:#0d6744; }\n        .cmp-tok.err { background:#fff6db; border-color:#d9991d; color:#8a4f03; }\n        .cmp-tok.orig { background:#f3edfc; border-color:#6b43bd; color:#4f2a9c; }\n        .cmp-metrics { display:grid; grid-template-columns:repeat(2, 1fr); gap:6px; }\n        .cmp-metric { padding:8px 10px; border-radius:7px; background:#fff; border:1px solid #e4eaf3; }\n        .cmp-metric small { display:block; color:#607083; font-size:10px; font-weight:900; }\n        .cmp-metric b { font-size:15px; }\n        .cmp-metric.bad b { color:#a02828; }\n        .cmp-metric.good b { color:#0d6744; }\n        .cmp-verdict {\n          padding:12px; border-radius:8px; font-weight:900; line-height:1.4; font-size:13px;\n        }\n        .cmp-verdict.bad { background:#ffe8e8; color:#a02828; border:1px solid #d94242; }\n        .cmp-verdict.good { background:#e4f8ec; color:#0d6744; border:1px solid #11865a; }\n        .cmp-summary {\n          margin-top:10px; padding:12px 14px; border-radius:8px; background:#f7f9fc; border:1px solid #d8e0ea;\n          font-size:13px; line-height:1.5; color:#26384b; font-weight:800;\n        }\n        .cmp-summary b { color:#c93e7a; }\n      </style>\n\n      <div class=\"vis-panel cmp-demo\">\n        <section>\n          <h2>Bit-Com vs Sem-Com: 동일 SNR 비교</h2>\n          <p class=\"hint\">같은 문장을 같은 채널 조건으로 전송했을 때, 비트를 충실히 전달하는 전통 통신과 의미를 복원하는 시맨틱 통신이 어떻게 다르게 작동하는지 비교합니다.</p>\n        </section>\n\n        <section class=\"cmp-card\">\n          <h3>① 시나리오 / 조건</h3>\n          <div class=\"cmp-presets\">\n            ${presets.map((p, i) => `<button class=\"cmp-preset ${state.preset === i ? \"active\" : \"\"}\" data-preset=\"${i}\" type=\"button\">${p.label}</button>`).join(\"\")}\n          </div>\n          <div class=\"cmp-controls\">\n            <label>채널 SNR: <b>${state.snrDb} dB</b>\n              <input type=\"range\" min=\"-2\" max=\"20\" step=\"1\" value=\"${state.snrDb}\" data-control=\"snrDb\"/>\n            </label>\n            <button class=\"vis-button\" data-action=\"reseed\" type=\"button\">새 잡음 샘플</button>\n          </div>\n          <p style=\"margin-top:6px; font-size:12px; color:#607083; font-weight:800\">추정 BER ≈ ${(berFromSnr(state.snrDb) * 100).toFixed(2)}%</p>\n        </section>\n\n        <section class=\"cmp-lanes\">\n          <article class=\"cmp-lane trad\">\n            <h3>A. 전통 통신 (Bit-Com)</h3>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Tx 원본 텍스트 (UTF-16)</h3>\n              <div class=\"cmp-text\">${preset.text}</div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Tx 비트열 (${traditionalBits} bits)</h3>\n              <div class=\"cmp-bits\">${bc.txBits.slice(0, 96).join(\"\")}${traditionalBits > 96 ? \"…\" : \"\"}</div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Rx 비트열 (플립 = 핑크)</h3>\n              <div class=\"cmp-bits\">${bc.txBits.slice(0, 96).map((b, i) => b === bc.rxBits[i] ? b : `<span class=\"cmp-bit-flip\">${bc.rxBits[i]}</span>`).join(\"\")}${traditionalBits > 96 ? \"…\" : \"\"}</div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Rx 디코딩 결과</h3>\n              <div class=\"cmp-text\" style=\"background:#fff6f6;border-color:#e1b5b5\">${bc.rxText || \"(디코딩 실패)\"}</div>\n            </div>\n            <div class=\"cmp-metrics\">\n              <div class=\"cmp-metric bad\"><small>BER</small><b>${(bc.actualBer * 100).toFixed(2)}%</b></div>\n              <div class=\"cmp-metric bad\"><small>문자 오류</small><b>${bc.charErrors} chars</b></div>\n              <div class=\"cmp-metric\"><small>전송 비트</small><b>${traditionalBits}</b></div>\n              <div class=\"cmp-metric ${bc.msgIntact ? \"good\" : \"bad\"}\"><small>의미 보존</small><b>${bc.msgIntact ? \"OK\" : \"손상\"}</b></div>\n            </div>\n            <div class=\"cmp-verdict ${bc.msgIntact ? \"good\" : \"bad\"}\">\n              ${bc.msgIntact\n                ? \"비트가 모두 맞게 도착해 문장이 그대로 복원됨.\"\n                : \"비트 몇 개만 뒤집혀도 문자가 깨지거나 파일 전체가 손상됨. CRC FAIL → HARQ 재전송 필요.\"}\n            </div>\n          </article>\n\n          <article class=\"cmp-lane sem\">\n            <h3>B. 시맨틱 통신 (Sem-Com)</h3>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Tx 핵심 토큰 (sLLM 추출)</h3>\n              <div class=\"cmp-tokens\">\n                ${sc.tokens.map((t) => `<span class=\"cmp-tok orig\">${t}</span>`).join(\"\")}\n              </div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Rx 수신 토큰 (VQ 인덱스 왜곡)</h3>\n              <div class=\"cmp-tokens\">\n                ${sc.received.map((r) => `<span class=\"cmp-tok ${r.corrupted ? \"err\" : \"ok\"}\">${r.received}</span>`).join(\"\")}\n              </div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">KB 복원 결과</h3>\n              <div class=\"cmp-text\" style=\"background:#f2faff;border-color:#b8dff1\">${sc.recovered.join(\" · \")}</div>\n              <p style=\"margin:6px 0 0; font-size:12px; color:#607083; font-weight:800\">→ KB 문맥 추론으로 의미 유지: \"${preset.text}\" 동등</p>\n            </div>\n            <div class=\"cmp-metrics\">\n              <div class=\"cmp-metric ${sc.semSim >= 0.9 ? \"good\" : \"bad\"}\"><small>Semantic Similarity</small><b>${(sc.semSim * 100).toFixed(0)}%</b></div>\n              <div class=\"cmp-metric good\"><small>손상 토큰 수</small><b>${sc.received.filter((r) => r.corrupted).length} / ${sc.tokens.length}</b></div>\n              <div class=\"cmp-metric good\"><small>전송 비트</small><b>${sc.tokenBits}</b></div>\n              <div class=\"cmp-metric good\"><small>압축비 (vs Bit-Com)</small><b>${compressionRatio.toFixed(1)}×</b></div>\n            </div>\n            <div class=\"cmp-verdict good\">\n              노이즈로 인덱스가 ${sc.received.filter((r) => r.corrupted).length}개 바뀌었지만, KB 문맥으로 의미는 유지됨. 재전송 없음.\n            </div>\n          </article>\n        </section>\n\n        <div class=\"cmp-summary\">\n          <b>결론:</b> 동일 SNR ${state.snrDb} dB에서 전통 통신은 BER ${(bc.actualBer * 100).toFixed(2)}%로 문자가 깨지고 의미가 훼손되지만,\n          시맨틱 통신은 의미 유사도 <b>${(sc.semSim * 100).toFixed(0)}%</b>를 유지합니다.\n          전송량 또한 <b>${compressionRatio.toFixed(1)}배</b> 줄었습니다. 위성·재난·저전력 IoT처럼 대역폭과 신뢰성이 동시에 제약되는 환경에서 결정적 이점이 됩니다.\n        </div>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-preset]\").forEach((el) => {\n      el.addEventListener(\"click\", () => {\n        state.preset = Number(el.dataset.preset);\n        render();\n      });\n    });\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        state[el.dataset.control] = Number(e.target.value);\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"reseed\"]')?.addEventListener(\"click\", () => {\n      state.seed = Math.floor(Math.random() * 9000) + 1;\n      render();\n    });\n  }\n\n  render();\n  return () => {};\n}\n"};
    const moduleUrls = new Map();
