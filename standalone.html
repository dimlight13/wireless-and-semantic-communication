<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wireless Communication Visualizer Standalone</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #14212f;
      --muted: #5f6f82;
      --line: #d8e0ea;
      --blue: #245fd6;
      --green: #11865a;
      --purple: #6b43bd;
      --orange: #c86414;
      --red: #d94242;
      --yellow: #d9991d;
      --teal: #1a8a9d;
      --pink: #c93e7a;
      --accent: var(--blue);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,.92), rgba(244,247,251,.98)),
        radial-gradient(circle at 18% 12%, rgba(36,95,214,.10), transparent 30%),
        radial-gradient(circle at 82% 80%, rgba(107,67,189,.10), transparent 26%);
    }
    button, input, select { font: inherit; }
    .app-shell { width: min(1720px, 100%); min-height: 100vh; margin: 0 auto; padding: 20px clamp(14px, 3vw, 42px) 34px; }
    .standalone-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 22px rgba(20,33,47,.06);
    }
    .standalone-title { display: grid; gap: 2px; }
    .standalone-title strong { font-size: 17px; }
    .standalone-title span { color: var(--muted); font-size: 12px; font-weight: 800; }
    .standalone-actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .standalone-actions button {
      min-height: 38px;
      border: 1px solid #cad5e3;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 900;
    }
    .standalone-actions button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .loading, .error { min-height: 70vh; display: grid; place-items: center; padding: 24px; text-align: center; font-size: 21px; font-weight: 900; color: var(--muted); }
    .error { color: var(--red); }
    .vis-panel { display: grid; gap: 16px; color: var(--ink); }
    .vis-card { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 16px; box-shadow: 0 8px 22px rgba(20,33,47,.06); }
    .vis-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .vis-button { border: 1px solid #cad5e3; border-radius: 8px; background: #fff; color: var(--ink); min-height: 42px; padding: 9px 13px; cursor: pointer; font-weight: 900; }
    .vis-button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .vis-button.green { background: var(--green); border-color: var(--green); color: #fff; }
    .vis-button.red { background: var(--red); border-color: var(--red); color: #fff; }
    .vis-button.orange { background: var(--orange); border-color: var(--orange); color: #fff; }
    .vis-button.teal { background: var(--teal); border-color: var(--teal); color: #fff; }
    .bit, .packet-chip { display: inline-grid; place-items: center; min-width: 34px; min-height: 34px; padding: 6px 9px; border-radius: 7px; background: #e9eef6; color: #172536; font-weight: 900; border: 1px solid #d4deea; }
    .packet-chip { min-width: auto; color: #fff; border: 0; background: var(--blue); }
    .logbox { min-height: 180px; max-height: 340px; overflow: auto; border-radius: 8px; background: #101722; color: #8ff0ad; padding: 14px; font-family: Consolas, "Cascadia Mono", monospace; white-space: pre-wrap; line-height: 1.45; font-size: 14px; }
  </style>
</head>
<body>
  <main class="app-shell">
    <nav class="standalone-top">
      <div class="standalone-title">
        <strong>Wireless Communication Visualizer</strong>
        <span>Standalone browser file. All code runs on your device.</span>
      </div>
      <div class="standalone-actions">
        <button type="button" data-entry="protocol_stack_overview.js">Traditional 5G NR</button>
        <button type="button" data-entry="semcom/semcom_overview.js">Semantic Communication</button>
      </div>
    </nav>
    <div id="app"><div class="loading">Loading visualizer...</div></div>
  </main>

  <script type="module">
    const moduleSources = {"protocol_stack_overview.js": "export const metadata = {\n  title: \"5G NR Uplink Protocol Stack Explorer\",\n};\n\nconst components = [\n  {\n    id: \"rf\",\n    zone: \"O-RU\",\n    layer: \"Low-PHY 1\",\n    title: \"RF 수신 및 ADC\",\n    subtitle: \"아날로그 전파를 I/Q 샘플로 변환\",\n    file: \"O-RU/rf_adc_sampling.js\",\n    accent: \"#245fd6\",\n    brief: \"안테나가 받은 RF 신호를 기저대역으로 내리고 ADC를 통해 디지털 I/Q 샘플로 만듭니다.\",\n    feature: \"O-RU의 첫 단계입니다. 공중에서 들어온 연속적인 아날로그 전파를 이후 OFDM 처리와 빔포밍이 가능한 디지털 샘플 스트림으로 바꿉니다.\",\n    data: [\"RF\", \"ADC\", \"I/Q\"],\n  },\n  {\n    id: \"cp\",\n    zone: \"O-RU\",\n    layer: \"Low-PHY 2\",\n    title: \"CP 제거\",\n    subtitle: \"OFDM 보호 구간 분리\",\n    file: \"O-RU/cp_removal.js\",\n    accent: \"#245fd6\",\n    brief: \"OFDM 심볼 앞에 붙은 Cyclic Prefix를 제거해 실제 유효 심볼만 남깁니다.\",\n    feature: \"CP는 다중경로 지연으로부터 심볼을 보호하기 위해 붙인 구간입니다. 수신 처리에서는 FFT에 넣기 전에 이 보호 구간을 떼어내야 합니다.\",\n    data: [\"CP+심볼\", \"CP 제거\", \"심볼\"],\n  },\n  {\n    id: \"fft\",\n    zone: \"O-RU\",\n    layer: \"Low-PHY 3\",\n    title: \"FFT\",\n    subtitle: \"시간축 신호를 주파수축 자원으로 변환\",\n    file: \"O-RU/fft_ofdm.js\",\n    accent: \"#245fd6\",\n    brief: \"시간 영역 OFDM 심볼을 서브캐리어별 주파수 영역 Resource Element로 분해합니다.\",\n    feature: \"FFT를 거치면 뭉쳐 있던 시간축 파형이 서브캐리어 단위의 주파수 자원으로 펼쳐집니다. 이후 O-DU High-PHY는 이 자원 단위의 심볼을 처리합니다.\",\n    data: [\"Time\", \"FFT\", \"Subcarrier\"],\n  },\n  {\n    id: \"beamforming\",\n    zone: \"O-RU\",\n    layer: \"Low-PHY 4\",\n    title: \"디지털 빔포밍\",\n    subtitle: \"안테나별 신호 결합\",\n    file: \"O-RU/digital_beamforming.js\",\n    accent: \"#245fd6\",\n    brief: \"여러 안테나에서 받은 주파수 영역 신호에 가중치를 곱해 원하는 단말 신호를 강화합니다.\",\n    feature: \"빔포밍은 여러 안테나의 관측값을 수학적으로 결합해 신호대잡음비를 높입니다. O-RU는 이 결합된 주파수 영역 신호를 O-DU로 넘깁니다.\",\n    data: [\"ANT\", \"Weight\", \"UE\"],\n  },\n  {\n    id: \"eq\",\n    zone: \"O-DU\",\n    layer: \"High-PHY 1\",\n    title: \"Channel Estimation & Equalization\",\n    subtitle: \"찌그러짐 복구\",\n    file: \"O-DU/channel_estimation_equalization.js\",\n    accent: \"#11865a\",\n    brief: \"채널 추정값으로 페이딩, 위상 회전, 진폭 왜곡을 보정합니다.\",\n    feature: \"업링크 수신의 High-PHY 첫 단계입니다. 무선 채널을 통과하며 찌그러진 QAM 심볼을 원래 별자리점에 가깝게 되돌린 뒤 복조기로 넘깁니다.\",\n    data: [\"왜곡 심볼\", \"채널 추정\", \"등화 심볼\"],\n  },\n  {\n    id: \"demod\",\n    zone: \"O-DU\",\n    layer: \"High-PHY 2\",\n    title: \"Demodulation\",\n    subtitle: \"LLR 확률값 추출\",\n    file: \"O-DU/qam_demodulation_llr.js\",\n    accent: \"#11865a\",\n    brief: \"등화된 QAM 심볼을 비트별 신뢰도인 LLR 값으로 바꿉니다.\",\n    feature: \"복조기는 바로 0과 1을 확정하지 않고, 각 비트가 0 또는 1일 가능성을 소프트 정보인 LLR로 출력합니다. 이후 디스크램블링과 LDPC 복호는 이 LLR을 사용합니다.\",\n    data: [\"QAM\", \"LLR+\", \"LLR-\"],\n  },\n  {\n    id: \"descrambling\",\n    zone: \"O-DU\",\n    layer: \"High-PHY 3\",\n    title: \"Descrambling\",\n    subtitle: \"LLR 부호 반전\",\n    file: \"O-DU/scrambling_descrambling_llr.js\",\n    accent: \"#11865a\",\n    brief: \"스크램블링 코드가 1인 위치의 LLR 부호를 반전해 원래 비트 신뢰도로 되돌립니다.\",\n    feature: \"5G PHY의 디스크램블링은 하드 비트 XOR만 떠올리면 놓치기 쉽습니다. LDPC 복호 전에는 코드 1 위치의 LLR 부호를 뒤집는 방식으로 원본 신뢰도를 복원합니다.\",\n    data: [\"LLR\", \"코드\", \"부호 반전\"],\n  },\n  {\n    id: \"rate\",\n    zone: \"O-DU\",\n    layer: \"High-PHY 4\",\n    title: \"Rate Dematching\",\n    subtitle: \"코드블록 위치 복원\",\n    file: \"O-DU/5g_rate_matching_dematchning.js\",\n    accent: \"#11865a\",\n    brief: \"전송 자원에 맞춰 펑처링 또는 반복된 LLR을 LDPC 코드블록 입력 형태로 되돌립니다.\",\n    feature: \"무선 자원이 부족해 사라진 위치는 Null LLR로 채우고, 반복된 위치는 결합합니다. 이 과정을 거쳐 LDPC 복호기가 기대하는 코드블록 배열이 만들어집니다.\",\n    data: [\"자원 LLR\", \"Null\", \"Combined\"],\n  },\n  {\n    id: \"ldpc\",\n    zone: \"O-DU\",\n    layer: \"High-PHY 5\",\n    title: \"LDPC Decoding\",\n    subtitle: \"에러 정정 및 0/1 확정\",\n    file: \"O-DU/ldpc_decoding.js\",\n    accent: \"#11865a\",\n    brief: \"LLR을 반복 복호해 오류를 정정하고 하드 비트 0/1로 확정합니다.\",\n    feature: \"LDPC 복호는 아직 확률값인 LLR을 이용해 가능한 코드워드를 찾아갑니다. 복호가 수렴하면 소프트 정보가 실제 Transport Block 비트열로 확정됩니다.\",\n    data: [\"LLR\", \"LDPC\", \"0/1\"],\n  },\n  {\n    id: \"crc\",\n    zone: \"O-DU\",\n    layer: \"High-PHY 6\",\n    title: \"CRC 체크\",\n    subtitle: \"최종 무결성 판정\",\n    file: \"O-DU/parity_crc_comparison.js\",\n    accent: \"#11865a\",\n    brief: \"LDPC가 확정한 비트열이 정말 맞는지 CRC 나머지로 검증합니다.\",\n    feature: \"CRC 체크가 통과해야 MAC 계층으로 올릴 수 있습니다. 실패하면 MAC HARQ가 재전송 또는 결합 복호 절차를 수행합니다.\",\n    data: [\"0/1 비트\", \"CRC\", \"PASS/FAIL\"],\n  },\n  {\n    id: \"harq\",\n    zone: \"O-DU\",\n    layer: \"MAC\",\n    title: \"MAC HARQ\",\n    subtitle: \"빠른 재전송 복구\",\n    file: \"O-DU/MAC_HARQ_RLC_ARQ_comparison.js\",\n    accent: \"#c86414\",\n    brief: \"CRC 실패 블록에 대해 ACK/NACK, 재전송, 소프트 결합을 처리합니다.\",\n    feature: \"High-PHY의 CRC 결과가 MAC으로 올라오면 HARQ가 짧은 시간 안에서 재전송 복구를 시도합니다. MAC이 포기한 손실은 이후 RLC 정책으로 넘어갑니다.\",\n    data: [\"CRC FAIL\", \"NACK\", \"HARQ\"],\n  },\n  {\n    id: \"rlc_mac\",\n    zone: \"O-DU\",\n    layer: \"MAC / RLC\",\n    title: \"RLC 엔티티와 MAC 다중화\",\n    subtitle: \"서비스별 흐름 관리\",\n    file: \"O-DU/rlc_mac_multiplexing.js\",\n    accent: \"#11865a\",\n    brief: \"서비스 특성이 다른 RLC 흐름이 MAC 전송 단위와 연결되는 과정을 보여줍니다.\",\n    feature: \"웹, 음성, RRC 제어처럼 성격이 다른 데이터는 각 RLC 엔티티에서 다른 신뢰성 또는 지연 정책을 가진 뒤 MAC 전송 단위와 연결됩니다.\",\n    data: [\"RLC\", \"LCID\", \"MAC TB\"],\n  },\n  {\n    id: \"pdcp\",\n    zone: \"O-CU\",\n    layer: \"PDCP\",\n    title: \"PDCP\",\n    subtitle: \"순서 정렬 · 복호화 · ROHC\",\n    file: \"O-CU/pdcp_reordering_deciphering.js\",\n    accent: \"#6b43bd\",\n    brief: \"RLC에서 올라온 사용자 데이터를 순서대로 정렬하고, 암호를 풀며, 압축된 헤더를 복원합니다.\",\n    feature: \"PDCP는 무선 구간의 보안과 패킷 순서를 담당합니다. 늦게 온 패킷을 재정렬하고, Deciphering으로 사용자 데이터를 복호화하며, ROHC로 압축된 IP 헤더를 복원합니다.\",\n    data: [\"SN 정렬\", \"복호화\", \"ROHC\"],\n  },\n  {\n    id: \"sdap\",\n    zone: \"O-CU\",\n    layer: \"SDAP\",\n    title: \"SDAP\",\n    subtitle: \"QoS Flow를 DRB와 코어망 경로로 매핑\",\n    file: \"O-CU/sdap_qos_mapping.js\",\n    accent: \"#6b43bd\",\n    brief: \"완성된 IP 패킷을 QoS Flow 특성에 맞춰 적절한 DRB와 코어망 경로로 분류합니다.\",\n    feature: \"SDAP은 5QI와 QFI를 기준으로 서비스 품질이 다른 트래픽을 구분합니다. 음성, 영상, 일반 데이터가 서로 다른 품질 요구사항을 가지므로 올바른 DRB와 코어망 경로로 매핑합니다.\",\n    data: [\"QFI\", \"5QI\", \"DRB\"],\n  },\n];\n\nconst simulatorMap = new Map(components.filter((item) => item.file).map((item) => [item.id, item]));\nconst flowOrder = components.map((item) => item.id);\n\nexport function mount(root) {\n  let activeId = \"rf\";\n  let cleanupSimulator = null;\n  let packetIndex = 0;\n  let packetTimer = null;\n\n  function activeComponent() {\n    return components.find((item) => item.id === activeId) || components[0];\n  }\n\n  function componentById(id) {\n    return components.find((item) => item.id === id);\n  }\n\n  function startPacketFlow() {\n    positionPacket();\n    packetTimer = window.setInterval(() => {\n      packetIndex = (packetIndex + 1) % flowOrder.length;\n      positionPacket();\n    }, 1200);\n  }\n\n  function positionPacket() {\n    const packet = root.querySelector(\".moving-packet\");\n    const current = componentById(flowOrder[packetIndex]);\n    const marker = root.querySelector(`[data-node=\"${current.id}\"]`);\n    const board = root.querySelector(\".stack-board\");\n    if (!packet || !marker || !board) return;\n\n    const boardRect = board.getBoundingClientRect();\n    const rect = marker.getBoundingClientRect();\n    packet.style.left = `${rect.left - boardRect.left + rect.width / 2 - packet.offsetWidth / 2}px`;\n    packet.style.top = `${rect.top - boardRect.top + rect.height / 2 - 18}px`;\n    packet.textContent = current.data[0];\n  }\n\n  async function loadSimulator() {\n    const selected = activeComponent();\n    const panel = root.querySelector(\"#simulatorMount\");\n    const title = root.querySelector(\"#detailTitle\");\n    const meta = root.querySelector(\"#detailMeta\");\n    const feature = root.querySelector(\"#detailFeature\");\n    const chips = root.querySelector(\"#detailChips\");\n\n    title.textContent = selected.title;\n    meta.textContent = `${selected.zone} · ${selected.layer}${selected.subtitle ? ` · ${selected.subtitle}` : \"\"}`;\n    feature.textContent = selected.feature;\n    chips.innerHTML = selected.data.map((item) => `<span>${item}</span>`).join(\"\");\n\n    if (typeof cleanupSimulator === \"function\") {\n      cleanupSimulator();\n      cleanupSimulator = null;\n    }\n\n    root.querySelectorAll(\"[data-component]\").forEach((button) => {\n      button.classList.toggle(\"active\", button.dataset.component === activeId);\n    });\n\n    if (!selected.file) {\n      panel.innerHTML = `\n        <div class=\"placeholder-sim\">\n          <strong>${selected.title}</strong>\n          <p>${selected.brief}</p>\n          <div class=\"mini-flow\">${selected.data.map((item) => `<span>${item}</span>`).join(\"<b>→</b>\")}</div>\n        </div>\n      `;\n      return;\n    }\n\n    panel.innerHTML = '<div class=\"sim-loading\">연결된 시뮬레이터를 불러오는 중입니다.</div>';\n    try {\n      const module = await globalThis.__loadStandaloneModule(selected.file);\n      panel.innerHTML = \"\";\n      cleanupSimulator = module.mount(panel) || null;\n    } catch (error) {\n      panel.innerHTML = `<div class=\"sim-error\">시뮬레이터 로드 실패<br>${error.message}</div>`;\n    }\n  }\n\n  function selectComponent(id) {\n    activeId = id;\n    loadSimulator();\n  }\n\n  function componentButton(item, index) {\n    const hasSimulator = simulatorMap.has(item.id);\n    return `\n      <button class=\"stack-node ${hasSimulator ? \"has-sim\" : \"overview-only\"}\" data-component=\"${item.id}\" data-node=\"${item.id}\" style=\"--node-accent:${item.accent}\" type=\"button\">\n        <span class=\"node-meta\"><span class=\"node-step\">${index + 1}</span><span class=\"node-zone\">${item.zone}</span></span>\n        <strong>${item.title}</strong>\n        <em>${item.subtitle || item.layer}</em>\n      </button>\n    `;\n  }\n\n  const oruNodes = components.filter((item) => item.zone === \"O-RU\");\n  const oduNodes = components.filter((item) => item.zone === \"O-DU\");\n  const ocuNodes = components.filter((item) => item.zone === \"O-CU\");\n\n  root.innerHTML = `\n    <style>\n      .protocol-app { display:grid; gap:18px; }\n      .protocol-header {\n        display:grid;\n        grid-template-columns:minmax(0,1fr) auto;\n        gap:18px;\n        align-items:end;\n      }\n      .protocol-header h1 { margin:0 0 8px; font-size:clamp(32px,3.6vw,58px); line-height:1.05; letter-spacing:0; }\n      .protocol-header p { margin:0; color:var(--muted); font-size:clamp(16px,1.3vw,21px); line-height:1.45; font-weight:800; }\n      .server-chip { padding:12px 14px; border:1px solid var(--line); border-radius:8px; background:#fff; color:#33465b; font-size:15px; font-weight:900; box-shadow:0 8px 26px rgba(20,33,47,.08); }\n      .workspace-grid { display:grid; grid-template-columns:minmax(820px, 1fr) minmax(520px, .82fr); gap:18px; align-items:start; }\n      .overview-column { display:grid; gap:12px; }\n      .stack-board {\n        position:relative;\n        min-height:1160px;\n        border:1px solid var(--line);\n        border-radius:8px;\n        background:\n          linear-gradient(180deg, rgba(255,255,255,.94), rgba(249,251,254,.98)),\n          repeating-linear-gradient(90deg, transparent 0 72px, rgba(36,95,214,.035) 72px 73px);\n        box-shadow:0 16px 42px rgba(20,33,47,.10);\n        overflow:visible;\n      }\n      .rrc-plane {\n        position:absolute;\n        left:18px;\n        right:18px;\n        top:18px;\n        min-height:82px;\n        border:2px dashed rgba(200,100,20,.42);\n        border-radius:8px;\n        background:#fff7ed;\n        padding:14px 16px;\n        display:flex;\n        justify-content:space-between;\n        gap:12px;\n        align-items:center;\n      }\n      .rrc-plane strong { color:#8a400b; font-size:22px; }\n      .rrc-plane span { color:#75491f; font-weight:900; line-height:1.35; }\n      .stack-lanes {\n        position:absolute;\n        inset:124px 18px 18px;\n        display:grid;\n        grid-template-col ze:14px;\n      }\n      .node-zone { min-width:0; width:max-content; max-width:100%; padding:4px 7px; border-radius:8px; background:color-mix(in srgb, var(--node-accent) 14%, #fff); color:var(--node-accent); font-weight:900; font-size:12px; overflow-wrap:anywhere; }\n      .stack-node strong { min-width:0; font-size:15px; line-height:1.22; overflow-wrap:anywhere; word-break:keep-all; }\n      .stack-node em { min-width:0; color:#4f6073; font-style:normal; font-weight:900; font-size:13px; line-height:1.22; overflow-wrap:anywhere; word-break:keep-all; }\n      .flow-line {\n        position:absolute;\n        left:70px;\n        right:70px;\n        top:55%;\n        height:7px;\n        border-radius:99px;\n        background:linear-gradient(90deg, #245fd6, #11865a 58%, #6b43bd);\n        opacity:.23;\n      }\n      .flow-note {\n        position:static;\n        padding:10px 12px;\n        border-radius:8px;\n        background:#f5f9ff;\n        border:1px solid #d6e3f5;\n        color:#33465b;\n        font-weight:900;\n        line-height:1.35;\n        box-shadow:0 8px 22px rgba(20,33,47,.06);\n      }\n      .moving-packet {\n        position:absolute;\n        z-index:5;\n        min-width:96px;\n        max-width:150px;\n        height:36px;\n        display:grid;\n        place-items:center;\n        border-radius:8px;\n        background:#14212f;\n        color:#fff;\n        font-size:12px;\n        font-weight:900;\n        white-space:nowrap;\n        overflow:hidden;\n        text-overflow:ellipsis;\n        padding:0 12px;\n        box-shadow:0 14px 28px rgba(20,33,47,.28);\n        left:60px;\n        top:360px;\n        transition:left 700ms ease, top 700ms ease;\n      }\n      .detail-panel {\n        min-height:1160px;\n        display:grid;\n        grid-template-rows:auto minmax(0,1fr);\n        border:1px solid var(--line);\n        border-radius:8px;\n        background:#fff;\n        box-shadow:0 16px 42px rgba(20,33,47,.10);\n        overflow:hidden;\n      }\n      .detail-head { display:grid; gap:10px; padding:18px; border-bottom:1px solid var(--line); background:#fbfdff; }\n      .detail-head small { color:var(--blue); font-size:15px; font-weight:900; }\n      .detail-head h2 { margin:0; font-size:30px; line-height:1.12; }\n      .detail-head p { margin:0; color:#33465b; font-weight:800; line-height:1.45; }\n      .detail-chips { display:flex; flex-wrap:wrap; gap:8px; }\n      .detail-chips span { padding:7px 9px; border-radius:8px; background:#eef3fa; color:#26384b; font-weight:900; }\n      .simulator-shell { min-height:860px; overflow:auto; padding:16px; background:#f7f9fc; }\n      .sim-loading, .sim-error, .placeholder-sim {\n        min-height:520px;\n        display:grid;\n        place-items:center;\n        gap:12px;\n        text-align:center;\n        border:1px solid var(--line);\n        border-radius:8px;\n        background:#fff;\n        padding:24px;\n        color:var(--muted);\n        font-weight:900;\n      }\n      .sim-error { color:var(--red); }\n      .placeholder-sim strong { color:var(--ink); font-size:28px; }\n      .placeholder-sim p { max-width:520px; margin:0; line-height:1.45; }\n      .mini-flow { display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; }\n      .mini-flow span { padding:10px 12px; border-radius:8px; background:#eef3fa; color:#25384b; }\n      @media (max-width: 1420px) {\n        .workspace-grid { grid-template-columns:1fr; }\n        .stack-board, .detail-panel { min-height:1160px; }\n      }\n      @media (max-width: 820px) {\n        .protocol-header { grid-template-columns:1fr; }\n        .stack-board { height:auto; min-height:0; overflow:visible; }\n        .rrc-plane, .stack-lanes, .flow-line, .moving-packet { position:relative; inset:auto; left:auto; right:auto; top:auto; bottom:auto; }\n        .stack-lanes { display:grid; grid-template-columns:1fr; padding:0 14px 14px; }\n        .rrc-plane { margin:14px; display:grid; }\n        .flow-line, .moving-packet { display:none; }\n        .detail-panel { min-height:auto; }\n      }\n    </style>\n\n    <div class=\"protocol-app\">\n      <header class=\"protocol-header\">\n        <div>\n          <h1>5G NR Uplink Protocol Stack Explorer</h1>\n          <p>업링크 수신 데이터가 O-RU, O-DU High-PHY, MAC/RLC, O-CU를 통과하는 순서를 정확히 따라가며 각 컴포넌트의 핵심 시뮬레이터를 확인합니다.</p>\n        </div>\n        <div class=\"server-chip\">실행: python main.py<br>주소: ${location.origin}</div>\n      </header>\n\n      <section class=\"workspace-grid\">\n        <div class=\"overview-column\">\n          <article class=\"stack-board\" aria-label=\"5G NR 업링크 프로토콜 스택 개요도\">\n            <div class=\"rrc-plane\">\n              <strong>RRC Control Plane</strong>\n              <span>접속 관리 · 핸드오버 · 무선 설정 메시지는 사용자 데이터 흐름 위에서 전체 스택 제어</span>\n            </div>\n            <div class=\"flow-line\"></div>\n            <div class=\"moving-packet\">RF</div>\n            <div class=\"stack-lanes\">\n              <section class=\"zone\" style=\"--zone-color:#245fd6\">\n                <header>\n                  <h2>O-RU</h2>\n                  <p>RF 수신 → CP 제거 → FFT → 빔포밍</p>\n                </header>\n                <div class=\"node-list node-list-balanced\">\n                  ${oruNodes.map((item) => componentButton(item, components.indexOf(item))).join(\"\")}\n                </div>\n              </section>\n              <section class=\"zone\" style=\"--zone-color:#11865a\">\n                <header>\n                  <h2>O-DU</h2>\n                  <p>등화 → 복조 → 디스크램블링 → 레이트 디매칭 → LDPC → CRC → MAC</p>\n                </header>\n                <div class=\"node-list\">\n                  ${oduNodes.map((item) => componentButton(item, components.indexOf(item))).join(\"\")}\n                </div>\n              </section>\n              <section class=\"zone\" style=\"--zone-color:#6b43bd\">\n                <header>\n                  <h2>O-CU</h2>\n                  <p>PDCP → SDAP</p>\n                </header>\n                <div class=\"node-list node-list-balanced\">\n                  ${ocuNodes.map((item) => componentButton(item, components.indexOf(item))).join(\"\")}\n                </div>\n              </section>\n            </div>\n          </article>\n          <div class=\"flow-note\">전체 순서: RF 수신 → CP 제거 → FFT → 빔포밍 → Channel Estimation & Equalization → Demodulation → Descrambling → Rate Dematching → LDPC Decoding → CRC 체크 → MAC → RLC/MAC → PDCP → SDAP</div>\n        </div>\n\n        <aside class=\"detail-panel\" aria-label=\"선택한 컴포넌트 상세 시뮬레이터\">\n          <header class=\"detail-head\">\n            <small id=\"detailMeta\"></small>\n            <h2 id=\"detailTitle\"></h2>\n            <p id=\"detailFeature\"></p>\n            <div class=\"detail-chips\" id=\"detailChips\"></div>\n          </header>\n          <section class=\"simulator-shell\" id=\"simulatorMount\"></section>\n        </aside>\n      </section>\n    </div>\n  `;\n\n  root.querySelectorAll(\"[data-component]\").forEach((button) => {\n    button.addEventListener(\"click\", () => selectComponent(button.dataset.component));\n  });\n\n  loadSimulator();\n  startPacketFlow();\n\n  return () => {\n    if (packetTimer) window.clearInterval(packetTimer);\n    if (typeof cleanupSimulator === \"function\") cleanupSimulator();\n  };\n}\n", "O-RU/rf_adc_sampling.js": "export const metadata = {\n  title: \"RF 수신 및 ADC 샘플링\",\n};\n\nexport function mount(root) {\n  const state = {\n    sampleRate: 16,\n    bitDepth: 4,\n    freq: 2,\n    phase: 0,\n    running: true,\n    timer: null,\n  };\n\n  const WIDTH = 640;\n  const HEIGHT = 220;\n  const PAD_L = 40;\n  const PAD_R = 20;\n  const PAD_T = 20;\n  const PAD_B = 30;\n  const PLOT_W = WIDTH - PAD_L - PAD_R;\n  const PLOT_H = HEIGHT - PAD_T - PAD_B;\n\n  function analog(t) {\n    return Math.sin(2 * Math.PI * state.freq * t + state.phase);\n  }\n\n  function quantize(value) {\n    const levels = Math.pow(2, state.bitDepth);\n    const step = 2 / levels;\n    const idx = Math.floor((value + 1) / step);\n    const clamped = Math.max(0, Math.min(levels - 1, idx));\n    return {\n      level: clamped,\n      value: clamped * step - 1 + step / 2,\n    };\n  }\n\n  function analogPath() {\n    const points = [];\n    for (let i = 0; i <= 200; i += 1) {\n      const t = i / 200;\n      const y = analog(t);\n      const px = PAD_L + t * PLOT_W;\n      const py = PAD_T + (1 - (y + 1) / 2) * PLOT_H;\n      points.push(`${i === 0 ? \"M\" : \"L\"} ${px.toFixed(2)} ${py.toFixed(2)}`);\n    }\n    return points.join(\" \");\n  }\n\n  function samplePoints() {\n    const pts = [];\n    const count = state.sampleRate;\n    for (let i = 0; i < count; i += 1) {\n      const t = i / count;\n      const analogVal = analog(t);\n      const q = quantize(analogVal);\n      pts.push({\n        t,\n        analog: analogVal,\n        quantized: q.value,\n        level: q.level,\n        x: PAD_L + t * PLOT_W,\n        y: PAD_T + (1 - (analogVal + 1) / 2) * PLOT_H,\n        yq: PAD_T + (1 - (q.value + 1) / 2) * PLOT_H,\n      });\n    }\n    return pts;\n  }\n\n  function quantLevels() {\n    const levels = Math.pow(2, state.bitDepth);\n    const step = 2 / levels;\n    const lines = [];\n    for (let i = 0; i <= levels; i += 1) {\n      const v = -1 + i * step;\n      const y = PAD_T + (1 - (v + 1) / 2) * PLOT_H;\n      lines.push(`<line x1=\"${PAD_L}\" y1=\"${y}\" x2=\"${PAD_L + PLOT_W}\" y2=\"${y}\" stroke=\"#c7d3e3\" stroke-width=\"0.5\" stroke-dasharray=\"2 3\" />`);\n    }\n    return lines.join(\"\");\n  }\n\n  function step() {\n    state.phase += 0.18;\n    render();\n  }\n\n  function render() {\n    const samples = samplePoints();\n    const iqList = samples.map((s, i) => ({\n      i: s.quantized.toFixed(3),\n      q: Math.cos(2 * Math.PI * state.freq * s.t + state.phase).toFixed(3),\n      idx: i,\n    }));\n\n    root.innerHTML = `\n      <style>\n        .rf-demo h2 { margin:0; font-size:28px; }\n        .rf-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .rf-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .rf-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:10px; margin-top:10px; }\n        .rf-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:13px; }\n        .rf-controls input[type=range] { width:100%; }\n        .rf-legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; font-weight:900; font-size:12px; }\n        .rf-legend span { display:flex; align-items:center; gap:6px; padding:4px 8px; border-radius:6px; background:#f1f5fa; }\n        .rf-legend i { display:inline-block; width:12px; height:12px; border-radius:50%; }\n        .rf-svg { width:100%; max-width:${WIDTH}px; display:block; background:#fbfdff; border-radius:8px; }\n        .rf-iq { margin-top:10px; padding:10px; background:#0f1722; border-radius:8px; font-family:Consolas, monospace; color:#8ff0ad; max-height:120px; overflow:auto; font-size:12px; line-height:1.5; }\n        .rf-metric { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }\n        .rf-metric span { padding:6px 10px; border-radius:7px; background:#eef3fa; font-weight:900; color:#26384b; font-size:13px; }\n      </style>\n\n      <div class=\"vis-panel rf-demo\">\n        <section>\n          <h2>RF 수신 및 ADC 샘플링</h2>\n          <p class=\"hint\">안테나로 들어온 아날로그 RF 파형을 샘플링 주파수와 ADC 비트 폭에 따라 디지털 I/Q 샘플로 변환합니다. 슬라이더를 조절해 샘플 간격과 양자화 계단을 확인하세요.</p>\n        </section>\n\n        <section class=\"rf-card\">\n          <div class=\"vis-row\">\n            <button class=\"vis-button primary\" data-action=\"toggle\" type=\"button\">${state.running ? \"⏸ 파형 정지\" : \"▶ 파형 실행\"}</button>\n            <button class=\"vis-button\" data-action=\"step\" type=\"button\">+ 한 스텝</button>\n          </div>\n          <div class=\"rf-controls\">\n            <label>샘플링 속도 (samples/cycle): <b>${state.sampleRate}</b>\n              <input type=\"range\" min=\"4\" max=\"64\" step=\"1\" value=\"${state.sampleRate}\" data-control=\"sampleRate\" />\n            </label>\n            <label>ADC 비트 폭: <b>${state.bitDepth}</b> bit (${Math.pow(2, state.bitDepth)} levels)\n              <input type=\"range\" min=\"1\" max=\"6\" step=\"1\" value=\"${state.bitDepth}\" data-control=\"bitDepth\" />\n            </label>\n            <label>신호 주파수: <b>${state.freq}</b> cycle\n              <input type=\"range\" min=\"1\" max=\"6\" step=\"1\" value=\"${state.freq}\" data-control=\"freq\" />\n            </label>\n          </div>\n          <div class=\"rf-legend\">\n            <span><i style=\"background:#245fd6\"></i>아날로그 RF</span>\n            <span><i style=\"background:#c86414\"></i>샘플링 지점</span>\n            <span><i style=\"background:#11865a\"></i>양자화된 디지털 값</span>\n            <span><i style=\"background:#c7d3e3;border-radius:2px\"></i>양자화 레벨 그리드</span>\n          </div>\n\n          <svg class=\"rf-svg\" viewBox=\"0 0 ${WIDTH} ${HEIGHT}\" preserveAspectRatio=\"xMidYMid meet\">\n            <rect x=\"${PAD_L}\" y=\"${PAD_T}\" width=\"${PLOT_W}\" height=\"${PLOT_H}\" fill=\"#fff\" stroke=\"#d8e0ea\"/>\n            ${quantLevels()}\n            <line x1=\"${PAD_L}\" y1=\"${PAD_T + PLOT_H / 2}\" x2=\"${PAD_L + PLOT_W}\" y2=\"${PAD_T + PLOT_H / 2}\" stroke=\"#94a4ba\" stroke-width=\"0.6\"/>\n            <path d=\"${analogPath()}\" fill=\"none\" stroke=\"#245fd6\" stroke-width=\"2\"/>\n            ${samples.map((s) => `\n              <line x1=\"${s.x}\" y1=\"${s.y}\" x2=\"${s.x}\" y2=\"${s.yq}\" stroke=\"#8ea0b7\" stroke-width=\"0.8\" stroke-dasharray=\"2 2\"/>\n              <circle cx=\"${s.x}\" cy=\"${s.y}\" r=\"3\" fill=\"#c86414\"/>\n              <rect x=\"${s.x - 3.5}\" y=\"${s.yq - 3.5}\" width=\"7\" height=\"7\" fill=\"#11865a\"/>\n            `).join(\" mer();\n\n  return () => stopTimer();\n}\n", "O-RU/cp_removal.js": "export const metadata = {\n  title: \"Cyclic Prefix 제거\",\n};\n\nexport function mount(root) {\n  const state = {\n    cpLength: 16,\n    symbolLength: 64,\n    multipathDelay: 8,\n    enableCp: true,\n    phase: 0,\n    timer: null,\n    animating: true,\n  };\n\n  function render() {\n    const totalWithCp = state.symbolLength + state.cpLength;\n    const ispSafe = state.enableCp && state.cpLength >= state.multipathDelay;\n\n    const cpCells = Array.from({ length: state.cpLength }, (_, i) => i + (state.symbolLength - state.cpLength));\n    const symCells = Array.from({ length: state.symbolLength }, (_, i) => i);\n\n    function cell(idx, variant) {\n      return `<div class=\"cp-cell ${variant}\"><span>${idx}</span></div>`;\n    }\n\n    const totalCells = state.enableCp\n      ? [...cpCells.map((i) => ({ i, variant: \"cp\" })), ...symCells.map((i) => ({ i, variant: \"sym\" }))]\n      : symCells.map((i) => ({ i, variant: \"sym\" }));\n\n    const delayCells = state.enableCp\n      ? [...Array(state.multipathDelay).fill(null).map(() => ({ variant: \"echo\", label: \"↩\" })), ...totalCells]\n      : [...Array(state.multipathDelay).fill(null).map(() => ({ variant: \"echo\", label: \"↩\" })), ...totalCells];\n\n    const fftInput = symCells.map((i) => ({ i, variant: \"sym\" }));\n\n    root.innerHTML = `\n      <style>\n        .cp-demo h2 { margin:0; font-size:28px; }\n        .cp-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .cp-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .cp-card h3 { margin:0 0 8px; font-size:18px; color:#1d2c3f; }\n        .cp-row { display:flex; gap:3px; align-items:center; overflow-x:auto; padding:8px 4px; background:#f7faff; border-radius:6px; }\n        .cp-cell { flex:0 0 auto; width:24px; height:36px; display:grid; place-items:center; border-radius:4px; font-size:10px; font-weight:900; color:#fff; }\n        .cp-cell.cp { background:#c86414; box-shadow:inset 0 -3px 0 rgba(0,0,0,.2); }\n        .cp-cell.sym { background:#245fd6; }\n        .cp-cell.echo { background:#d94242; opacity:.6; color:#fff; }\n        .cp-cell.fft-in { background:#11865a; }\n        .cp-cell.removed { background:#d8e0ea; color:#8ea0b7; text-decoration:line-through; }\n        .cp-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:10px; margin-top:10px; }\n        .cp-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:13px; }\n        .cp-legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; font-weight:900; font-size:12px; }\n        .cp-legend span { display:flex; align-items:center; gap:6px; padding:4px 8px; border-radius:6px; background:#f1f5fa; }\n        .cp-legend i { display:inline-block; width:12px; height:12px; border-radius:3px; }\n        .cp-arrow { text-align:center; color:#718198; font-size:22px; font-weight:900; margin:6px 0; }\n        .cp-verdict { padding:10px 12px; border-radius:8px; font-weight:900; margin-top:8px; }\n        .cp-verdict.ok { background:#e4f8ec; color:#0d6744; border:1px solid #11865a; }\n        .cp-verdict.bad { background:#ffe8e8; color:#a02828; border:1px solid #d94242; }\n        .cp-note { font-size:12px; color:#607083; font-weight:800; margin-top:6px; line-height:1.4; }\n      </style>\n\n      <div class=\"vis-panel cp-demo\">\n        <section>\n          <h2>Cyclic Prefix (CP) 제거</h2>\n          <p class=\"hint\">OFDM 심볼 앞에 붙은 CP는 다중경로 지연으로 인한 심볼 간 간섭(ISI)을 흡수합니다. 수신단은 CP 구간만큼 잘라내고 유효 심볼만 FFT로 넘깁니다.</p>\n        </section>\n\n        <section class=\"cp-card\">\n          <div class=\"cp-controls\">\n            <label>CP 길이 (샘플): <b>${state.cpLength}</b>\n              <input type=\"range\" min=\"0\" max=\"32\" step=\"1\" value=\"${state.cpLength}\" data-control=\"cpLength\" ${state.multipathDelay}): 유효 심볼은 ISI로부터 보호되었습니다.`\n              : `CP 길이(${state.cpLength}) &lt; 채널 지연(${state.multipathDelay}): 에코가 유효 심볼을 침범해 ISI가 발생합니다. CP를 늘리거나 채널 지연을 줄여야 합니다.`}\n          </div>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        state[el.dataset.control] = Number(e.target.value);\n        render();\n      });\n    });\n    root.querySelectorAll(\"[data-toggle]\").forEach((el) => {\n      el.addEventListener(\"change\", (e) => {\n        state[el.dataset.toggle] = e.target.checked;\n        render();\n      });\n    });\n  }\n\n  render();\n  return () => {};\n}\n", "O-RU/fft_ofdm.js": "export const metadata = {\n  title: \"FFT: 시간축 → 주파수축\",\n};\n\nexport function mount(root) {\n  const N = 8;\n  const state = {\n    amps: [0, 2, 0, 1.2, 0, 0, 0, 0],\n    showTime: true,\n    showFreq: true,\n    highlight: -1,\n  };\n\n  function timeSignal(samples = 128) {\n    const arr = [];\n    for (let n = 0; n < samples; n += 1) {\n      const t = n / samples;\n      let sum = 0;\n      for (let k = 0; k < N; k += 1) {\n        sum += state.amps[k] * Math.cos(2 * Math.PI * k * t);\n      }\n      arr.push(sum);\n    }\n    return arr;\n  }\n\n  function discreteDft(samples) {\n    const result = [];\n    for (let k = 0; k < N; k += 1) {\n      let re = 0;\n      let im = 0;\n      for (let n = 0; n < samples.length; n += 1) {\n        const ang = -2 * Math.PI * k * n / samples.length;\n        re += samples[n] * Math.cos(ang);\n        im += samples[n] * Math.sin(ang);\n      }\n      const mag = Math.sqrt(re * re + im * im) / (samples.length / 2);\n      result.push(mag);\n    }\n    return result;\n  }\n\n  const W = 640;\n  const H = 180;\n  const PAD_L = 36;\n  const PAD_R = 14;\n  const PAD_T = 14;\n  const PAD_B = 30;\n  const PLOT_W = W - PAD_L - PAD_R;\n  const PLOT_H = H - PAD_T - PAD_B;\n\n  function timePath(samples) {\n    const maxAmp = Math.max(1, ...state.amps.map((a) => Math.abs(a))) * N * 0.55 + 0.5;\n    const pts = samples.map((v, i) => {\n      const x = PAD_L + (i / (samples.length - 1)) * PLOT_W;\n      const y = PAD_T + PLOT_H / 2 - (v / maxAmp) * (PLOT_H / 2 - 4);\n      return `${i === 0 ? \"M\" : \"L\"} ${x.toFixed(2)} ${y.toFixed(2)}`;\n    });\n    return pts.join(\" \");\n  }\n\n  function freqBars(amps) {\n    const maxA = Math.max(0.5, ...amps);\n    const barW = PLOT_W / (N * 1.6);\n    return amps.map((a, k) => {\n      const x = PAD_L + (k + 0.3) * (PLOT_W / N);\n      const h = (a / maxA) * (PLOT_H - 8);\n      const y = PAD_T + PLOT_H - h;\n      const color = state.highlight === k ? \"#c86414\" : \"#11865a\";\n      return `\n        <rect x=\"${x}\" y=\"${y}\" width=\"${barW}\" height=\"${h}\" fill=\"${color}\" rx=\"2\" />\n        <text x=\"${x + barW / 2}\" y=\"${PAD_T + PLOT_H + 14}\" text-anchor=\"middle\" font-size=\"11\" fill=\"#35475d\" font-weight=\"900\">k=${k}</text>\n        <text x=\"${x + barW / 2}\" y=\"${y - 4}\" text-anchor=\"middle\" font-size=\"10\" fill=\"#0d6744\" font-weight=\"900\">${a.toFixed(2)}</text>\n      `;\n    }).join(\"\");\n  }\n\n  function render() {\n    const samples = timeSignal(128);\n    const freq = discreteDft(samples.slice(0, N * 16).filter((_, i) => i % 16 === 0));\n\n    root.innerHTML = `\n      <style>\n        .fft-demo h2 { margin:0; font-size:28px; }\n        .fft-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .fft-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .fft-card h3 { margin:0 0 6px; font-size:17px; color:#1d2c3f; }\n        .fft-card p { margin:0; color:#607083; font-size:12px; font-weight:800; }\n        .subcarriers { display:grid; grid-template-columns:repeat(${N}, 1fr); gap:8px; margin-top:10px; }\n        .subcarriers label { display:grid; gap:4px; font-weight:900; font-size:12px; text-align:center; color:#35475d; }\n        .subcarriers input[type=range] { width:100%; writing-mode: bt-lr; -webkit-appearance:slider-vertical; appearance:slider-vertical; height:80px; }\n        .subcarriers .value { color:#11865a; }\n        .fft-svg { width:100%; max-width:${W}px; display:block; background:#fbfdff; border-radius:8px; margin-top:8px; }\n        .fft-arrow { text-align:center; color:#718198; font-size:22px; font-weight:900; margin:8px 0; }\n        .preset-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }\n      </style>\n\n      <div class=\"vis-panel fft-demo\">\n        <section>\n          <h2>FFT: 시간축 신호 → 주파수 영역 서브캐리어</h2>\n          <p class=\"hint\">OFDM은 여러 서브캐리어 신호를 시간 영역에서 합쳐 전송합니다. 수신단은 FFT로 시간 파형을 다시 각 서브캐리어(k)의 진폭으로 분해합니다.</p>\n        </section>\n\n        <section class=\"fft-card\">\n          <h3>서브캐리어 진폭 편집</h3>\n          <p>각 서브캐리어 k의 진폭 a<sub>k</sub>를 조절하세요. 아래 시간 파형이 모든 서브캐리어의 합으로 갱신됩니다.</p>\n          <div class=\"preset-row\">\n            <button class=\"vis-button\" data-preset=\"single\" type=\"button\">k=2 단일 톤</button>\n            <button class=\"vis-button\" data-preset=\"two\" type=\"button\">k=1, k=3 두 톤</button>\n            <button class=\"vis-button\" data-preset=\"chirp\" type=\"button\">저→고 체증</button>\n            <button class=\"vis-button\" data-preset=\"reset\" type=\"button\">초기화</button>\n          </div>\n          <div class=\"subcarriers\">\n            ${state.amps.map((a, k) => `\n              <label>\n                <span>k=${k}</span>\n                <input type=\"range\" min=\"0\" max=\"3\" step=\"0.1\" value=\"${a}\" data-amp=\"${k}\" />\n                <span class=\"value\">${a.toFixed(1)}</span>\n              </label>\n            `).join(\"\")}\n          </div>\n\n          <h3 style=\"margin-top:14px\">시간 영역 파형 (1 OFDM 심볼)</h3>\n          <svg class=\"fft-svg\" viewBox=\"0 0 ${W} ${H}\" preserveAspectRatio=\"xMidYMid meet\">\n            <rect x=\"${PAD_L}\" y=\"${PAD_T}\" width=\"${PLOT_W}\" height=\"${PLOT_H}\" fill=\"#fff\" stroke=\"#d8e0ea\"/>\n            <line x1=\"${PAD_L}\" y1=\"${PAD_T + PLOT_H / 2}\" x2=\"${PAD_L + PLOT_W}\" y2=\"${PAD_T + PLOT_H / 2}\" stroke=\"#94a4ba\" stroke-width=\"0.6\"/>\n            <path d=\"${timePath(samples)}\" fill=\"none\" stroke=\"#245fd6\" stroke-width=\"2\"/>\n            <text x=\"${PAD_L - 4}\" y=\"${PAD_T + 4}\" text-anchor=\"end\" font-size=\"10\" fill=\"#536579\" font-weight=\"900\">진폭</text>\n            <text x=\"${PAD_L + PLOT_W / 2}\" y=\"${H - 8}\" text-anchor=\"middle\" font-size=\"11\" fill=\"#35475d\" font-weight=\"900\">시간 n</text>\n          </svg>\n\n          <div class=\"fft-arrow\">↓ FFT (크기 ${N})</div>\n\n          <h3>주파수 영역: 서브캐리어별 크기 |X[k]|</h3>\n          <svg class=\"fft-svg\" viewBox=\"0 0 ${W} ${H}\" preserveAspectRatio=\"xMidYMid meet\">\n            <rect x=\"${PAD_L}\" y=\"${PAD_T}\" width=\"${PLOT_W}\" height=\"${PLOT_H}\" fill=\"#fff\" stroke=\"#d8e0ea\"/>\n            ${freqBars(freq)}\n            <text x=\"${PAD_L - 4}\" y=\"${PAD_T + 10}\" text-anchor=\"end\" font-size=\"10\" fill=\"#536579\" font-weight=\"900\">|X[k]|</text>\n            <text x=\"${PAD_L + PLOT_W / 2}\" y=\"${H - 8}\" text-anchor=\"middle\" font-size=\"11\" fill=\"#35475d\" font-weight=\"900\">서브캐리어 인덱스 k</text>\n          </svg>\n          <p>진폭을 0으로 둔 서브캐리어는 FFT 출력에서도 사라집니다 → 자원 할당의 기초입니다.</p>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-amp]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        const k = Number(el.dataset.amp);\n        state.amps[k] = Number(e.target.value);\n        state.highlight = k;\n        render();\n      });\n    });\n    root.querySelectorAll(\"[data-preset]\").forEach((el) => {\n      el.addEventListener(\"click\", () => {\n        if (el.dataset.preset === \"single\") state.amps = [0, 0, 2, 0, 0, 0, 0, 0];\n        if (el.dataset.preset === \"two\") state.amp getAngle);\n    const interfGain = state.interfererOn ? arrayFactor(state.interfererAngle) : 0;\n    const sinr = state.interfererOn\n      ? 10 * Math.log10((targetGain * targetGain) / (interfGain * interfGain + 0.01))\n      : 99;\n\n    function angleLine(deg, color, label, strong = false) {\n      const rad = (deg * Math.PI) / 180;\n      const x = CX + R * Math.sin(rad);\n      const y = CY - R * Math.cos(rad);\n      return `\n        <line x1=\"${CX}\" y1=\"${CY}\" x2=\"${x}\" y2=\"${y}\" stroke=\"${color}\" stroke-width=\"${strong ? 2.5 : 1.4}\" stroke-dasharray=\"${strong ? \"\" : \"4 4\"}\"/>\n        <text x=\"${x + 6 * Math.sign(Math.sin(rad))}\" y=\"${y - 8}\" fill=\"${color}\" font-size=\"12\" font-weight=\"900\">${label}</text>\n      `;\n    }\n\n    const w = weights();\n\n    root.innerHTML = `\n      <style>\n        .bf-demo h2 { margin:0; font-size:28px; }\n        .bf-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .bf-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .bf-card h3 { margin:0 0 6px; font-size:17px; color:#1d2c3f; }\n        .bf-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:10px; margin-top:10px; }\n        .bf-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:13px; }\n        .bf-svg { width:100%; max-width:${W}px; display:block; background:#fbfdff; border-radius:8px; margin-top:8px; }\n        .bf-metrics { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }\n        .bf-metrics span { padding:7px 10px; border-radius:7px; background:#eef3fa; font-weight:900; color:#26384b; font-size:13px; }\n        .bf-metrics span.ok { background:#e4f8ec; color:#0d6744; }\n        .bf-metrics span.bad { background:#ffe8e8; color:#a02828; }\n        .bf-weights { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }\n        .bf-weight { min-width:90px; padding:7px 9px; border-radius:6px; background:#f1f5fa; border:1px solid #d6dfec; font-family:Consolas, monospace; font-size:11px; font-weight:900; }\n        .bf-weight b { color:#6b43bd; }\n      </style>\n\n      <div class=\"vis-panel bf-demo\">\n        <section>\n          <h2>디지털 빔포밍: 안테나 배열 가중치</h2>\n          <p class=\"hint\">여러 안테나의 수신 신호에 복소 가중치 w<sub>n</sub>를 곱해 결합하면, 특정 각도로 들어오는 신호는 보강되고 다른 방향 간섭은 상쇄됩니다.</p>\n        </section>\n\n        <section class=\"bf-card\">\n          <div class=\"bf-controls\">\n            <label>안테나 수 N: <b>${state.numAntennas}</b>\n              <input type=\"range\" min=\"2\" max=\"16\" step=\"1\" value=\"${state.numAntennas}\" data-control=\"numAntennas\" />\n            </label>\n            <label>빔 조향각 (steering): <b>${state.steeringAngle}°</b>\n              <input type=\"range\" min=\"-80\" max=\"80\" step=\"1\" value=\"${state.steeringAngle}\" data-control=\"steeringAngle\" />\n            </label>\n            <label>목표 단말 각도: <b>${state.targetAngle}°</b>\n              <input type=\"range\" min=\"-80\" max=\"80\" step=\"1\" value=\"${state.targetAngle}\" data-control=\"targetAngle\" />\n            </label>\n            <label>간섭원 각도: <b>${state.interfererAngle}°</b>\n              <input type=\"range\" min=\"-80\" max=\"80\" step=\"1\" value=\"${state.interfererAngle}\" data-control=\"interfererAngle\" ${state.interfererOn ? \"\" : \"disabled\"}/>\n            </label>\n            <label style=\"flex-direction:row;align-items:center;gap:8px\">\n              <input type=\"checkbox\" ${state.interfererOn ? \"checked\" : \"\"} data-toggle=\"interfererOn\" />\n              간섭원 활성\n            </label>\n            <button class=\"vis-button primary\" data-action=\"align\" type=\"button\" style=\"align-self:end\">조향 = 목표 정렬</button>\n          </div>\n\n          <h3 style=\"margin-top:14px\">빔 패턴 (Array Factor)</h3>\n          <svg class=\"bf-svg\" viewBox=\"0 0 ${W} ${H}\" preserveAspectRatio=\"xMidYMid meet\">\n            <circle cx=\"${CX}\" cy=\"${CY}\" r=\"${R}\" fill=\"none\" stroke=\"#d8e0ea\" stroke-dasharray=\"3 3\"/>\n            <circle cx=\"${CX}\" cy=\"${CY}\" r=\"${R * 0.5}\" fill=\"none\" stroke=\"#e4eaf3\" stroke-dasharray=\"2 3\"/>\n            <line x1=\"${CX - R}\" y1=\"${CY}\" x2=\"${CX + R}\" y2=\"${CY}\" stroke=\"#c2ccdb\" stroke-width=\"0.6\"/>\n            <path d=\"${beamPath()} Z\" fill=\"rgba(36,95,214,0.16)\" stroke=\"#245fd6\" stroke-width=\"2\"/>\n            ${angleLine(state.targetAngle, \"#11865a\", `UE (${state.targetAngle}°)`, true)}\n            ${state.interfererOn ? angleLine(state.interfererAngle, \"#d94242\", `간섭 (${state.interfererAngle}°)`, true) : \"\"}\n            ${angleLine(state.steeringAngle, \"#c86414\", `조향 (${state.steeringAngle}°)`)}\n            ${Array.from({ length: state.numAntennas }, (_, n) => {\n              const x = CX - (state.numAntennas - 1) * 12 + n * 24;\n              return `<rect x=\"${x - 5}\" y=\"${CY - 2}\" width=\"10\" height=\"10\" fill=\"#245fd6\"/>`;\n            }).join(\"\")}\n            <text x=\"${CX}\" y=\"${CY + 28}\" text-anchor=\"middle\" fill=\"#35475d\" font-size=\"11\" font-weight=\"900\">안테나 배열 (N=${state.numAntennas}, 간격 λ/2)</text>\n          </svg>\n\n          <div class=\"bf-metrics\">\n            <span class=\"ok\">목표 방향 이득: ${(targetGain * 100).toFixed(1)}% (${(20 * Math.log10(Math.max(0.001, targetGain))).toFixed(1)} dB)</span>\n            <span class=\"${state.interfererOn && interfGain > 0.1 ? \"bad\" : \"\"}\">간섭 방향 이득: ${(interfGain * 100).toFixed(1)}% (${state.interfererOn ? (20 * Math.log10(Math.max(0.001, interfGain))).toFixed(1) + \" dB\" : \"N/A\"})</span>\n            <span class=\"${sinr >= 10 ? \"ok\" : \"bad\"}\">SINR: ${sinr > 90 ? \"∞\" : sinr.toFixed(1) + \" dB\"}</span>\n          </div>\n\n          <h3 style=\"margin-top:14px\">안테나별 가중치 w<sub>n</sub></h3>\n          <div class=\"bf-weights\">\n            ${w.map((wv, n) => `<div class=\"bf-weight\">ANT${n}: <b>${wv.re.toFixed(2)} ${wv.im >= 0 ? \"+\" : \"\"}${wv.im.toFixed(2)}j</b></div>`).join(\"\")}\n          </div>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        state[el.dataset.control] = Number(e.target.value);\n        render();\n      });\n    });\n    root.querySelectorAll(\"[data-toggle]\").forEach((el) => {\n      el.addEventListener(\"change\", (e) => {\n        state[el.dataset.toggle] = e.target.checked;\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"align\"]')?.addEventListener(\"click\", () => {\n      state.steeringAngle = state.targetAngle;\n      render();\n    });\n  }\n\n  render();\n  return () => {};\n}\n", "O-DU/channel_estimation_equalization.js": "export const metadata = {\n  title: \"Channel Estimation & Equalization\",\n};\n\nexport function mount(root) {\n  const state = {\n    channelMag: 0.6,\n    channelPhase: 45,\n    noiseSigma: 0.08,\n    modulation: \"16QAM\",\n    seed: 0,\n  };\n\n  const constellations = {\n    QPSK: [[-1, -1], [-1, 1], [1, -1], [1, 1]].map(([i, q]) => [i / Math.SQRT2, q / Math.SQRT2]),\n    \"16QAM\": [],\n  };\n  for (let i = -3; i <= 3; i += 2) {\n    for (let q = -3; q <= 3; q += 2) {\n      constellations[\"16QAM\"].push([i / Math.sqrt(10), q / Math.sqrt(10)]);\n    }\n  }\n\n  function rng(seed) {\n    let s = seed * 9301 + 49297;\n    return () => {\n      s = (s * 9301 + 49297) % 233280;\n      return s / 233280;\n    };\n  }\n\n  function gaussian(rand) {\n    const u = Math.max(1e-6, rand());\n    const v = rand();\n    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);\n  }\n\n  function applyChannel(points) {\n    const rand = rng(state.seed + 1);\n    const phi = (state.channelPhase * Math.PI) / 180;\n    const h = { re: state.channelMag * Math.cos(phi), im: state.channelMag * Math.sin(phi) };\n    return points.map(([i, q]) => {\n      const yi = h.re * i - h.im * q + state.noiseSigma * gaussian(rand);\n      const yq = h.re * q + h.im * i + state.noiseSigma * gaussian(rand);\n      return [yi, yq];\n    });\n  }\n\n  function equalize(points) {\n    const phi = (state.channelPhase * Math.PI) / 180;\n    const h = { re: state.channelMag * Math.cos(phi), im: state.channelMag * Math.sin(phi) };\n    const denom = h.re * h.re + h.im * h.im + 1e-6;\n    return points.map(([yi, yq]) => {\n      const ei = (yi * h.re + yq * h.im) / denom;\n      const eq = (yq * h.re - yi * h.im) / denom;\n      return [ei, eq];\n    });\n  }\n\n  const SIZE = 280;\n  const SCALE = SIZE * 0.35;\n  const CX = SIZE / 2;\n  const CY = SIZE / 2;\n\n  function plot(points, color, refPoints, title) {\n    const dots = points.map(([i, q], idx) => {\n      const ref = refPoints[idx];\n      return `\n        <line x1=\"${CX + ref[0] * SCALE}\" y1=\"${CY - ref[1] * SCALE}\" x2=\"${CX + i * SCALE}\" y2=\"${CY - q * SCALE}\" stroke=\"${color}\" stroke-width=\"0.5\" opacity=\"0.3\"/>\n        <circle cx=\"${CX + i * SCALE}\" cy=\"${CY - q * SCALE}\" r=\"3.5\" fill=\"${color}\"/>\n      `;\n    }).join(\"\");\n    const refs = refPoints.map(([i, q]) => `\n      <circle cx=\"${CX + i * SCALE}\" cy=\"${CY - q * SCALE}\" r=\"4\" fill=\"none\" stroke=\"#94a4ba\" stroke-width=\"1\" stroke-dasharray=\"2 2\"/>\n    `).join(\"\");\n    return `\n      <div class=\"eq-plot\">\n        <h4>${title}</h4>\n        <svg viewBox=\"0 0 ${SIZE} ${SIZE}\" class=\"eq-svg\">\n          <rect width=\"${SIZE}\" height=\"${SIZE}\" fill=\"#fbfdff\"/>\n          <line x1=\"0\" y1=\"${CY}\" x2=\"${SIZE}\" y2=\"${CY}\" stroke=\"#c2ccdb\" stroke-width=\"0.6\"/>\n          <line x1=\"${CX}\" y1=\"0\" x2=\"${CX}\" y2=\"${SIZE}\" stroke=\"#c2ccdb\" stroke-width=\"0.6\"/>\n          ${refs}\n          ${dots}\n          <text x=\"${SIZE - 6}\" y=\"${CY - 4}\" text-anchor=\"end\" fill=\"#607083\" font-size=\"10\" font-weight=\"900\">I</text>\n          <text x=\"${CX + 4}\" y=\"12\" fill=\"#607083\" font-size=\"10\" font-weight=\"900\">Q</text>\n        </svg>\n      </div>\n    `;\n  }\n\n  function render() {\n    const refs = constellations[state.modulation];\n    const received = applyChannel(refs);\n    const equalized = equalize(received);\n\n    const mseRx = received.reduce((acc, [i, q], idx) => acc + (i - refs[idx][0]) ** 2 + (q - refs[idx][1]) ** 2, 0) / refs.length;\n    const mseEq = equalized.reduce((acc, [i, q], idx) => acc + (i - refs[idx][0]) ** 2 + (q - refs[idx][1]) ** 2, 0) / refs.length;\n\n    root.innerHTML = `\n      <style>\n        .eq-demo h2 { margin:0; font-size:28px; }\n        .eq-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .eq-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .eq-card h3 { margin:0 0 6px; font-size:17px; color:#1d2c3f; }\n        .eq-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:10px; margin-top:10px; }\n        .eq-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:13px; }\n        .eq-plots { display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:10px; }\n        .eq-plot h4 { margin:0 0 4px; font-size:13px; text-align:center; color:#1d2c3f; }\n        .eq-svg { width:100%; display:block; border-radius:6px; border:1px solid #d8e0ea; }\n        .eq-metrics { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }\n        .eq-metrics span { padding:7px 10px; border-radius:7px; background:#eef3fa; font-weight:900; color:#26384b; font-size:13px; }\n        .eq-metrics span.good { background:#e4f8ec; color:#0d6744; }\n        .eq-metrics span.bad { background:#ffe8e8; color:#a02828; }\n        .eq-legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:6px; font-weight:900; font-size:1 ></i>송신 (Tx)</span>\n            <span><i style=\"background:#d94242\"></i>수신 Y = H·X + n</span>\n            <span><i style=\"background:#11865a\"></i>등화 후 X̂ = Y/Ĥ</span>\n          </div>\n\n          <div class=\"eq-plots\">\n            ${plot(refs, \"#245fd6\", refs, \"Tx 별자리 X\")}\n            ${plot(received, \"#d94242\", refs, \"Rx (왜곡 + 잡음)\")}\n            ${plot(equalized, \"#11865a\", refs, \"등화 후 X̂\")}\n          </div>\n\n          <div class=\"eq-metrics\">\n            <span>추정 채널 Ĥ: ${state.channelMag.toFixed(2)} ∠ ${state.channelPhase}°</span>\n            <span class=\"bad\">Rx MSE: ${mseRx.toFixed(3)}</span>\n            <span class=\"good\">등화 후 MSE: ${mseEq.toFixed(3)}</span>\n            <span>MSE 개선: <b>${((1 - mseEq / Math.max(mseRx, 1e-6)) * 100).toFixed(1)}%</b></span>\n          </div>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(el.tagName === \"SELECT\" ? \"change\" : \"input\", (e) => {\n        const key = el.dataset.control;\n        const val = el.tagName === \"SELECT\" ? e.target.value : Number(e.target.value);\n        state[key] = val;\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"noise\"]')?.addEventListener(\"click\", () => {\n      state.seed += 1;\n      render();\n    });\n  }\n\n  render();\n  return () => {};\n}\n", "O-DU/qam_demodulation_llr.js": "export const metadata = {\n  title: \"QAM 복조와 LLR 계산\",\n};\n\nexport function mount(root) {\n  const state = {\n    rxI: 0.55,\n    rxQ: 0.35,\n    sigma2: 0.15,\n  };\n\n  const points = [];\n  for (let bi = 0; bi < 4; bi += 1) {\n    for (let bq = 0; bq < 4; bq += 1) {\n      const i = -3 + bi * 2;\n      const q = -3 + bq * 2;\n      const bits = grayLabel(bi, bq);\n      points.push({ i: i / Math.sqrt(10), q: q / Math.sqrt(10), bits });\n    }\n  }\n\n  function grayLabel(bi, bq) {\n    const iGray = bi ^ (bi >> 1);\n    const qGray = bq ^ (bq >> 1);\n    return `${((iGray >> 1) & 1)}${((qGray >> 1) & 1)}${(iGray & 1)}${(qGray & 1)}`;\n  }\n\n  function dist2(a, b) {\n    return (a[0] - b[0]) ** 2 + (a[1] - b[1]) ** 2;\n  }\n\n  function computeLlr() {\n    const llrs = [0, 0, 0, 0].map(() => ({ plus: [], minus: [] }));\n    points.forEach((p) => {\n      for (let b = 0; b < 4; b += 1) {\n        const bit = Number(p.bits[b]);\n        const d = dist2([state.rxI, state.rxQ], [p.i, p.q]);\n        if (bit === 0) llrs[b].plus.push(d);\n        else llrs[b].minus.push(d);\n      }\n    });\n    return llrs.map((groups) => {\n      const minPlus = Math.min(...groups.plus);\n      const minMinus = Math.min(...groups.minus);\n      return (minMinus - minPlus) / state.sigma2;\n    });\n  }\n\n  const SIZE = 360;\n  const SCALE = SIZE * 0.35;\n  const CX = SIZE / 2;\n  const CY = SIZE / 2;\n\n  function toPx(p) {\n    return [CX + p[0] * SCALE, CY - p[1] * SCALE];\n  }\n\n  function render() {\n    const llrs = computeLlr();\n    const hard = llrs.map((v) => (v >= 0 ? 0 : 1));\n\n    let closest = 0;\n    let minD = Infinity;\n    points.forEach((p, idx) => {\n      const d = dist2([state.rxI, state.rxQ], [p.i, p.q]);\n      if (d < minD) { minD = d; closest = idx; }\n    });\n\n    const dotsSvg = points.map((p, idx) => {\n      const [x, y] = toPx([p.i, p.q]);\n      const isClosest = idx === closest;\n      return `\n        <circle cx=\"${x}\" cy=\"${y}\" r=\"${isClosest ? 6 : 4}\" fill=\"${isClosest ? \"#c86414\" : \"#245fd6\"}\" stroke=\"${isClosest ? \"#8a400b\" : \"none\"}\" stroke-width=\"${isClosest ? 1 : 0}\"/>\n        <text x=\"${x + 7}\" y=\"${y - 6}\" font-size=\"9\" fill=\"#35475d\" font-weight=\"900\">${p.bits}</text>\n      `;\n    }).join(\"\");\n\n    const [rxX, rxY] = toPx([state.rxI, state.rxQ]);\n\n    const bitLabels = [\"b₀ (I MSB)\", \"b₁ (Q MSB)\", \"b₂ (I LSB)\", \"b₃ (Q LSB)\"];\n\n    root.innerHTML = `\n      <style>\n        .demod-demo h2 { margin:0; font-size:28px; }\n        .demod-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .demod-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .demod-card h3 { margin:0 0 6px; font-size:17px; color:#1d2c3f; }\n        .demod-grid { display:grid; grid-template-columns:${SIZE + 20}px 1fr; gap:16px; align-items:start; }\n        @media (max-width: 720px) { .demod-grid { grid-template-columns:1fr; } }\n        .demod-svg { width:100%; display:block; background:#fbfdff; border-radius:8px; border:1px solid #d8e0ea; cursor:crosshair; }\n        .demod-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:8px; margin-top:8px; }\n        .demod-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:12px; }\n        .llr-grid { display:grid; grid-template-columns:1fr; gap:8px; }\n        .llr-bar {\n          padding:10px 12px; border-radius:8px; background:#f1f5fa; border:1px solid #d6dfec;\n          display:grid; grid-template-columns:100px 1fr 60px 40px; gap:10px; align-items:center;\n        }\n        .llr-bar.pos { background:#e4f8ec; border-color:#11865a; }\n        .llr-bar.neg { background:#ffe8e8; border-color:#d94242; }\n        .llr-bar b { font-weight:900; font-size:13px; }\n        .llr-bar .track { height:14px; background:#d8e0ea; border-radius:10px; position:relative; overflow:hidden; }\n        .llr-bar .fill { position:absolute; top:0; bottom:0; border-radius:10px; }\n        .llr-bar.pos .fill { background:#11865a; left:50%; }\n        .llr-bar.neg .fill { background:#d94242; right:50%; }\n        .llr-bar .track .mid { position:absolute; top:-2px; bottom:-2px; left:50%; width:1px; background:#607083; }\n        .llr-bar .hard {\n          display:grid; place-items:center; font-size:20px; font-weight:900;\n          width:36px; height:36px; border-radius:50%; color:#fff;\n        }\n        .llr-bar.pos .hard { background:#11865a; }\n        .llr-bar.neg .hard { background:#d94242; }\n        .demod-note { padding:10px 12px; background:#f5f9ff; border:1px solid #d6e3f5; border-radius:8px; font-size:12px; font-weight:900; color:#33465b; margin-top:10px; line-height:1.4; }\n      </style>\n\n      <div class=\"vis-panel demod-demo\">\n        <section>\n          <h2>16-QAM 복조: 수신 심볼 → LLR</h2>\n          <p class=\"hint\">복조기는 별자리 위 수신 심볼 y에 대해 각 비트가 0/1일 가능성을 LLR로 계산합니다. LLR = (최근접 0 거리 − 최근접 1 거리) / σ². 플롯을 드래그해 수신 심볼 위치를 바꿔보세요.</p>\n        </section>\n\n        <section class=\"demod-card\">\n          <div class=\"demod-grid\">\n            <div>\n              <svg class=\"demod-svg\" viewBox=\"0 0 ${SIZE} ${SIZE}\" data-plot>\n                <line x1=\"0\" y1=\"${CY}\" x2=\"${SIZE}\" y2=\"${CY}\" stroke=\"#c2ccdb\" stroke-width=\"0.8\"/>\n                <line x1=\"${CX}\" y1=\"0\" x2=\"${CX}\" y2=\"${SIZE}\" stroke=\"#c2ccdb\" stroke-width=\"0.8\"/>\n                <line x1=\"${CX}\" y1=\"0\" x2=\"${CX}\" y2=\"${SIZE}\" stroke=\"#d8e0ea\" stroke-dasharray=\"3 3\"/>\n                <line x1=\"0\" y1=\"${CY}\" x2=\"${SIZE}\" y2=\"${CY}\" stroke=\"#d8e0ea\" stroke-dasharray=\"3 3\"/>\n                ${dotsSvg}\n                <circle cx=\"${rxX}\" cy=\"${rxY}\" r=\"8\" fill=\"none\" stroke=\"#d94242\" stroke-width=\"2\" />\n                <circle cx=\"${rxX}\" cy=\"${rxY}\" r=\"3\" fill=\"#d94242\"/>\n                <text x=\"${rxX + 10}\" y=\"${rxY + 4}\" font-size=\"11\" fill=\"#a02828\" font-weight=\"900\">y (Rx)</text>\n                <text x=\"${SIZE - 6}\" y=\"${CY - 4}\" text-anchor=\"end\" fill=\"#607083\" font-size=\"10\" font-weight=\"900\">I</text>\n                <text x=\"${CX + 4}\" y=\"12\" fill=\"#607083\" font-size=\"10\" font-weight=\"900\">Q</text>\n              </svg>\n              <div class=\"demod-controls\">\n                <label>I 성분: <b>${state.rxI.toFixed(2)}</b>\n                  <input type=\"range\" min=\"-1.3\" max=\"1.3\" step=\"0.02\" value=\"${state.rxI}\" data-control=\"rxI\"/>\n                </label>\n                <label>Q 성분: <b>${state.rxQ.toFixed(2)}</b>\n                  <input type=\"range\" min=\"-1.3\" max=\"1.3\" step=\"0.02\" value=\"${state.rxQ}\" data-control=\"rxQ\"/>\n                </label>\n                <label>잡음분산 σ²: <b>${state.sigma2.toFixed(2)}</b>\n                  <input type=\"range\" min=\"0.02\" max=\"0.5\" step=\"0.01\" value=\"${state.sigma2}\" data-control=\"sigma2\"/>\n                </label>\n              </div>\n            </div>\n\n            <div>\n              <h3>비트별 LLR 값</h3>\n              <div class=\"llr-grid\">\n                ${llrs.map((v, i) => {\n                  const pct = Math.min(100, Math.abs(v) * 10);\n                  const cls = v >= 0 ? \"pos\" : \"neg\";\n                  return `\n                    <div class=\"llr-bar ${cls}\">\n                      <b>${bitLabels[i]}</b>\n                      <div class=\"track\">\n                        <span class=\"mid\"></span>\n                        <span class=\"fill\" style=\"width:${pct / 2}%\"></span>\n                      </div>\n                      <span>${v >= 0 ? \"+\" : \"\"}${v.toFixed(2)}</span>\n                      <span class=\"hard\">${hard[i]}</span>\n                    </div>\n                  `;\n                }).join(\"\")}\n              </div>\n              <div class=\"demod-note\">\n                최근접 심볼: <b style=\"color:#c86414\">${points[closest].bits}</b><br>\n                하드 판정 결과: <b>${hard.join(\"\")}</b><br>\n                LLR이 0에 가까울수록 해당 비트는 불확실합니다 → LDPC 복호기가 이 소프트 정보로 오류를 정정합니다.\n              </div>\n            </div>\n          </div>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        state[el.dataset.control] = Number(e.target.value);\n        render();\n      });\n 0 : 300;\n      schedule(() => {\n        packet.mac = \"ACK\";\n        packet.rlc = \"수신\";\n        log(`패킷 ${id}: HARQ ACK, RLC로 전달`);\n        render();\n      }, delay);\n    }\n  }\n\n  function handleRlc() {\n    const missing = packets.some((packet) => packet.id === 3 && packet.rlc === \"누락\");\n    if (!missing) return;\n\n    if (mode === \"AM\") {\n      arqRequest = true;\n      log(\"RLC AM: 3번 누락 감지 → ARQ STATUS 요청 송신\");\n      render();\n      schedule(() => {\n        const packet = packets.find((item) => item.id === 3);\n        packet.tx = \"ARQ 재송신\";\n        packet.mac = \"재수신\";\n        packet.rlc = \"ARQ 복구\";\n        rlcOutput = [1, 2, 3, 4];\n        running = false;\n        log(\"RLC AM: 3번 패킷을 다시 받아 순서 복구 완료\");\n        render();\n      }, 1200);\n    } else {\n      arqRequest = false;\n      packets.find((item) => item.id === 3).rlc = \"생략\";\n      rlcOutput = [1, 2, 4];\n      running = false;\n      log(\"RLC UM: 3번 빈 공간을 무시하고 4번으로 진행\");\n      render();\n    }\n  }\n\n  function packetCard(packet) {\n    const cls = packet.mac === \"Drop\" ? \"drop\" : packet.mac === \"ACK\" || packet.rlc === \"ARQ 복구\" ? \"ok\" : packet.mac.includes(\"재전송\") ? \"retry\" : \"\";\n    return `<div class=\"harq-packet ${cls}\">\n      <strong>패킷 ${packet.id}</strong>\n      <span>송신단: ${packet.tx}</span>\n      <span>MAC: ${packet.mac}</span>\n      <span>RLC: ${packet.rlc}</span>\n      ${packet.mac === \"Drop\" ? `<b class=\"drop-mark\">X</b>` : \"\"}\n    </div>`;\n  }\n\n  function render() {\n    root.innerHTML = `\n      <style>\n        .harq-demo h2 { margin:0; font-size:32px; }\n        .harq-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; }\n        .harq-controls { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }\n        .harq-controls label { display:inline-flex; align-items:center; gap:8px; min-height:44px; padding:10px 12px; border:1px solid var(--line); border-radius:8px; background:#fff; font-weigh \n}\n", "O-DU/rlc_mac_multiplexing.js": "export const metadata = {\n  title: \"다중 RLC 엔티티 & MAC Multiplexing\",\n};\n\nexport function mount(root) {\n  let sequence = 1;\n  let lanes = { web: [], voice: [], control: [] };\n  let macPackets = [];\n  let transportBlocks = [];\n  let logs = [];\n  const timers = new Set();\n\n  const service = {\n    web: {\n      label: \"웹 다운로드\",\n      short: \"WEB\",\n      lane: \"RLC 1\",\n      mode: \"AM\",\n      color: \"#245fd6\",\n      delay: 950,\n      description: \"AM 모드: 검증 후 통과\",\n    },\n    voice: {\n      label: \"음성 통화\",\n      short: \"VOICE\",\n      lane: \"RLC 2\",\n      mode: \"UM\",\n      color: \"#11865a\",\n      delay: 120,\n      description: \"UM 모드: 지연 없이 통과\",\n    },\n    control: {\n      label: \"RRC 제어 신호\",\n      short: \"RRC\",\n      lane: \"RLC 3\",\n      mode: \"AM\",\n      color: \"#d94242\",\n      delay: 950,\n      description: \"AM 모드: 신뢰성 검증\",\n    },\n  };\n\n  function schedule(callback, delay) {\n    const timer = window.setTimeout(() => {\n      timers.delete(timer);\n      callback();\n    }, delay);\n    timers.add(timer);\n  }\n\n  function log(message) {\n    const time = new Date().toLocaleTimeString(\"ko-KR\", { hour12: false });\n    logs.unshift(`[${time}] ${message}`);\n    logs = logs.slice(0, 9);\n  }\n\n  function createPacket(type) {\n    const info = service[type];\n    const packet = {\n      id: sequence,\n      type,\n      status: info.mode === \"AM\" ? \"검증 중\" : \"즉시 통과\",\n      createdAt: Date.now(),\n    };\n    sequence += 1;\n    lanes[type].push(packet);\n    log(`${info.label} 패킷 ${packet.id} 생성 → ${info.lane} (${info.mode})로 라우팅`);\n    render();\n\n    schedule(() => moveToMac(packet.id, type), info.delay);\n  }\n\n  function moveToMac(packetId, type) {\n    const lanePacket = lanes[type].find((packet) => packet.id === packetId);\n    if (!lanePacket) return;\n\n    lanes[type] = lanes[type].filter((packet) => packet.id !== packetId);\n    macPackets.push({ ...lanePacket, status: \"MAC 대기\" });\n    log(`${service[type].label} 패킷 ${packetId} → MAC 계층 도착`);\n    render();\n    schedule(mergeToTransportBlock, 1300);\n  }\n\n  function mergeToTransportBlock() {\n    if (macPackets.length < 2) return;\n    const block = {\n      id: transportBlocks.length + 1,\n      packets: [...macPackets],\n    };\n    transportBlocks.push(block);\n    macPackets = [];\n    log(`MAC Multiplexing: ${block.packets.length}개 패킷이 Transport Block ${block.id}로 병합`);\n    render();\n  }\n\n  function reset() {\n    timers.forEach((timer) => window.clearTimeout(timer));\n    timers.clear();\n    sequence = 1;\n    lanes = { web: [], voice: [], control: [] };\n    macPackets = [];\n    transportBlocks = [];\n    logs = [];\n    render();\n  }\n\n  function packetHtml(packet, extraClass = \"\") {\n    const info = service[packet.type];\n    return `<span class=\"route-packet ${extraClass}\" style=\"--packet-color:${info.color}\">\n      <b>${info.short}-${packet.id}</b>\n      <small>${packet.status}</small>\n    </span>`;\n  }\n\n  function laneHtml(type) {\n    const info = service[type];\n    return `\n      <article class=\"rlc-lane\" style=\"--lane-color:${info.color}\">\n        <div class=\"lane-head\">\n          <strong>${info.lane}</strong>\n          <span>${info.label}</span>\n          <em>${info.mode}</em>\n        </div>\n        <p>${info.description}</p>\n        <div class=\"lane-dropzone\">\n          ${lanes[type].length ? lanes[type].map((packet) => packetHtml(packet, info.mode === \"AM\" ? \"checking\" : \"fast\")).join(\"\") : `<span class=\"empty-lane\">대기 중</span>`}\n        </div>\n      </article>\n    `;\n  }\n\n  function render() {\n    root.innerHTML = `\n      <style>\n        .mux-demo h2 { margin:0; font-size:32px; }\n        .mux-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; }\n        .button-panel { display:flex; flex-wrap:wrap; gap:10px; }\n        .route-stage { display:grid;
