metric { padding:10px 12px; border-radius:8px; background:#f1f5fa; border:1px solid #d6dfec; }\n        .se-metric b { display:block; font-size:20px; color:#0f1b2b; }\n        .se-metric small { color:#607083; font-weight:900; font-size:11px; }\n        .se-metric.good { background:#eef9f2; border-color:#a9d7bd; }\n        .se-metric.good b { color:#0d6744; }\n        .se-split { display:grid; grid-template-columns:${embedSize + 20}px 1fr; gap:16px; align-items:start; margin-top:10px; }\n        @media (max-width:780px) { .se-split { grid-template-columns:1fr; } }\n        .se-embed { width:${embedSize}px; max-width:100%; display:block; background:#fbfdff; border-radius:8px; border:1px solid #d8e0ea; }\n        .se-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:8px; margin-top:8px; }\n        .se-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:13px; }\n      </style>\n\n      <div class=\"vis-panel se-demo\">\n        <section>\n          <h2>sLLM Encoder: Extract Meaning from a Sentence</h2>\n          <p class=\"hint\">A small LLM discards filler and common words, keeping only the key contextual tokens. The compressed token count becomes the amount of meaning to transmit.</p>\n        </section>\n\n        <section class=\"se-card\">\n          <h3>1. Input Message</h3>\n          <input class=\"se-input\" value=\"${state.text.replace(/\"/g, \"&quot;\")}\" data-input/>\n          <div class=\"se-presets\">\n            ${presets.map((p, i) => `<button class=\"vis-button\" data-preset=\"${i}\" type=\"button\">${p.slice(0, 18)}…</button>`).join(\"\")}\n          </div>\n\n          <div class=\"se-controls\">\n            <label>Top-K kept tokens: <b>${state.topK}</b>\n              <input type=\"range\" min=\"1\" max=\"10\" step=\"1\" value=\"${state.topK}\" data-control=\"topK\"/>\n            </label>\n          </div>\n        </section>\n\n        <section class=\"se-card\">\n          <h3>2. Token Importance (estimated sLLM attention)</h3>\n          <p class=\"sub\">Only tokens selected by Top-K are transmitted. The receiver-side KB fills the rest from context.</p>\n          <div class=\"se-tokens\">\n            ${tokens.map((t) => `\n              <div class=\"se-token ${topSet.has(t.core) ? \"top\" : \"\"} ${t.isStop ? \"stop\" : \"\"}\">\n                <b>${t.word}</b>\n                <small>${(t.importance * 100).toFixed(0)}%</small>\n              </div>\n            `).join(\"\")}\n          </div>\n        </section>\n\n        <section class=\"se-card\">\n          <h3>3. Transmitted Token Sequence</h3>\n          <div class=\"se-top-row\">\n            ${topTokens.length === 0 ? `<small style=\"color:#607083;font-weight:900\">No important tokens found. Enter a longer sentence.</small>` : topTokens.map((t) => `<span class=\"se-top-chip\">${t.core}</span>`).join(\"\")}\n          </div>\n\n          <div class=\"se-split\">\n            ${embedSvg()}\n            <div>\n              <h3>4. Compression Efficiency</h3>\n              <div class=\"se-metrics\">\n                <div class=\"se-metric\">\n                  <small>Traditional communication (UTF-8)</small>\n                  <b>${traditionalBits} bits</b>\n                  <small>${utf8Bytes} bytes · bit-level</small>\n                </div>\n                <div class=\"se-metric good\">\n                  <small>Semantic (Top-K tokens)</small>\n                  <b>${tokenBits} bits</b>\n                  <small>${topTokens.length} tokens × 10 bits</small>\n                </div>\n                <div class=\"se-metric good\">\n                  <small>Compression ratio</small>\n                  <b>${compression.toFixed(1)}×</b>\n                  <small>vs original</small>\n                </div>\n              </div>\n              <p style=\"margin-top:10px; font-size:12px; color:#4f6073; font-weight:800; line-height:1.4\">\n                → Selected tokens are converted into codebook indices in the next <b>Vector Quantization</b> step.\n              </p>\n            </div>\n          </div>\n        </section>\n      </div>\n    `;\n\n    root.querySelector(\"[data-input]\")?.addEventListener(\"input\", (e) => {\n      state.text = e.target.value;\n      render();\n    });\n    root.querySelectorAll(\"[data-preset]\").forEach((el) => {\n      el.addEventListener(\"click\", () => {\n        state.text = presets[Number(el.dataset.preset)];\n        render();\n      });\n    });\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        state[el.dataset.control] = Number(e.target.value);\n        render();\n      });\n    });\n  }\n\n  render();\n  return () => {};\n}\n", "semcom/vector_quantization.js": "export const metadata = {\n  title: \"Vector Quantization: Embedding → Bits\",\n};\n\nexport function mount(root) {\n  const state = {\n    codebookSizeBits: 4,\n    query: { x: 0.2, y: 0.35 },\n    seed: 7,\n    tokens: [\n      { label: \"apple\", x: 0.55, y: 0.40 },\n      { label: \"banana\", x: 0.48, y: 0.52 },\n      { label: \"train\", x: -0.52, y: -0.38 },\n      { label: \"meeting\", x: -0.30, y: 0.55 },\n      { label: \"heavy rain\", x: -0.65, y: 0.20 },\n    ],\n    selectedToken: 0,\n  };\n\n  function seeded(seed) {\n    let s = seed;\n    return () => {\n      s = (s * 9301 + 49297) % 233280;\n      return s / 233280;\n    };\n  }\n\n  function buildCodebook() {\n    const K = Math.pow(2, state.codebookSizeBits);\n    const rand = seeded(state.seed);\n    const centers = [];\n    for (let i = 0; i < K; i += 1) {\n      const r = 0.35 + rand() * 0.55;\n      const theta = 2 * Math.PI * rand();\n      centers.push({ id: i, x: r * Math.cos(theta), y: r * Math.sin(theta) });\n    }\n    return centers;\n  }\n\n  function nearestIndex(p, centers) {\n    let best = 0;\n    let bestD = Infinity;\n    centers.forEach((c, i) => {\n      const d = (c.x - p.x) ** 2 + (c.y - p.y) ** 2;\n      if (d < bestD) { bestD = d; best = i; }\n    });\n    return { idx: best, dist: Math.sqrt(bestD) };\n  }\n\n  function toBits(idx, width) {\n    return idx.toString(2).padStart(width, \"0\");\n  }\n\n  const SIZE = 400;\n  const CX = SIZE / 2;\n  const CY = SIZE / 2;\n  const SCALE = SIZE * 0.42;\n\n  function render() {\n    const centers = buildCodebook();\n    const activeQuery = state.selectedToken >= 0 ? state.tokens[state.selectedToken] : state.query;\n    const { idx, dist } = nearestIndex(activeQuery, centers);\n    const chosen = centers[idx];\n    const bits = toBits(idx, state.codebookSizeBits);\n\n    root.innerHTML = `\n      <style>\n        .vq-demo h2 { margin:0; font-size:26px; }\n        .vq-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .vq-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .vq-card h3 { margin:0 0 6px; font-size:16px; color:#1d2c3f; }\n        .vq-grid { display:grid; grid-template-columns:${SIZE + 20}px 1fr; gap:16px; align-items:start; }\n        @media (max-width:780px) { .vq-grid { grid-template-columns:1fr; } }\n        .vq-svg { width:${SIZE}px; max-width:100%; display:block; background:#fbfdff; border-radius:8px; border:1px solid #d8e0ea; cursor:crosshair; }\n        .vq-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:8px; }\n        .vq-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:13px; }\n        .vq-tokens { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }\n        .vq-tok { padding:6px 10px; border-radius:999px; background:#f1f5fa; border:2px solid #d6dfec; font-weight:900; font-size:12px; cursor:pointer; }\n        .vq-tok.active { background:#1a8a9d; border-color:#1a8a9d; color:#fff; }\n        .vq-out {\n          padding:12px 14px; border-radius:8px; background:#f1f5fa; border:1px solid #d6dfec;\n          font-family:Consolas, monospace; font-weight:900; line-height:1.6; font-size:14px;\n        }\n        .vq-bits {\n          display:inline-flex; gap:4px; margin-left:4px;\n        }\n        .vq-bits span {\n          width:26px; height:26px; display:grid; place-items:center;\n          border-radius:4px; background:#1a8a9d; color:#fff; font-weight:900; font-size:13px;\n        }\n        .vq-bits span.zero { background:#cbd6e4; color:#0f1b2b; }\n        .vq-metrics { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }\n        .vq-metrics span { padding:7px 10px; border-radius:7px; background:#eef3fa; font-weight:900; color:#26384b; font-size:13px; }\n        .vq-metrics span.warn { background:#fff6db; color:#8a4f03; }\n        .vq-metrics span.good { background:#e4f8ec; color:#0d6744; }\n      </style>\n\n      <div class=\"vis-panel vq-demo\">\n        <section>\n          <h2>Vector Quantization: Continuous Embeddings to Bitstreams</h2>\n          <p class=\"hint\">Continuous vectors from the sLLM cannot be sent directly over the radio channel. VQ maps each vector to the nearest centroid in a learned codebook, creating a bitstream compatible with existing digital networks.</p>\n        </section>\n\n        <section class=\"vq-card\">\n          <h3>1. Select a token or click the embedding space</h3>\n          <div class=\"vq-tokens\">\n            ${state.tokens.map((t, i) => `<button class=\"vq-tok ${state.selectedToken === i ? \"active\" : \"\"}\" data-token=\"${i}\" type=\"button\">${t.label}</button>`).join(\"\")}\n            <button class=\"vq-tok ${state.selectedToken === -1 ? \"active\" : \"\"}\" data-token=\"-1\" type=\"button\">Free input (drag)</button>\n          </div>\n          <div class=\"vq-controls\" style=\"margin-top:10px\">\n            <label>Codebook size (bits): <b>${state.codebookSizeBits} bit</b> → ${Math.pow(2, state.codebookSizeBits)}centroids\n              <input type=\"range\" min=\"2\" max=\"7\" step=\"1\" value=\"${state.codebookSizeBits}\" data-control=\"codebookSizeBits\"/>\n            </label>\n            <button class=\"vis-button\" data-action=\"reseed\" type=\"button\">Retrain codebook (random seed)</button>\n          </div>\n        </section>\n\n        <section class=\"vq-card\">\n          <div class=\"vq-grid\">\n            <svg class=\"vq-svg\" viewBox=\"0 0 ${SIZE} ${SIZE}\" data-plot>\n              <line x1=\"0\" y1=\"${CY}\" x2=\"${SIZE}\" y2=\"${CY}\" stroke=\"#e6ecf3\"/>\n              <line x1=\"${CX}\" y1=\"0\" x2=\"${CX}\" y2=\"${SIZE}\" stroke=\"#e6ecf3\"/>\n              <circle cx=\"${CX}\" cy=\"${CY}\" r=\"${SCALE}\" fill=\"none\" stroke=\"#d8e0ea\" stroke-dasharray=\"3 3\"/>\n\n              ${centers.map((c, i) => {\n                const px = CX + c.x * SCALE;\n                const py = CY - c.y * SCALE;\n                const isChosen = i === idx;\n                return `\n                  <circle cx=\"${px}\" cy=\"${py}\" r=\"${isChosen ? 10 : 6}\" fill=\"${isChosen ? \"#1a8a9d\" : \"#cbd6e4\"}\" stroke=\"${isChosen ? \"#0b5b69\" : \"#94a4ba\"}\" stroke-width=\"${isChosen ? 2 : 0.5}\"/>\n                  <text x=\"${px}\" y=\"${py + 3}\" text-anchor=\"middle\" font-size=\"${isChosen ? 10 : 9}\" fill=\"${isChosen ? \"#fff\" : \"#35475d\"}\" font-weight=\"900\">${i}</text>\n                `;\n              }).join(\"\")}\n\n              ${(() => {\n                const qx = CX + activeQuery.x * SCALE;\n                const qy = CY - activeQuery.y * SCALE;\n                const cx = CX + chosen.x * SCALE;\n                const cy = CY - chosen.y * SCALE;\n                return `\n                  <line x1=\"${qx}\" y1=\"${qy}\" x2=\"${cx}\" y2=\"${cy}\" stroke=\"#d94242\" stroke-width=\"1.5\" stroke-dasharray=\"4 3\"/>\n                  <circle cx=\"${qx}\" cy=\"${qy}\" r=\"7\" fill=\"none\" stroke=\"#6b43bd\" stroke-width=\"2.5\"/>\n                  <circle cx=\"${qx}\" cy=\"${qy}\" r=\"3\" fill=\"#6b43bd\"/>\n                  <text x=\"${qx + 10}\" y=\"${qy + 4}\" font-size=\"11\" font-weight=\"900\" fill=\"#4f2a9c\">${state.selectedToken >= 0 ? state.tokens[state.selectedToken].label : \"query\"}</text>\n                `;\n              })()}\n\n              <text x=\"${SIZE - 6}\" y=\"${CY - 4}\" text-anchor=\"end\" font-size=\"10\" fill=\"#607083\" font-weight=\"900\">Embedding dimension 1</text>\n              <text x=\"${CX + 4}\" y=\"12\" font-size=\"10\" fill=\"#607083\" font-weight=\"900\">Embedding dimension 2</text>\n            </svg>\n\n            <div>\n              <h3>2. VQ Result</h3>\n              <div class=\"vq-out\">\n                Input embedding: ( ${activeQuery.x.toFixed(3)}, ${activeQuery.y.toFixed(3)} )<br>\n                Nearest codeword index: <span style=\"color:#1a8a9d\">${idx}</span><br>\n                Quantization error ||x − c<sub>i</sub>||: <span style=\"color:#8a4f03\">${dist.toFixed(3)}</span><br>\n                <br>\n                Transmitted bitstream (${state.codebookSizeBits}-bit):\n                <span class=\"vq-bits\">${[...bits].map((b) => `<span class=\"${b === \"0\" ? \"zero\" : \"\"}\">${b}</span>`).join(\"\")}</span>\n              </div>\n\n              <div class=\"vq-metrics\">\n                <span>Codebook size K = ${Math.pow(2, state.codebookSizeBits)}</span>\n                <span class=\"${dist < 0.1 ? \"good\" : \"warn\"}\">Quantization error: ${dist.toFixed(3)}</span>\n                <span>Transmitted bits/token: ${state.codebookSizeBits} bit</span>\n              </div>\n\n              <h3 style=\"margin-top:12px\">3. Notes</h3>\n              <p style=\"margin:0; font-size:13px; color:#4f6073; font-weight:800; line-height:1.5\">\n                • A larger codebook reduces quantization error but increases transmitted bit count.<br>\n                • The learned codebook reflects the <b>structure</b> of semantic space, so similar meanings tend to have near way (120 km/h)\", baseSnr: 14, fade: 3.0, mobility: 0.9 },\n    rural: { label: \"Suburban LoS\", baseSnr: 22, fade: 1.5, mobility: 0.3 },\n    satellite: { label: \"Satellite link (SAGIN)\", baseSnr: 6, fade: 2.0, mobility: 0.6 },\n  };\n\n  const state = {\n    env: \"urban\",\n    time: 0,\n    history: [],\n    running: true,\n    timer: null,\n    worldModelOn: true,\n  };\n\n  const tokenPool = [\n    { token: \"urgent\", priority: 1.0 },\n    { token: \"fire\", priority: 0.95 },\n    { token: \"Gangnam Station\", priority: 0.9 },\n    { token: \"Exit 3\", priority: 0.85 },\n    { token: \"evacuate\", priority: 0.95 },\n    { token: \"now\", priority: 0.8 },\n    { token: \"people\", priority: 0.6 },\n    { token: \"many people\", priority: 0.5 },\n  ];\n\n  function predictSnr(t) {\n    const env = environments[state.env];\n    const trend = Math.sin(t * 0.12);\n    const fade = Math.sin(t * 0.35 + 1.3) * env.fade;\n    const shadow = Math.sin(t * 0.05) * env.fade * 0.6;\n    return env.baseSnr + trend * 2 + fade + shadow + (Math.random() - 0.5) * 1.5;\n  }\n\n  function chooseStrategy(snrPred, priority) {\n    // Unequal Error Protection: high priority → robust modulation\n    const snrEff = snrPred - (1 - priority) * 4;\n    if (snrEff < 5) return { mod: \"BPSK\", rate: 1 / 4, bits: 1, fec: \"LDPC 1/4\", color: \"#d94242\" };\n    if (snrEff < 10) return { mod: \"QPSK\", rate: 1 / 3, bits: 2, fec: \"LDPC 1/3\", color: \"#d9991d\" };\n    if (snrEff < 16) return { mod: \"QPSK\", rate: 1 / 2, bits: 2, fec: \"LDPC 1/2\", color: \"#245fd6\" };\n    if (snrEff < 22) return { mod: \"16-QAM\", rate: 3 / 4, bits: 4, fec: \"LDPC 3/4\", color: \"#11865a\" };\n    return { mod: \"64-QAM\", rate: 5 / 6, bits: 6, fec: \"LDPC 5/6\", color: \"#6b43bd\" };\n  }\n\n  function ueStrategy() {\n    if (!state.worldModelOn) {\n      // Conservative static baseline: fixed QPSK 1/2 for all tokens\n      return tokenPool.map((t) => ({ ...t, strategy: { mod: \"QPSK\", rate: 1 / 2, bits: 2, fec: \"LDPC 1/2 (static)\", color: \"#94a4ba\" } }));\n    }\n    const pred = predictSnr(state.time + 1);\n    return tokenPool.map((t) => ({ ...t, strategy: chooseStrategy(pred, t.priority) }));\n  }\n\n  const W = 620;\n  const H = 180;\n  const PAD_L = 36;\n  const PAD_R = 14;\n  const PAD_T = 14;\n  const PAD_B = 28;\n  const PLOT_W = W - PAD_L - PAD_R;\n  const PLOT_H = H - PAD_T - PAD_B;\n\n  function step() {\n    state.time += 1;\n    state.history.push(predictSnr(state.time));\n    if (state.history.length > 60) state.history.shift();\n    render();\n  }\n\n  function snrPath(values) {\n    if (values.length === 0) return \"\";\n    const minV = -5;\n    const maxV = 30;\n    return values.map((v, i) => {\n      const x = PAD_L + (i / Math.max(1, values.length - 1)) * PLOT_W;\n      const y = PAD_T + (1 - (v - minV) / (maxV - minV)) * PLOT_H;\n      return `${i === 0 ? \"M\" : \"L\"} ${x.toFixed(2)} ${y.toFixed(2)}`;\n    }).join(\" \");\n  }\n\n  function render() {\n    const tokens = ueStrategy();\n    const snrNow = state.history.length > 0 ? state.history[state.history.length - 1] : predictSnr(state.time);\n    const snrPred = predictSnr(state.time + 3);\n    const env = environments[state.env];\n\n    const zoneHigh = PAD_T + (1 - (18 - -5) / (30 - -5)) * PLOT_H;\n    const zoneMid = PAD_T + (1 - (12 - -5) / (30 - -5)) * PLOT_H;\n    const zoneLow = PAD_T + (1 - (7 - -5) / (30 - -5)) * PLOT_H;\n\n    root.innerHTML = `\n      <style>\n        .wm-demo h2 { margin:0; font-size:26px; }\n        .wm-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .wm-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .wm-card h3 { margin:0 0 6px; font-size:16px; color:#1d2c3f; }\n        .wm-envs { display:flex; flex-wrap:wrap; gap:6px; }\n        .wm-env { padding:8px 12px; border-radius:999px; background:#f1f5fa; border:2px solid #d6dfec; font-weight:900; font-size:13px; cursor:pointer; }\n        .wm-env.active { background:#c86414; border-color:#c86414; color:#fff; }\n        .wm-svg { width:100%; max-width:${W}px; display:block; background:#fbfdff; border-radius:8px; border:1px solid #d8e0ea; margin-top:8px; }\n        .wm-strategy { display:grid; gap:6px; margin-top:10px; }\n        .wm-tok-row {\n          display:grid; grid-template-columns:auto 1fr auto auto; gap:10px; align-items:center;\n          padding:8px 12px; border-radius:8px; background:#fbfdff; border:1px solid #d6dfec;\n        }\n        .wm-tok-row .dot { width:10px; height:10px; border-radius:50%; }\n        .wm-tok-row b { font-size:13px; font-weight:900; }\n        .wm-tok-row .prio {\n          padding:3px 7px; border-radius:6px; background:#eef3fa; font-size:11px; font-weight:900; color:#35475d;\n        }\n        .wm-tok-row .strat {\n          padding:5px 9px; border-radius:6px; color:#fff; font-weight:900; font-size:11px;\n          font-family:Consolas, monospace; min-width:190px; text-align:center;\n        }\n        .wm-metrics { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }\n        .wm-metrics span { padding:7px 10px; border-radius:7px; background:#eef3fa; font-weight:900; color:#26384b; font-size:13px; }\n        .wm-metrics span.low { background:#ffe8e8; color:#a02828; }\n        .wm-metrics span.mid { background:#fff6db; color:#8a4f03; }\n        .wm-metrics span.good { background:#e4f8ec; color:#0d6744; }\n        .wm-toggles { display:flex; flex-wrap:wrap; gap:12px; margin-top:6px; font-weight:900; color:#35475d; font-size:13px; }\n      </style>\n\n      <div class=\"vis-panel wm-demo\">\n        <section>\n          <h2>World Model: Predict the Channel and Adjust Strategy</h2>\n          <p class=\"hint\">A World Model of UE mobility, weather, and terrain predicts future SNR and assigns different modulation and FEC code rates according to semantic token importance (Unequal Error Protection).</p>\n        </section>\n\n        <section class=\"wm-card\">\n          <h3>1. Environment Scenario</h3>\n          <div class=\"wm-envs\">\n            ${Object.entries(environments).map(([key, env]) => `\n              <button class=\"wm-env ${state.env === key ? \"active\" : \"\"}\" data-env=\"${key}\" type=\"button\">${env.label}</button>\n            `).join(\"\")}\n          </div>\n\n          <div class=\"vis-row\" style=\"margin-top:10px\">\n            <button class=\"vis-button primary\" data-action=\"toggle\" type=\"button\">${state.running ? \"⏸ Stop Simulation\" : \"▶ Play Simulation\"}</button>\n            <button class=\"vis-button\" data-action=\"step\" type=\"button\">+ 1 step</button>\n            <button class=\"vis-button\" data-action=\"clear\" type=\"button\">⟳ Reset</button>\n          </div>\n\n          <div class=\"wm-toggles\">\n            <label><input type=\"checkbox\" ${state.worldModelOn ? \"checked\" : \"\"} data-toggle=\"worldModelOn\"/> Enable World Model adaptation (OFF = fixed QPSK 1/2)</label>\n          </div>\n        </section>\n\n        <section class=\"wm-card\">\n          <h3>2. Predicted SNR (dB) Time Series</h3>\n          <svg class=\"wm-svg\" viewBox=\"0 0 ${W} ${H}\" preserveAspectRatio=\"xMidYMid meet\">\n            <rect x=\"${PAD_L}\" y=\"${PAD_T}\" width=\"${PLOT_W}\" height=\"${PLOT_H}\" fill=\"#fff\" stroke=\"#d8e0ea\"/>\n            <rect x=\"${PAD_L}\" y=\"${zoneHigh}\" width=\"${PLOT_W}\" height=\"${PAD_T + PLOT_H - zoneHigh}\" fill=\"#e4f8ec\" opacity=\"0.4\"/>\n            <rect x=\"${PAD_L}\" y=\"${zoneMid}\" width=\"${PLOT_W}\" height=\"${zoneHigh - zoneMid}\" fill=\"#fff6db\" opacity=\"0.5\"/>\n            <rect x=\"${PAD_L}\" y=\"${zoneLow}\" width=\"${PLOT_W}\" height=\"${zoneMid - zoneLow}\" fill=\"#fff0df\" opacity=\"0.4\"/>\n            <rect x=\"${PAD_L}\" y=\"${PAD_T}\" width=\"${PLOT_W}\" height=\"${zoneLow - PAD_T}\" fill=\"#ffe8e8\" opacity=\"0.35\"/>\n            <path d=\"${snrPath(state.history)}\" fill=\"none\" stroke=\"#c86414\" stroke-width=\"2.2\"/>\n            ${state.history.length > 0 ? `<circle cx=\"${PAD_L + PLOT_W}\" cy=\"${PAD_T + (1 - (state.history[state.history.length - 1] + 5) / 35) * PLOT_H}\" r=\"4\" fill=\"#c86414\"/>` : \"\"}\n            <text x=\"${PAD_L - 4}\" y=\"${PAD_T + 10}\" text-anchor=\"end\" font-size=\"10\" fill=\"#536579\" font-weight=\"900\">30 dB</text>\n            <text x=\"${PAD_L - 4}\" y=\"${PAD_T + PLOT_H}\" text-anchor=\"end\" font-size=\"10\" fill=\"#536579\" font-weight=\"900\">-5 dB</text>\n            <text x=\"${PAD_L + PLOT_W - 4}\" y=\"${zoneHigh - 2}\" text-anchor=\"end\" font-size=\"9\" fill=\"#0d6744\" font-weight=\"900\">64/16-QAM region</text>\n            <text x=\"${PAD_L + PLOT_W - 4}\" y=\"${zoneLow + 10}\" text-anchor=\"end\" font-size=\"9\" fill=\"#8a4f03\" font-weight=\"900\">QPSK</text>\n            <text x=\"${PAD_L + PLOT_W - 4}\" y=\"${PAD_T + 12}\" text-anchor=\"end\" font-size=\"9\" fill=\"#a02828\" font-weight=\"900\">BPSK required</text>\n          </svg>\n\n          <div class=\"wm-metrics\">\n            <span>Current SNR: ${snrNow.toFixed(1)} dB</span>\n            <span>3-step prediction: ${snrPred.toFixed(1)} dB</span>\n            <span>Environment: ${env.label}</span>\n            <span>Elapsed tick: ${state.time}</span>\n          </div>\n        </section>\n\n        <section class=\"wm-card\">\n          <h3>3. Token-Priority Transmission Strategy (UEP)</h3>\n          <div class=\"wm-strategy\">\n            ${tokens.map((t) => `\n              <div class=\"wm-tok-row\">\n                <span class=\"dot\" style=\"background:${t.strategy.color}\"></span>\n                <div>\n                  <b>${t.token}</b>\n                  <div style=\"font-size:11px;color:#607083;font-weight:900;margin-top:2px\">priority ${(t.priority * 100).toFixed(0)}%</div>\n                </div>\n                <span class=\"prio\">P=${t.priority.toFixed(2 : [{ t: \"apple\", s: 1.0 }, { t: \"pear\", s: 0.72 }, { t: \"peach\", s: 0.68 }, { t: \"fruit\", s: 0.85 }, { t: \"red\", s: 0.55 }],\n    \"heavy rain\": [{ t: \"heavy rain\", s: 1.0 }, { t: \"rain\", s: 0.88 }, { t: \"downpour\", s: 0.95 }, { t: \"rainfall\", s: 0.85 }, { t: \"weather\", s: 0.6 }],\n    \"meeting\": [{ t: \"meeting\", s: 1.0 }, { t: \"meeting\", s: 0.92 }, { t: \"gathering\", s: 0.72 }, { t: \"conference\", s: 0.78 }],\n    \"online\": [{ t: \"online\", s: 1.0 }, { t: \"remote\", s: 0.92 }, { t: \"video call\", s: 0.85 }, { t: \"remote\", s: 0.88 }],\n    \"tomorrow\": [{ t: \"tomorrow\", s: 1.0 }, { t: \"next day\", s: 0.95 }, { t: \"following day\", s: 0.92 }, { t: \"today\", s: 0.45 }],\n    \"Gangnam Station\": [{ t: \"Gangnam Station\", s: 1.0 }, { t: \"Yeoksam\", s: 0.68 }, { t: \"Seolleung\", s: 0.62 }, { t: \"Gangnam\", s: 0.9 }],\n  };\n\n  const scenarios = [\n    {\n      label: \"Meeting moved online due to heavy rain\",\n      originalTokens: [\"heavy rain\", \"tomorrow\", \"meeting\", \"online\"],\n      context: \"Tomorrow work-schedule notice context\",\n    },\n    {\n      label: \"Apple shopping near Gangnam Station\",\n      originalTokens: [\"Gangnam Station\", \"apple\", \"fruit\"],\n      context: \"Grocery-shopping context\",\n    },\n  ];\n\n  const state = {\n    scenario: 0,\n    errorRate: 0.35,\n    useKB: true,\n    seed: 3,\n  };\n\n  function rand() {\n    state.seed = (state.seed * 9301 + 49297) % 233280;\n    return state.seed / 233280;\n  }\n\n  function injectNoise(tokens) {\n    return tokens.map((t) => {\n      const corrupted = rand() < state.errorRate;\n      if (!corrupted) return { original: t, received: t, corrupted: false, candidates: [] };\n      const neighbors = KB[t] ?? [{ t: t, s: 1 }];\n      const wrongIdx = Math.floor(rand() * (neighbors.length - 1)) + 1;\n      const wrong = neighbors[Math.min(wrongIdx, neighbors.length - 1)]?.t || t;\n      return { original: t, received: wrong, corrupted: tru p-tok.err { background:#fff6db; border-color:#d9991d; color:#8a4f03; }\n        .cmp-tok.orig { background:#f3edfc; border-color:#6b43bd; color:#4f2a9c; }\n        .cmp-metrics { display:grid; grid-template-columns:repeat(2, 1fr); gap:6px; }\n        .cmp-metric { padding:8px 10px; border-radius:7px; background:#fff; border:1px solid #e4eaf3; }\n        .cmp-metric small { display:block; color:#607083; font-size:10px; font-weight:900; }\n        .cmp-metric b { font-size:15px; }\n        .cmp-metric.bad b { color:#a02828; }\n        .cmp-metric.good b { color:#0d6744; }\n        .cmp-verdict {\n          padding:12px; border-radius:8px; font-weight:900; line-height:1.4; font-size:13px;\n        }\n        .cmp-verdict.bad { background:#ffe8e8; color:#a02828; border:1px solid #d94242; }\n        .cmp-verdict.good { background:#e4f8ec; color:#0d6744; border:1px solid #11865a; }\n        .cmp-summary {\n          margin-top:10px; padding:12px 14px; border-radius:8px; background:#f7f9fc; border:1px solid #d8e0ea;\n          font-size:13px; line-height:1.5; color:#26384b; font-weight:800;\n        }\n        .cmp-summary b { color:#c93e7a; }\n      </style>\n\n      <div class=\"vis-panel cmp-demo\">\n        <section>\n          <h2>Bit-Com vs Sem-Com: Same-SNR Comparison</h2>\n          <p class=\"hint\">Compare how conventional bit-faithful communication and semantic meaning-restoration communication behave when sending the same sentence under the same channel condition.</p>\n        </section>\n\n        <section class=\"cmp-card\">\n          <h3>1. Scenario / Conditions</h3>\n          <div class=\"cmp-presets\">\n            ${presets.map((p, i) => `<button class=\"cmp-preset ${state.preset === i ? \"active\" : \"\"}\" data-preset=\"${i}\" type=\"button\">${p.label}</button>`).join(\"\")}\n          </div>\n          <div class=\"cmp-controls\">\n            <label>Channel SNR: <b>${state.snrDb} dB</b>\n              <input type=\"range\" min=\"-2\" max=\"20\" step=\"1\" value=\"${state.snrDb}\" data-control=\"snrDb\"/>\n            </label>\n            <button class=\"vis-button\" data-action=\"reseed\" type=\"button\">New Noise Sample</button>\n          </div>\n          <p style=\"margin-top:6px; font-size:12px; color:#607083; font-weight:800\">Estimated BER ≈ ${(berFromSnr(state.snrDb) * 100).toFixed(2)}%</p>\n        </section>\n\n        <section class=\"cmp-lanes\">\n          <article class=\"cmp-lane trad\">\n            <h3>A. Conventional Communication (Bit-Com)</h3>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Tx Original Text (UTF-16)</h3>\n              <div class=\"cmp-text\">${preset.text}</div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Tx Bitstream (${traditionalBits} bits)</h3>\n              <div class=\"cmp-bits\">${bc.txBits.slice(0, 96).join(\"\")}${traditionalBits > 96 ? \"…\" : \"\"}</div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Rx Bitstream (flips = pink)</h3>\n              <div class=\"cmp-bits\">${bc.txBits.slice(0, 96).map((b, i) => b === bc.rxBits[i] ? b : `<span class=\"cmp-bit-flip\">${bc.rxBits[i]}</span>`).join(\"\")}${traditionalBits > 96 ? \"…\" : \"\"}</div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Rx Decoding Result</h3>\n              <div class=\"cmp-text\" style=\"background:#fff6f6;border-color:#e1b5b5\">${bc.rxText || \"(decoding failed)\"}</div>\n            </div>\n            <div class=\"cmp-metrics\">\n              <div class=\"cmp-metric bad\"><small>BER</small><b>${(bc.actualBer * 100).toFixed(2)}%</b></div>\n              <div class=\"cmp-metric bad\"><small>Character errors</small><b>${bc.charErrors} chars</b></div>\n              <div class=\"cmp-metric\"><small>Transmitted bits</small><b>${traditionalBits}</b></div>\n              <div class=\"cmp-metric ${bc.msgIntact ? \"good\" : \"bad\"}\"><small>Meaning preserved</small><b>${bc.msgIntact ? \"OK\" : \"Damaged\"}</b></div>\n            </div>\n            <div class=\"cmp-verdict ${bc.msgIntact ? \"good\" : \"bad\"}\">\n              ${bc.msgIntact\n                ? \"All bits arrived correctly, so the sentence was restored exactly.\"\n                : \"Even a few flipped bits can corrupt characters or the entire file. CRC FAIL → HARQ retransmission required.\"}\n            </div>\n          </article>\n\n          <article class=\"cmp-lane sem\">\n            <h3>B. Semantic Communication (Sem-Com)</h3>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Tx Key Tokens (sLLM extracted)</h3>\n              <div class=\"cmp-tokens\">\n                ${sc.tokens.map((t) => `<span class=\"cmp-tok orig\">${t}</span>`).join(\"\")}\n              </div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">Rx Received Tokens (VQ index distortion)</h3>\n              <div class=\"cmp-tokens\">\n                ${sc.received.map((r) => `<span class=\"cmp-tok ${r.corrupted ? \"err\" : \"ok\"}\">${r.received}</span>`).join(\"\")}\n              </div>\n            </div>\n            <div>\n              <h3 style=\"font-size:13px;color:#35475d\">KB Restoration Result</h3>\n              <div class=\"cmp-text\" style=\"background:#f2faff;border-color:#b8dff1\">${sc.recovered.join(\" · \")}</div>\n              <p style=\"margin:6px 0 0; font-size:12px; color:#607083; font-weight:800\">→ Meaning preserved through KB contextual inference: \"${preset.text}\" equivalent</p>\n            </div>\n            <div class=\"cmp-metrics\">\n              <div class=\"cmp-metric ${sc.semSim >= 0.9 ? \"good\" : \"bad\"}\"><small>Semantic Similarity</small><b>${(sc.semSim * 100).toFixed(0)}%</b></div>\n              <div class=\"cmp-metric good\"><small>Damaged tokens</small><b>${sc.received.filter((r) => r.corrupted).length} / ${sc.tokens.length}</b></div>\n              <div class=\"cmp-metric good\"><small>Transmitted bits</small><b>${sc.tokenBits}</b></div>\n              <div class=\"cmp-metric good\"><small>Compression ratio (vs Bit-Com)</small><b>${compressionRatio.toFixed(1)}×</b></div>\n            </div>\n            <div class=\"cmp-verdict good\">\n              Noise changed ${sc.received.filter((r) => r.corrupted).length}indices, but KB context preserved the meaning. No retransmission.\n            </div>\n          </article>\n        </section>\n\n        <div class=\"cmp-summary\">\n          <b>Conclusion:</b> At the same SNR ${state.snrDb} dBconventional communication has BER ${(bc.actualBer * 100).toFixed(2)}%so characters break and meaning is damaged, but\n          semantic communication maintains semantic similarity of <b>${(sc.semSim * 100).toFixed(0)}%</b>.\n          It also reduces transmitted volume by <b>${compressionRatio.toFixed(1)}x</b>, which is a decisive advantage in bandwidth- and reliability-constrained environments such as satellite, disaster, and low-power IoT links.\n        </div>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-preset]\").forEach((el) => {\n      el.addEventListener(\"click\", () => {\n        state.preset = Number(el.dataset.preset);\n        render();\n      });\n    });\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        state[el.dataset.control] = Number(e.target.value);\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"reseed\"]')?.addEventListener(\"click\", () => {\n      state.seed = Math.floor(Math.random() * 9000) + 1;\n      render();\n    });\n  }\n\n  render();\n  return () => {};\n}\n"};
    const moduleUrls = new Map();
    let cleanup = null;

    function moduleUrl(path) {
      if (!moduleSources[path]) throw new Error(`Missing embedded module: ${path}`);
      if (!moduleUrls.has(path)) {
        const blob = new Blob([moduleSources[path]], { type: "text/javascript" });
        moduleUrls.set(path, URL.createObjectURL(blob));
      }
      return moduleUrls.get(path);
    }

    globalThis.__loadStandaloneModule = (path) => import(moduleUrl(path));

    async function mount(entry) {
      const root = document.getElementById("app");
      root.innerHTML = '<div class="loading">Loading visualizer...</div>';
      if (typeof cleanup === "function") cleanup();
      cleanup = null;
      document.querySelectorAll("[data-entry]").forEach((button) => {
        button.classList.toggle("active", button.dataset.entry === entry);
      });
      try {
        const module = await import(moduleUrl(entry));
        if (typeof module.mount !== "function") throw new Error(`${entry} does not export mount(root).`);
        root.innerHTML = "";
        cleanup = module.mount(root) || null;
      } catch (error) {
        root.innerHTML = `<div class="error">Failed to load visualizer<br>${error.message}</div>`;
        console.error(error);
      }
    }

    document.querySelectorAll("[data-entry]").forEach((button) => {
      button.addEventListener("click", () => mount(button.dataset.entry));
    });

    mount("protocol_stack_overview.js");
  </script>
