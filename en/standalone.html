;\n\n    const plot = root.querySelector(\"[data-plot]\");\n    if (plot) {\n      let dragging = false;\n      const updateFromEvent = (ev) => {\n        const rect = plot.getBoundingClientRect();\n        const x = ((ev.clientX - rect.left) / rect.width) * SIZE;\n        const y = ((ev.clientY - rect.top) / rect.height) * SIZE;\n        state.rxI = Math.max(-1.3, Math.min(1.3, (x - CX) / SCALE));\n        state.rxQ = Math.max(-1.3, Math.min(1.3, (CY - y) / SCALE));\n        render();\n      };\n      plot.addEventListener(\"mousedown\", (ev) => { dragging = true; updateFromEvent(ev); });\n      window.addEventListener(\"mouseup\", () => { dragging = false; });\n      plot.addEventListener(\"mousemove\", (ev) => { if (dragging) updateFromEvent(ev); });\n    }\n  }\n\n  render();\n  return () => {};\n}\n", "O-DU/scrambling_descrambling_llr.js": "export const metadata = {\n  title: \"Scrambling and Descrambling\",\n};\n\nexport function mount(root) {\n  let dataBits = Array(8).fill(0);\n  let codeBits = [1, 0, 1, 1, 0, 1, 0, 0];\n  let noiseSeed = 0;\n\n  function makeScrambled() {\n    return dataBits.map((bit, index) => bit ^ codeBits[index]);\n  }\n\n  function llrFor(bit, index) {\n    const noiseTable = [0.4, -0.2, 0.7, -0.5, 0.1, -0.8, 0.5, -0.3];\n    const base = bit === 0 ? 2.6 : -2.6;\n    const drift = ((noiseSeed + index * 3) % 5 - 2) * 0.12;\n    return Number((base + noiseTable[index] + drift).toFixed(1));\n  }\n\n  function randomizeCode() {\n    codeBits = codeBits.map(() => Math.random() > 0.5 ? 1 : 0);\n    render();\n  }\n\n  function regenerateNoise() {\n    noiseSeed += 1;\n    render();\n  }\n\n  function bitButton(bit, index) {\n    return `<button class=\"scr-bit toggle\" data-bit=\"${index}\" type=\"button\">${bit}<small>D${index}</small></button>`;\n  }\n\n  function bitCell(bit, index, className = \"\") {\n    return `<span class=\"scr-bit ${className}\">${bit}<small>${index}</small></span>`;\n  }\n\n  function llrCell(value, index, flipped = false) {\n    const cls = value >= 0 ? \"positive\" : \"negative\";\n    return `<span class=\"llr-cell ${cls} ${flipped ? \"flipped\" : \"\"}\">\n      <b>${value > 0 ? \"+\" : \"\"}${value.toFixed(1)}</b>\n      <small>${flipped ? \"Sign Flip\" : `L${index}`}</small>\n    </span>`;\n  }\n\n  function render() {\n    const scrambled = makeScrambled();\n    const channelLlr = scrambled.map(llrFor);\n    const descrambledLlr = channelLlr.map((value, index) => codeBits[index] === 1 ? -value : value);\n    const recovered = descrambledLlr.map((value) => value >= 0 ? 0 : 1);\n    const allMatch = recovered.every((bit, index) => bit === dataBits[index]);\n\n    root.innerHTML = `\n      <style>\n        .scr-demo h2 { margin:0; font-size:32px; }\n        .scr-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; }\n        .scr-pipeline { display:grid; gap:10px; }\n        .scr-stage { position:relative; display:grid; gap:10px; border:1px solid var(--line); border-radius:8px; background:#fff; padding:16px; }\n        .scr-stage h3 { margin:0; font-size:21px; }\n        .scr-stage p { margin:0; color:var(--muted); font-weight:800; }\n        .scr-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }\n        .scr-bit {\n          position:relative;\n          min-width:58px;\n          min-height:54px;\n          display:grid;\n          place-items:center;\n          padding:7px 8px 14px;\n          border-radius:8px;\n          border:2px solid #cbd6e4;\n          background:#f1f5fa;\n          color:#14212f;\n          font-size:22px;\n          font-weight:900;\n          transition:transform 220ms ease, background 220ms ease, border-color 220ms ease;\n        }\n        .scr-bit small, .llr-cell small {\n          position:absolute;\n          left:6px;\n          bottom:4px;\n          color:#607083;\n          font-size:11px;\n          font-weight:900;\n        }\n        .scr-bit.toggle { cursor:pointer; background:#fff; }\n        .scr-bit.toggle:hover { transform:translateY(-2px); border-color:var(--blue); }\n        .scr-bit.code-one { background:#eef0ff; border-color:#6b43bd; color:#4f2a9c; }\n        .scr-bit.scrambled-one { background:#fff0df; border-color:#c86414; color:#8a400b; }\n        .scr-arrow { text-align:center; color:#718198; font-size:28px; font-weight:900; }\n        .llr-cell {\n          position:relative;\n          min-width:76px;\n          min-height:58px;\n          display:grid;\n          place-items:center;\n          padding:7px 8px 15px;\n          border-radius:8px;\n          border:2px solid #cbd6e4;\n          font-size:20px;\n          font-weight:900;\n          animation:llrIn 280ms ease both;\n        }\n        .llr-cell.positive { background:#e4f8ec; border-color:#11865a; color:#0d6744; }\n        .llr-cell.negative { background:#ffe8e8; border-color:#d94242; color:#a02828; }\n        .llr-cell.flipped { animation:flipSign 520ms ease both; }\n        .decision { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }\n        .decision .match { box-shadow:0 0 0 4px rgba(17,134,90,.18); border-color:#11865a; }\n        .summary { padding:12px; border-radius:8px; font-weight:900; }\n        .summary.ok { color:#0d6744; background:#e4f8ec; }\n        .summary.bad { color:#a02828; background:#ffe8e8; }\n        @keyframes llrIn {\n          from { opacity:0; transform:translateY(8px); }\n          to { opacity:1; transform:translateY(0); }\n        }\n        @keyframes flipSign {\n          0% { transform:rotateY(0deg); }\n          50% { transform:rotateY(90deg) scale(.96); }\n          100% { transform:rotateY(0deg); }\n        }\n      </style>\n\n      <div class=\"vis-panel scr-demo\">\n        <section>\n          <h2>Scrambling and Descrambling: LLR Sign Flip</h2>\n          <p class=\"hint\">The transmitter XORs data with the scrambling code; the receiver restores the original by flipping only the LLR signs where the code is 1.</p>\n        </section>\n\n        <section class=\"scr-pipeline\">\n          <article class=\"scr-stage\">\n            <h3>Transmitter: Original Data</h3>\n            <p>Click a bit to toggle between 0 and 1.</p>\n            <div class=\"scr-row\">${dataBits.map(bitButton).join(\"\")}</div>\n          </article>\n\n          <div class=\"scr-arrow\">↓ XOR</div>\n\n          <article class=\"scr-stage\">\n            <h3>Transmitter: Scrambling Code</h3>\n            <div class=\"vis-row\">\n              <button class=\"vis-button primary\" data-action=\"random-code\" type=\"button\">Randomize Code</button>\n              <button class=\"vis-button\" data-action=\"noise\" type=\"button\">Regenerate Channel Noise</button>\n            </div>\n            <div class=\"scr-row\">${codeBits.map((bit, index) => bitCell(bit, index, bit ? \"code-one\" : \"\")).join(\"\")}</div>\n          </article>\n\n          <div class=\"scr-arrow\">↓ Tx bits = original XOR code</div>\n\n          <article class=\"scr-stage\">\n            <h3>Transmitter: Scrambled Data</h3>\n            <div class=\"scr-row\">${scrambled.map((bit, index) => bitCell(bit, index, bit ? \"scrambled-one\" : \"\")).join(\"\")}</div>\n          </article>\n\n          <div class=\"scr-arrow\">↓ Radio channel: receive bits as real-valued LLRs</div>\n\n          <article class=\"scr-stage\">\n            <h3>Radio Channel: Noisy LLRs</h3>\n            <p>0 arrives as a positive LLR, while 1 arrives as a negative LLR.</p>\n            <div class=\"scr-row\">${channelLlr.map((value, index) => llrCell(value, index)).join(\"\")}</div>\n          </article>\n\n          <div class=\"scr-arrow\">↓ Descrambling: flip signs only where the code is 1</div>\n\n          <article class=\"scr-stage\">\n            <h3>Receiver: Descrambling Code and LLR Sign Flip</h3>\n            <div class=\"scr-row\">${codeBits.map((bit, index) => bitCell(bit, index, bit ? \"code-one\" : \"\")).join(\"\")}</div>\n            <div class=\"scr-row\">${descrambledLlr.map((value, index) => llrCell(value, index, codeBits[index] === 1)).join(\"\")}</div>\n          </article>\n\n          <article class=\"scr-stage\">\n            <h3>Receiver: Final Recovery Decision</h3>\n            <p>A positive LLR decides 0; a negative LLR decides 1.</p>\n            <div class=\"decision\">\n              ${recovered.map((bit, index) => `<span class=\"scr-bit ${bit === dataBits[index] ? \"match\" : \"\"}\">${bit}<small>D${index}</small></span>`).join(\"\")}\n            </div>\n            <div class=\"summary ${allMatch ? \"ok\" : \"bad\"}\">${allMatch ? \"Recovery success: matches the original data.\" : \"Recovery failed: noise was large enough to change the decision.\"}</div>\n          </article>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-bit]\").forEach((button) => {\n      button.addEventListener(\"click\", () => {\n        const index = Number(button.dataset.bit);\n        dataBits[index] = dataBits[index] === 1 ? 0 : 1;\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"random-code\"]').addEventListener(\"click\", randomizeCode);\n    root.querySelector('[data-action=\"noise\"]').addEventListener(\"click\", regenerateNoise);\n  }\n\n  render();\n}\n", "O-DU/5g_rate_matching_dematchning.js": "export const metadata = {\n  title: \"5G Rate Matching and Dematching\",\n};\n\nexport function mount(root) {\n  const motherCode = [1, 0, 1, 1, 0, 0, 1, 0];\n  let resourceSize = 8;\n\n  function buildModel() {\n    const physical = Array.from({ length: resourceSize }, (_, index) => ({\n      bit: motherCode[index % motherCode.length],\n      sourceIndex: index % motherCode.length,\n      repeated: index >= motherCode.length,\n    }));\n\n    const dematched = motherCode.map((bit, index) => {\n      const copies = physical.filter((item) => item.sourceIndex === index);\n      if (copies.length === 0) {\n        return { bit: \"0 (Null)\", index, status: \"missing\", detail: \"Position removed by puncturing\" };\n      }\n      if (copies.length > 1) {\n        return { bit: `${bit} Combined`, index, status: \"combined\", detail: `${copies.length} LLR copies combined` };\n      }\n      return { bit, index, status: \"normal\", detail: \"Received normally\" };\n    });\n\n    const punctured = motherCode\n      .map((bit, index) => ({ bit, index }))\n      .filter((item) => item.index >= resourceSize);\n\n    return { physical, dematched, punctured };\n  }\n\n  function bitBox(content, className, subText = \"\") {\n    return `<span class=\"rate-bit ${className}\">\n      <b>${content}</b>\n      ${subText ? `<small>${subText}</small>` : \"\"}\n    </span>`;\n  }\n\n  function render() {\n    const { physical, dematched, punctured } = buildModel();\n    const hasPuncturing = resourceSize < motherCode.length;\n    const hasRepetition = resourceSize > motherCode.length;\n\n    root.innerHTML = `\n      <style>\n        .rate-demo h2 { margin:0; font-size:32px; }\n        .rate-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; }\n        .rate-control { display:grid; gap:12px; }\n        .rate-control input { width:min(680px,100%); accent-color:var(--blue); }\n        .rate-meter { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }\n        .rate-meter strong { font-size:24px; color:var(--blue); }\n        .rate-section h3 { margin:0 0 12px; font-size:22px; }\n        .rate-flow { display:grid; gap:14px; }\n        .rate-arrow { text-align:center; color:#718198; font-size:34px; font-weight:900; line-height:1; }\n        .bit-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; min-height:64px; }\n        .rate-bit {\n          position:relative;\n          min-width:68px;\n          min-height:58px;\n          display:grid;\n          place-items:center;\n          gap:2px;\n          padding:8px 8px 14px;\n          border-radius:8px;\n          border:2px solid #cbd6e4;\n          background: der\" type=\"range\" min=\"4\" max=\"16\" value=\"${resourceSize}\" />\n        </section>\n\n        <section class=\"vis-card rate-section\">\n          <h3>Transmitter: Mother Code Bits</h3>\n          <div class=\"bit-row\">\n            ${motherCode.map((bit, index) => bitBox(bit, \"normal\", `M${index}`)).join(\"\")}\n          </div>\n        </section>\n\n        <div class=\"rate-arrow\">↓ Matching</div>\n\n        <section class=\"vis-card rate-section\">\n          <h3>Radio Link: Physical Resource</h3>\n          <div class=\"bit-row\">\n            ${physical.map((item, index) => bitBox(item.bit, item.repeated ? \"repeated\" : \"normal\", `R${index}←M${item.sourceIndex}`)).join(\"\")}\n          </div>\n          ${punctured.length ? `\n            <div class=\"bit-row\" aria-label=\"Punctured bits\">\n              ${punctured.map((item) => bitBox(item.bit, \"punctured ghost\", `M${item.index} removed`)).join(\"\")}\n            </div>\n          ` : \"\"}\n        </section>\n\n        <div class=\"rate-arrow\">↓ Dematching</div>\n\n        <section class=\"vis-card rate-section\">\n          <h3>Receiver: After Dematching</h3>\n          <div class=\"bit-row\">\n            ${dematched.map((item) => bitBox(item.bit, item.status, `M${item.index}`)).join(\"\")}\n          </div>\n        </section>\n\n        <section class=\"vis-card\">\n          <div class=\"status-line\">\n            <span class=\"${hasPuncturing ? \"red\" : \"green\"}\">${hasPuncturing ? \"Puncturing occurred: missing positions filled with 0 (Null)\" : \"No puncturing\"}</span>\n            <span class=\"${hasRepetition ? \"blue\" : \"green\"}\">${hasRepetition ? \"Repetition occurred: repeated LLRs are combined\" : \"No repetition\"}</span>\n          </div>\n        </section>\n      </div>\n    `;\n\n    root.querySelector(\"#resourceSlider\").addEventListener(\"input\", (event) => {\n      resourceSize = Number(event.target.value);\n      render();\n    });\n  }\n\n  render();\n}\n", "O-DU/ldpc_decoding.js": "export const metadata = {\n  title: \"LDPC Decoding: Tanner Graph and Message Passing\",\n};\n\nexport function mount(root) {\n  // (7,4) Hamming-like parity check matrix (6 variable nodes x 3 check nodes for compact illustration)\n  // H matrix: rows = check nodes, cols = variable nodes\n  const H = [\n    [1, 1, 0, 1, 1, 0],\n    [0, 1, 1, 1, 0, 1],\n    [1, 0, 1, 0, 1, 1],\n  ];\n  const NUM_V = 6;\n  const NUM_C = 3;\n\n  const state = {\n    channelLlr: [2.1, -0.3, 1.8, -1.4, 2.5, -2.0],\n    iteration: 0,\n    varToCheck: [],\n    checkToVar: [],\n    totalLlr: [],\n    decoded: [],\n    running: false,\n    timer: null,\n    codeword: [1, 0, 1, 0, 1, 0],\n  };\n\n  function resetMessages() {\n    state.varToCheck = Array.from({ length: NUM_V }, (_, v) => Array(NUM_C).fill(state.channelLlr[v]));\n    state.checkToVar = Array.from({ length: NUM_C }, () => Array(NUM_V).fill(0));\n    state.totalLlr = [...state.channelLlr];\n    state.decoded = state.totalLlr.map((v) => (v >= 0 ? 0 : 1));\n    state.iteration = 0;\n  }\n\n  function phi(x) {\n    const ax = Math.max(1e-8, Math.abs(x));\n    return Math.sign(x) * (-Math.log(Math.tanh(ax / 2)));\n  }\n\n  function iterate() {\n    // Check -> Variable using min-sum\n    for (let c = 0; c < NUM_C; c += 1) {\n      const connected = [];\n      for (let v = 0; v < NUM_V; v += 1) if (H[c][v] === 1) connected.push(v);\n      for (const v of connected) {\n        let sign = 1;\n        let minAbs = Infinity;\n        for (const v2 of connected) {\n          if (v2 === v) continue;\n          const m = state.varToCheck[v2][c];\n          sign *= Math.sign(m) || 1;\n          minAbs = Math.min(minAbs, Math.abs(m));\n        }\n        state.checkToVar[c][v] = sign * minAbs * 0.75; // damping factor\n      }\n    }\n    // Variable -> Check and total LLR\n    for (let v = 0; v < NUM_V; v += 1) {\n      let total = state.channelLlr[v];\n      for (let c = 0; c < NUM_C; c += 1) {\n        if (H[c][v] === 1) total += state.checkToVar[c][v];\n      }\n      state.totalLlr[v] = total;\n      for (let c = 0; c < NUM_C; c += 1) {\n        if (H[c][v] === 1) state.varToCheck[v][c] = total - state.checkToVar[c][v];\n      }\n    }\n    state.decoded = state.totalLlr.map((v) => (v >= 0 ? 0 : 1));\n    state.iteration += 1;\n  }\n\n  function converged() {\n    for (let c = 0; c < NUM_C; c += 1) {\n      let sum = 0;\n      for (let v = 0; v < NUM_V; v += 1) sum ^= H[c][v] & state.decoded[v];\n      if (sum !== 0) return false;\n    }\n    return true;\n  }\n\n  const W = 640;\n  const HGT = 320;\n\n  function vPos(v) {\n    return { x: 80 + v * 90, y: HGT - 60 };\n  }\n  function cPos(c) {\n    return { x: 140 + c * 170, y: 70 };\n  }\n\n  function render() {\n    const conv = converged();\n    const bitsMatch = state.decoded.every((b, i) => b === state.codeword[i]);\n\n    root.innerHTML = `\n      <style>\n        .ldpc-demo h2 { margin:0; font-size:28px; }\n        .ldpc-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .ldpc-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .ldpc-card h3 { margin:0 0 6px; font-size:17px; color:#1d2c3f; }\n        .ldpc-svg { width:100%; max-width:${W}px; display:block; background:#fbfdff; border-radius:8px; border:1px solid #d8e0ea; }\n        .ldpc-bits { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }\n        .llr-chip {\n          min-width:62px; padding:8px 10px; border-radius:7px; font-weight:900;\n          background:#f1f5fa; border:2px solid #d6dfec; text-align:center; font-size:13px;\n        }\n        .llr-chip.pos { background:#e4f8ec; border-color:#11865a; color:#0d6744; }\n        .llr-chip.neg { background:#ffe8e8; border-color:#d94242; color:#a02828; }\n        .llr-chip small { display:block; font-size:10px; color:#607083; }\n        .ldpc-metrics { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }\n        .ldpc-metrics span { padding:7px 10px; border-radius:7px; background:#eef3fa; font-weight:900; color:#26384b; font-size:13px; }\n        .ldpc-metrics span.ok { background:#e4f8ec; color:#0d6744; }\n        .ldpc-metrics span.bad { background:#ffe8e8; color:#a02828; }\n        .llr-inputs { display:grid; grid-template-columns:repeat(${NUM_V}, 1fr); gap:6px; margin-top:8px; }\n        .llr-inputs label { display:grid; gap:3px; font-size:11px; font-weight:900; color:#35475d; text-align:center; }\n        .llr-inputs input { width:100%; }\n        .hmat { display:grid; grid-template-columns:repeat(${NUM_V + 1}, 1fr); gap:3px; margin-top:6px; font-family:Consolas, monospace; font-size:12px; font-weight:900; }\n        .hmat span { padding:4px; text-align:center; background:#f1f5fa; border-radius:4px; color:#35475d; }\n        .hmat span.one { background:#6b43bd; color:#fff; }\n      </style>\n\n      <div class=\"vis-panel ldpc-demo\">\n        <section>\n          <h2>LDPC Decoding: Belief Propagation</h2>\n          <p class=\"hint\">Starting from channel LLRs, variable nodes (V) and check nodes (C) exchange soft messages. Confidence increases with each iteration, and decoding converges when all parity checks are satisfied.</p>\n        </section>\n\n        <section class=\"ldpc-card\">\n          <div class=\"vis-row\">\n            <button class=\"vis-button primary\" data-action=\"iterate\" type=\"button\">+ 1 Iteration</button>\n            <button class=\"vis-button green\" data-action=\"run\" type=\"button\">${state.running ? \"⏸ Stop Auto\" : \"▶ Auto Iterate\"}</button>\n            <button class=\"vis-button\" data-action=\"reset\" type=\"button\">⟳ Reset</button>\n            <button class=\"vis-button orange\" data-action=\"flip\" type=\"button\">Flip one strong LLR (inject error)</button>\n          </div>\n\n          <h3 style=\"margin-top:14px\">Tanner graph (based on H matrix)</h3>\n          <svg class=\"ldpc-svg\" viewBox=\"0 0 ${W} ${HGT}\" preserveAspectRatio=\"xMidYMid meet\">\n            ${(() => {\n              let edges = \"\";\n              for (let c = 0; c < NUM_C; c += 1) {\n                for (let v = 0; v < NUM_V; v += 1) {\n                  if (H[c][v] === 1) {\n                    const p1 = cPos(c);\n                    const p2 = vPos(v);\n                    const msg = state.iteration > 0 ? state.checkToVar[c][v] : 0;\n                    const color = Math.abs(msg) < 0.01 ? \"#c2ccdb\" : (msg >= 0 ? \"#11865a\" : \"#d94242\");\n                    const width = Math.min(3.5, 0.8 + Math.abs(msg) * 0.6);\n                    edges += `<line x1=\"${p1.x}\" y1=\"${p1.y}\" x2=\"${p2.x}\" y2=\"${p2.y}\" stroke=\"${color}\" stroke-width=\"${width}\" opacity=\"0.7\"/>`;\n                  }\n                }\n              }\n              return edges;\n            })()}\n            ${state.channelLlr.map((llr, v) => {\n              const p = vPos(v);\n              const color = state.decoded[v] === 0 ? \"#11865a\" : \"#d94242\";\n              return `\n                <circle cx=\"${p.x}\" cy=\"${p.y}\" r=\"22\" fill=\"#fff\" stroke=\"${color}\" stroke-width=\"2.5\"/>\n                <text x=\"${p.x}\" y=\"${p.y - 2}\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"900\" fill=\"${color}\">V${v}</text>\n                <text x=\"${p.x}\" y=\"${p.y + 12}\" text-anchor=\"middle\" font-size=\"10\" font-weight=\"900\" fill=\"#35475d\">${state.totalLlr[v].toFixed(1)}</text>\n                <text x=\"${p.x}\" y=\"${p.y + 42}\" text-anchor=\"middle\" font-size=\"16\" font-weight=\"900\" fill=\"${color}\">→ ${state.decoded[v]}</text>\n              `;\n            }).join(\"\")}\n            ${Array.from({ length: NUM_C }).map((_, c) => {\n              const p = cPos(c);\n              let syndrome = 0;\n              for (let v = 0; v < NUM_V; v += 1) syndrome ^= H[c][v] & state.decoded[v];\n              const okC fied ✓ converged\" : \"unsatisfied - keep iterating\"}</span>\n            <span class=\"${bitsMatch ? \"ok\" : \"bad\"}\">Original codeword recovery ${bitsMatch ? \"success\" : \"pending\"}</span>\n            <span>Decoded bitstream: <b>${state.decoded.join(\"\")}</b></span>\n          </div>\n        </section>\n      </div>\n    `;\n\n    root.querySelector('[data-action=\"iterate\"]')?.addEventListener(\"click\", () => {\n      iterate();\n      render();\n    });\n    root.querySelector('[data-action=\"reset\"]')?.addEventListener(\"click\", () => {\n      resetMessages();\n      stopTimer();\n      state.running = false;\n      render();\n    });\n    root.querySelector('[data-action=\"run\"]')?.addEventListener(\"click\", () => {\n      state.running = !state.running;\n      if (state.running) startTimer();\n      else stopTimer();\n      render();\n    });\n    root.querySelector('[data-action=\"flip\"]')?.addEventListener(\"click\", () => {\n      const i = 1; // flip V1 to a strong wrong value\n      state.channelLlr[i] = state.channelLlr[i] >= 0 ? -2.5 : 2.5;\n      resetMessages();\n      render();\n    });\n    root.querySelectorAll(\"[data-llr]\").forEach((el) => {\n      el.addEventListener(\"input\", (e) => {\n        const i = Number(el.dataset.llr);\n        state.channelLlr[i] = Number(e.target.value);\n        resetMessages();\n        render();\n      });\n    });\n  }\n\n  function startTimer() {\n    stopTimer();\n    state.timer = window.setInterval(() => {\n      iterate();\n      render();\n      if (converged() || state.iteration > 20) stopTimer();\n    }, 700);\n  }\n\n  function stopTimer() {\n    if (state.timer) {\n      window.clearInterval(state.timer);\n      state.timer = null;\n      state.running = false;\n    }\n  }\n\n  resetMessages();\n  render();\n\n  return () => stopTimer();\n}\n", "O-DU/parity_crc_comparison.js": "export const metadata = {\n  title: \"Parity Check vs CRC Check\",\n};\n\nexport function mount(root) {\n  const originalData = [1, 0, 1, 1, 0, 0, 1, 0];\n  const generator = [1, 0, 0, 1, 1]; // x^4 + x + 1\n  const parityBit = originalData.reduce((sum, bit) => sum + bit, 0) % 2;\n  const crcBits = computeCrcBits(originalData, generator);\n  let receivedData = [...originalData];\n\n  function mod2Divide(bits, divisor) {\n    const work = [...bits];\n    for (let i = 0; i <= work.length - divisor.length; i += 1) {\n      if (work[i] === 1) {\n        for (let j = 0; j < divisor.length; j += 1) {\n          work[i + j] ^= divisor[j];\n        }\n      }\n    }\n    return work.slice(work.length - (divisor.length - 1));\n  }\n\n  function computeCrcBits(data, divisor) {\n    const padded = [...data, ...Array(divisor.length - 1).fill(0)];\n    return mod2Divide(padded, divisor);\n  }\n\n  function hasNonZero(bits) {\n    return bits.some((bit) => bit !== 0);\n  }\n\n  function render() {\n    const errorPositions = receivedData\n      .map((bit, index) => bit !== originalData[index] ? index : null)\n      .filter((index) => index !== null);\n    const errorCount = errorPositions.length;\n    const parityRemainder = [...receivedData, parityBit].reduce((sum, bit) => sum + bit, 0) % 2;\n    const parityDetectsError = parityRemainder !== 0;\n    const crcRemainder = mod2Divide([...receivedData, ...crcBits], generator);\n    const crcDetectsError = hasNonZero(crcRemainder);\n    const parityState = parityDetectsError ? \"fail\" : (errorCount > 0 ? \"fatal\" : \"pass\");\n    const crcState = crcDetectsError ? \"fail\" : \"pass\";\n\n    root.innerHTML = `\n      <style>\n        .crc-demo h2 { margin:0; font-size:32px; }\n        .crc-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; }\n        .error-panel h3, .result h3 { margin:0 0 12px; font-size:23px; }\n        .bit-buttons { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }\n        .crc-bit {\n          min-width:58px;\n          min-height:58px;\n          border:2px solid #cbd6e4;\n          border-radius:8px;\n          background:#eef3fa;\n          color:#14212f;\n          font-size:24px;\n          font-weight:900;\n          cursor:pointer;\n          transition:transform 180ms ease, background 180ms ease, border-color 180ms ease;\n        }\n        .crc-bit:hover { transform:translateY(-2px); border-color:var(--blue); }\n        .crc-bit.error { background:#d94242; border-color:#d94242; color:#fff; box-shadow:0 0 0 5px rgba(217,66,66,.15); }\n        .code-row { display:flex; flex-wrap:wrap; gap:7px; align-items:center; margin-top:12px; }\n        .code-row span { padding:8px 10px; border-radius:8px; background:#f1f5fa; border:1px solid #d5dfeb; font-weight:900; }\n        .result-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }\n        .result {\n          border:3px solid #ccd7e4;\n          border-radius:8px;\n          padding:16px;\n          min-height:230px;\n          transition:background 200ms ease, border-color 200ms ease;\n        }\n        .result.pass { background:#edf9f2; border-color:#11865a; }\n        .result.fail { background:#fff0f0; border-color:#d94242; }\n        .result.fatal { background:#fff6db; border-color:#d9991d; }\n        .result strong { display:block; margin:8px 0; font-size:26px; }\n        .result.pass strong { color:#0d6744; }\n        .result.fail strong { color:#a02828; }\n        .result.fatal strong { color:#9a6510; }\n        .result p { margin:8px 0; font-size:18px; line-height:1.42; font-weight:800; }\n        .formula { padding:12px; border-radius:8px; background:#fff; border:1px solid #d5dfeb; font-family:Consolas, \"Cascadia Mono\", monospace; font-size:17px; font-weight:900; }\n        .fatal-text { font-weight:900; color:#9a251f; }\n        @media (max-width: 850px) { .result-grid { grid-template-columns:1fr; } }\n      </style>\n\n      <div class=\"vis-panel crc-demo\">\n        <section>\n          <h2>Error Detection: Parity Check vs CRC Check</h2>\n          <p class=\"hint\">Click data bits to create radio-channel errors and see why parity can misjudge an even number of errors.</p>\n        </section>\n\n        <section class=\"vis-card error-panel\">\n          <h3>Radio Channel Error Generator</h3>\n          <div class=\"bit-buttons\">\n            ${receivedData.map((bit, index) => `\n              <button class=\"crc-bit ${bit !== originalData[index] ? \"error\" : \"\"}\" data-index=\"${index}\" type=\"button\">${bit}</button>\n            `).join(\"\")}\n          </div>\n          <div class=\"code-row\">\n            <span>Original data: ${originalData.join(\" \")}</span>\n            <span>Current errors: ${errorCount}${errorCount ? ` (${errorPositions.map((i) => i + 1).join(\", \")} bit positions)` : \"\"}</span>\n            <span>Even parity bit: ${parityBit}</span>\n            <span>CRC generator polynomial: 10011</span>\n            <span>CRC bits: ${crcBits.join(\"\")}</span>\n          </div>\n          <div class=\"vis-row\" style=\"margin-top:12px\">\n            <button class=\"vis-button\" data-action=\"reset\" type=\"button\">Clear Errors</button>\n            <button class=\"vis-button red\" data-action=\"two\" type=\"button\">Create 2-bit Error Example</button>\n          </div>\n        </section>\n\n        <section class=\"result-grid\">\n          <article class=\"result ${parityState}\">\n            <h3>Parity Check Result</h3>\n            <div class=\"formula\">Received data + parity ones count mod 2 = ${parityRemainder}</div>\n            <strong>${parityDetectsError ? \"Error detected\" : (errorCount > 0 ? \"Pass (fatal miss!)\" : \"Pass\")}</strong>\n            <p>${errorCount === 2 && !parityDetectsError ? `<span class=\"fatal-text\">With a 2-bit error, the parity of the number of ones is unchanged, so parity missed it.</span>` : \"Even parity reacts to an odd number of errors but is weak against an even number of errors.\"}</p>\n          </article>\n\n          <article class=\"result ${crcState}\">\n            <h3>CRC Check Result</h3>\n            <div class=\"formula\">Remainder = ${crcRemainder.join(\"\")}</div>\n            <strong>${crcDetectsError ? \"Error detected\" : \"Pass\"}</strong>\n            <p>Compute the actual remainder by dividing the received data and original CRC bits by generator polynomial 10011.</p>\n          </article>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-index]\").forEach((button) => {\n      button.addEventListener(\"click\", () => {\n        const index = Number(button.dataset.index);\n        receivedData[index] = receivedData[index] === 1 ? 0 : 1;\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"reset\"]').addEventListener(\"click\", () => {\n      receivedData = [...originalData];\n      render();\n    });\n    root.querySelector('[data-action=\"two\"]').addEventListener(\"click\", () => {\n      receivedData = [...originalData];\n      receivedData[1] ^= 1;\n      receivedData[4] ^= 1;\n      render();\n    });\n  }\n\n  render();\n}\n", "O-DU/MAC_HARQ_RLC_ARQ_comparison.js": "export const metadata = {\n  title: \"5G L2 Error Recovery Mechanisms\",\n};\n\nexport function mount(root) {\n  let mode = \"AM\";\n  let noise = 70;\n  let running = false;\n  let packets = [1, 2, 3, 4].map((id) => ({ id, tx: \"Waiting\", mac: \"Waiting\", rlc: \"Waiting\" }));\n  let rlcOutput = [];\n  let arqRequest = false;\n  let logs = [];\n  const timers = new Set();\n\n  function schedule(callback, delay) {\n    const timer = window.setTimeout(() => {\n      timers.delete(timer);\n      callback();\n    }, delay);\n    timers.add(timer);\n  }\n\n  function clearTimers() {\n    timers.forEach((timer) => window.clearTimeout(timer));\n    timers.clear();\n  }\n\n  function log(message) {\n    const time = new Date().toLocaleTimeString(\"ko-KR\", { hour12: false });\n    logs.unshift(`[${time}] ${message}`);\n    logs = logs.slice(0, 12);\n  }\n\n  function resetState(keepLog = false) {\n    clearTimers();\n    running = false;\n    packets = [1, 2, 3, 4].map((id) => ({ id, tx: \"Waiting\", mac: \"Waiting\", rlc: \"Waiting\" }));\n    rlcOutput = [];\n    arqRequest = false;\n    if (!keepLog) logs = [];\n  }\n\n  function start() {\n    resetState(true);\n    running = true;\n    logs = [];\n    log(`${mode === \"AM\" ? \"File download (RLC AM)\" : \"Real-time video (RLC UM)\"} transmission started, noise ${noise}%`);\n    render();\n\n    [1, 2, 3, 4].forEach((id, index) => {\n      schedule(() => sendPacket(id), 650 * index + 350);\n    });\n    schedule(handleRlc, 3600);\n  }\n\n  function sendPacket(id) {\n    const packet = packets.find((item) => item.id === id);\n    packet.tx = \"Tx\";\n    packet.mac = \"HARQ Processing\";\n    log(`Packet ${id}: entered the MAC HARQ loop`);\n    render();\n\n    if (id === 3) {\n      schedule(() => {\n        packet.mac = \"Retransmission 1\";\n        log(\"Packet 3: CRC failed → HARQ retransmission 1\");\n        render();\n      }, 350);\n      schedule(() => {\n        packet.mac = \"Retransmission 2\";\n        log(\"Packet 3: high noise caused HARQ retransmission 2 to fail too\");\n        render();\n      }, 700);\n      schedule(() => {\n        packet.mac = \"Drop\";\n        packet.rlc = \"Missing\";\n        log(\"Packet 3: MAC gave up recovery → Drop\");\n        render();\n      }, 1050);\n    } else {\n      const delay = noise > 80 ? 520 : 300;\n      schedule(() => {\n        packet.mac = \"ACK\";\n        packet.rlc = \"Received\";\n        log(`Packet ${id}: HARQ ACK, forwarded to RLC`);\n        render();\n      }, delay);\n    }\n  }\n\n  function handleRlc() {\n    const missing = packets.some((packet) => packet.id === 3 && packet.rlc === \"Missing\");\n    if (!missing) return;\n\n    if (mode === \"AM\") {\n      arqRequest = true;\n      log(\"RLC AM: detected missing packet 3 → sent ARQ STATUS request\");\n      render();\n      schedule(() => {\n        const packet     .layer h3 { margin:0 0 12px; font-size:23px; }\n        .packet-row { display:flex; flex-wrap:wrap; gap:10px; align-items:stretch; }\n        .harq-packet {\n          position:relative;\n          min-width:145px;\n          display:grid;\n          gap:4px;\n          padding:12px;\n          border-radius:8px;\n          border:2px solid #cbd6e4;\n          background:#f1f5fa;\n          animation:packetMove 360ms ease both;\n        }\n        .harq-packet strong { font-size:19px; }\n        .harq-packet span { color:#526276; font-size:13px; font-weight:900; }\n        .harq-packet.ok { background:#e4f8ec; border-color:#11865a; }\n        .harq-packet.retry { background:#fff6df; border-color:#d9991d; animation:retryShake 520ms ease both; }\n        .harq-packet.drop { background:#ffe8e8; border-color:#d94242; }\n        .drop-mark {\n          position:absolute;\n          right:8px;\n          top:6px;\n          width:34px;\n          height:34px;\n          display:grid;\n          place-items:center;\n          border-radius:50%;\n          background:#d94242;\n          color:#fff;\n          font-size:24px;\n        }\n        .arq-arrow {\n          display:${arqRequest ? \"grid\" : \"none\"};\n          position:absolute;\n          left:48%;\n          top:36%;\n          width:180px;\n          height:120px;\n          place-items:center;\n          border:3px dashed #6b43bd;\n          border-left:0;\n          border-bottom:0;\n          color:#6b43bd;\n          font-weight:900;\n          animation:arrowPulse 700ms ease-in-out infinite;\n          pointer-events:none;\n        }\n        .rlc-output { display:flex; flex-wrap:wrap; gap:9px; align-items:center; }\n        .rlc-gap { min-width:82px; min-height:42px; display:grid; place-items:center; border:2px dashed #d94242; border-radius:8px; color:#a02828; font-weight:900; background:#fff0f0; }\n        .mode-note { padding:12px; border-radius:8px; background:#f5f7fb; border:1px solid var(--line); font-weight:900; }\n        @keyframes packetMove {\n          from { opacity:0; transform:translateY(-16px); }\n          to { opacity:1; transform:translateY(0); }\n        }\n        @keyframes retryShake {\n          0%, 100% { transform:translateX(0); }\n          25% { transform:translateX(-4px); }\n          75% { transform:translateX(4px); }\n        }\n        @keyframes arrowPulse {\n          0%, 100% { opacity:.55; }\n          50% { opacity:1; }\n        }\n      </style>\n\n      <div class=\"vis-panel harq-demo\">\n        <section>\n          <h2>5G L2 Error Recovery: HARQ vs ARQ</h2>\n          <p class=\"hint\">After MAC HARQ drops packet 3, RLC AM fetches it again while UM skips it to reduce latency.</p>\n        </section>\n\n        <section class=\"vis-card harq-controls\">\n          <label><input type=\"radio\" name=\"mode\" value=\"AM\" ${mode === \"AM\" ? \"checked\" : \"\"}> File download (RLC AM)</label>\n          <label><input type=\"radio\" name=\"mode\" value=\"UM\" ${mode === \"UM\" ? \"checked\" : \"\"}> Real-time video (RLC UM)</label>\n          <label class=\"noise-label\">Noise <strong>${noise}%</strong><input data-action=\"noise\" type=\"range\" min=\"0\" max=\"100\" value=\"${noise}\"></label>\n          <button class=\"vis-button primary\" data-action=\"start\" type=\"button\">${running ? \"Transmitting...\" : \"Start Transmission\"}</button>\n          <button class=\"vis-button\" data-action=\"reset\" type=\"button\">Reset</button>\n        </section>\n\n        <section class=\"layer-flow\">\n          <div class=\"arq-arrow\">ARQ Request<br>Retransmit Packet 3</div>\n\n          <article class=\"layer\">\n            <h3>Top: transmitter packet queue</h3>\n            <div class=\"packet-row\">${packets.map((packet) => `<span class=\"packet-chip\">Packet ${packet.id}</span>`).join(\"\")}</div>\n          </article>\n\n          <article class=\"layer\">\n            <h3>Middle: MAC-layer HARQ loop</h3>\n            <d learTimeout(timer));\n    timers.clear();\n  };\n}\n", "O-CU/pdcp_reordering_deciphering.js": "export const metadata = {\n  title: \"PDCP Reordering, Deciphering, and ROHC\",\n};\n\nexport function mount(root) {\n  const state = {\n    arrivalOrder: [41, 43, 42, 45, 44, 46],\n    expectedNext: 41,\n    buffer: new Map(),\n    delivered: [],\n    windowSize: 4,\n    step: 0,\n    running: false,\n    timer: null,\n    cipher: true,\n    compression: true,\n  };\n\n  const CIPHER_KEY = 0xa5;\n\n  function cipherOf(sn, plain) {\n    if (!state.cipher) return plain;\n    return `${plain.charCodeAt(0) ^ (CIPHER_KEY + sn)} ${plain.charCodeAt(1) ^ (CIPHER_KEY + sn)} ... (AES block)`;\n  }\n\n  function compressedHeader(sn) {\n    if (!state.compression) return `IP: 192.168.10.2 → 10.0.0.5, TTL=64, Proto=TCP, SPort=52331, DPort=443, SN=${sn}`;\n    return `CTX-${sn % 16} (compressed, 2 bytes)`;\n  }\n\n  function fullHeader(sn) {\n    return `IP: 192.168.10.2 → 10.0.0.5, TCP 52331→443, SN=${sn}`;\n  }\n\n  function resetState() {\n    state.expectedNext = 41;\n    state.buffer = new Map();\n    state.delivered = [];\n    state.step = 0;\n  }\n\n  function doStep() {\n    if (state.step >= state.arrivalOrder.length) {\n      stopTimer();\n      return;\n    }\n    const sn = state.arrivalOrder[state.step];\n    state.buffer.set(sn, { sn, received: Date.now() });\n    while (state.buffer.has(state.expectedNext)) {\n      const pkt = state.buffer.get(state.expectedNext);\n      state.buffer.delete(state.expectedNext);\n      state.delivered.push(pkt);\n      state.expectedNext += 1;\n    }\n    state.step += 1;\n    render();\n  }\n\n  function startTimer() {\n    stopTimer();\n    state.timer = window.setInterval(() => {\n      doStep();\n      if (state.step >= state.arrivalOrder.length) stopTimer();\n    }, 900);\n  }\n\n  function stopTimer() {\n    if (state.timer) {\n      window.clearInterval(state.timer);\n      state.timer = null;\n      state.running = false;\n    }\n  }\n\n  function render() {\n    const pending = Array.from(state.buffer.values()).sort((a, b) => a.sn - b.sn);\n    const arrived = state.arrivalOrder.slice(0, state.step);\n    const queue = state.arrivalOrder.slice(state.step);\n\n    root.innerHTML = `\n      <style>\n        .pdcp-demo h2 { margin:0; font-size:28px; }\n        .pdcp-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .pdcp-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .pdcp-card h3 { margin:0 0 6px; font-size:17px; color:#1d2c3f; }\n        .pdcp-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; padding:10px; background:#f7faff; border-radius:8px; min-height:56px; }\n        .pdcp-pkt {\n          min-width:52px; padding:10px 12px; border-radius:8px;\n          background:#fff; border:2px solid #cbd6e4; font-weight:900;\n          display:grid; gap:2px; text-align:center;\n          box-shadow:0 2px 6px rgba(20,33,47,.06);\n        }\n        .pdcp-pkt small { font-size:10px; color:#607083; font-weight:900; }\n        .pdcp-pkt.queue { background:#f1f5fa; opacity:.85; }\n        .pdcp-pkt.arrived { background:#fff6db; border-color:#d9991d; color:#8a4f03; }\n        .pdcp-pkt.buffer { background:#eef0ff; border-color:#6b43bd; color:#4f2a9c; }\n        .pdcp-pkt.delivered { background:#e4f8ec; border-color:#11865a; color:#0d6744; }\n        .pdcp-pkt.missing { background:#ffe8e8; border-color:#d94242; color:#a02828; }\n        .pdcp-arrow { text-align:center; color:#718198; font-size:22px; font-weight:900; margin:6px 0; }\n        .pdcp-ctrl { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; align-items:center; }\n        .pdcp-code { font-family:Consolas, monospace; font-size:12px; line-height:1.5; color:#8ff0ad; background:#101722; padding:10px 12px; border-radius:8px; margin-top:8px; max-height:160px; overflow:auto; }\n        .pdcp-code .plain { color:#fff2b0; }\n        .pdcp-code .cipher { color:#f2b3c9; }\n        .pdcp-code .hdr { color:#8fc7ff; }\n        .pdcp-metrics { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }\n        .pdcp-metrics span { padding:7px 10px; border-radius:7px; background:#eef3fa; font-weight:900; color:#26384b; font-size:13px; }\n        .pdcp-metrics span.ok { background:#e4f8ec; color:#0d6744; }\n        .pdcp-toggles { display:flex; flex-wrap:wrap; gap:12px; margin-top:6px; font-size:13px; font-weight:900; color:#35475d; }\n      </style>\n\n      <div class=\"vis-panel pdcp-demo\">\n        <section>\n          <h2>PDCP: Reordering + Deciphering + ROHC Restoration</h2>\n          <p class=\"hint\">HARQ and RLC retransmissions on the radio link can make PDCP PDUs arrive out of order or duplicated. PDCP uses a reordering buffer to restore SN order, deciphers using the security key and COUNT, and expands the ROHC header context.</p>\n        </section>\n\n        <section class=\"pdcp-card\">\n          <div class=\"vis-row\">\n            <button class=\"vis-button primary\" data-action=\"step\" type=\"button\">+ Process 1 PDU</button>\n            <button class=\"vis-button green\" data-action=\"run\" type=\"button\">${state.running ? \"⏸ Stop Auto\" : \"▶ Auto Run\"}</button>\n            <button class=\"vis-button\" data-action=\"reset\" type=\"button\">⟳ Reset</button>\n          </div>\n\n          <div class=\"pdcp-toggles\">\n            <label><input type=\"checkbox\" ${state.cipher ? \"checked\" : \"\"} data-toggle=\"cipher\"/> Show ciphering</label>\n            <label><input type=\"checkbox\" ${state.compression ? \"checked\" : \"\"} data-toggle=\"compression\"/> Show ROHC header compression</label>\n          </div>\n\n          <h3 style=\"margin-top:14px\">1. Radio Link: Arrival Order (SN)</h3>\n          <div class=\"pdcp-row\">\n            ${state.arrivalOrder.map((sn, i) => {\n              const cls = i < state.step ? \"arrived\" : \"queue\";\n              return `<div class=\"pdcp-pkt ${cls}\"><b>SN ${sn}</b><small>${cls === \"arrived\" ? \"Arrived\" : \"Waiting\"}</small></div>`;\n            }).join(\"\")}\n          </div>\n\n          <div class=\"pdcp-arrow\">↓ Reordering buffer (expected SN = ${state.expectedNext})</div>\n\n          <h3>2. PDUs Stored in Reordering Buffer</h3>\n          <div class=\"pdcp-row\">\n            ${pending.length === 0\n              ? `<small style=\"color:#607083;font-weight:900\">Buffer is empty</small>`\n              : pending.map((p) => `<div class=\"pdcp-pkt buffer\"><b>SN ${p.sn}</b><small>Waiting for order</small></div>`).join(\"\")}\n          </div>\n\n          <div class=\"pdcp-arrow\">↓ Release in SN order and forward to the next stage</div>\n\n          <h3>3. Reordering → Deciphering → ROHC Restoration</h3>\n          <div class=\"pdcp-row\">\n            ${state.delivered.map((p) => `<div class=\"pdcp-pkt delivered\"><b>SN ${p.sn}</b><small>IP Packet</small></div>`).join(\"\") || `<small style=\"color:#607083;font-weight:900\">No upper-layer delivery yet</small>`}\n          </div>\n\n          <div class=\"pdcp-code\">\n            ${state.delivered.map((p) => `<div><span class=\"cipher\">Ciphered: ${cipherOf(p.sn, \"Hi\")}</span>\\n<span class=\"hdr\">Compressed Hdr: ${compressedHeader(p.sn)}</span>\\n<span class=\"plain\">→ Deciphered + Expanded: ${fullHeader(p.sn)} | Payload: \"Hello SN=${p.sn}\"</span></div>`).join(\"\\n\\n\") || \"(No delivered IP packets yet)\"}\n          </div>\n\n          <div class=\"pdcp-metrics\">\n            <span>Next expected SN: ${state.expectedNext}</span>\n            <span>Buffer size: ${pending.length} / ${state.windowSize}</span>\n            <span class=\"ok\">Delivered upward: ${state.delivered.length}</span>\n            <span>Not arrived yet: ${queue.length}</span>\n          </div>\n        </section>\n      </div>\n    `;\n\n    root.querySelector('[data-action=\"step\"]')?.addEventListener(\"click\", doStep);\n    root.querySelector('[data-action=\"reset\"]')?.addEventListener(\"click\", () => {\n      resetState();\n      stopTimer();\n      render();\n    });\n    root.querySelector('[data-action=\"run\"]')?.addEventListener(\"click\", () => {\n      state.running = !state.running;\n      if (state.running) startTimer();\n      else stopTimer();\n      render();\n    });\n    root.querySelectorAll(\"[data-toggle]\").forEach((el) => {\n      el.addEventListener(\"change\", (e) => {\n        state[el.dataset.toggle] = e.target.checked;\n        render();\n      });\n    });\n  }\n\n  render();\n  return () => stopTimer();\n}\n", "O-CU/sdap_qos_mapping.js": "export const metadata = {\n  title: \"SDAP QoS Flow → DRB Mapping\",\n};\n\nexport function mount(root) {\n  const flows = [\n    { qfi: 1, fiveQi: 1, kind: \"voice\", label: \"VoNR voice\", latency: 100, gbr: true, color: \"#d94242\", pkts: [] },\n    { qfi: 2, fiveQi: 2, kind: \"video\", label: \"Real-time video\", latency: 150, gbr: true, color: \"#c86414\", pkts: [] },\n    { qfi: 5, fiveQi: 5, kind: \"ims\", label: \"IMS signaling\", latency: 100, gbr: false, color: \"#6b43bd\", pkts: [] },\n    { qfi: 7, fiveQi: 7, kind: \"video-ng\", label: \"Video streaming\", latency: 100, gbr: false, color: \"#245fd6\", pkts: [] },\n    { qfi: 9, fiveQi: 9, kind: \"web\", label: \"Web/file (Default)\", latency: 300, gbr: false, color: \"#11865a\", pkts: [] },\n  ];\n\n  const drbs = [\n    { id: \"DRB1\", label: \"DRB1 (GBR voice)\", accept: [1], color: \"#d94242\", queue: [] },\n    { id: \"DRB2\", label: \"DRB2 (GBR video)\", accept: [2], color: \"#c86414\", queue: [] },\n    { id: \"DRB3\", label: \"DRB3 (non-GBR real-time)\", accept: [5, 7], color: \"#6b43bd\", queue: [] },\n    { id: \"DRB4\", label: \"DRB4 (Default data)\", accept: [9], color: \"#11865a\", queue: [] },\n  ];\n\n  const state = {\n    running: false,\n    timer: null,\n    nextPktId: 1,\n    log: [],\n    spawnRate: 1,\n    selectedFlow: 1,\n  };\n\n  function spawnPacket(qfi) {\n    const flow = flows.find((f) => f.qfi === qfi);\n    if (!flow) return;\n    const pkt = { id: state.nextPktId++, qfi, color: flow.color, kind: flow.kind };\n    const drb = drbs.find((d) => d.accept.includes(qfi)) || drbs[drbs.length - 1];\n    drb.queue.unshift(pkt);\n    if (drb.queue.length > 8) drb.queue.pop();\n    state.log.unshift(`QFI ${qfi} (${flow.label}) → ${drb.id}: 5QI=${flow.fiveQi}, ${flow.gbr ? \"GBR\" : \"non-GBR\"}, max latency ${flow.latency}ms`);\n    state.log = state.log.slice(0, 8);\n  }\n\n  function tick() {\n    for (let i = 0; i < state.spawnRate; i += 1) {\n      const qfi = flows[Math.floor(Math.random() * flows.length)].qfi;\n      spawnPacket(qfi);\n    }\n    render();\n  }\n\n  function startTimer() {\n    stopTimer();\n    state.timer = window.setInterval(tick, 900);\n  }\n\n  function stopTimer() {\n    if (state.timer) {\n      window.clearInterval(state.timer);\n      state.timer = null;\n      state.running = false;\n    }\n  }\n\n  function render() {\n    root.innerHTML = `\n      <style>\n        .sdap-demo h2 { margin:0; font-size:28px; }\n        .sdap-demo .hint { color:var(--muted); font-weight:800; margin:6px 0 0; line-height:1.45; }\n        .sdap-card { border:1px solid var(--line); border-radius:8px; background:#fff; padding:14px; margin-top:12px; box-shadow:0 4px 12px rgba(20,33,47,.05); }\n        .sdap-card h3 { margin:0 0 6px; font-size:17px; color:#1d2c3f; }\n        .sdap-lanes { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:10px; align-items:start; }\n        @media (max-width: 760px) { .sdap-lanes { grid-template-columns:1fr; } }\n        .sdap-col h4 { margin:0 0 8px; font-size:14px; color:#35475d; }\n        .flow-row, .drb-row { display:grid; gap:8px; }\n        .flow-item {\n          padding:10px 12px; border-radius:8px; border:2px solid #d6dfec;\n          display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center;\n          background:#fff; cursor:pointer;\n          transition:transform 150ms ease, border-color 150ms ease;\n        }\n        .flow-item:hover { transform:translateY(-1px); }\n        .flow-item .dot { width:14px; height:14px; border-radius:50%; }\n        .flow-item b { font-size:13px; }\n        .flow-item small { font-size:11px; color:#607083; font-weight:900; }\n        .flow-item .badge { padding:3px 6px; border-radius:4px; background:#eef3fa; font-size:11px; font-weight:900; color:#35475d; }\n        .drb-item {\n          padding:10px 12px; border-radius:8px; border:2px solid;\n          display:grid; gap:8px; min-height:90px; background:#fbfdff;\n        }\n        .drb-item header { display:flex; justify-content:space-between; align-items:center; font-weight:900; font-size:13px; }\n        .drb-item .chips { display:flex; flex-wrap:wrap; gap:4px; min-height:24px; }\n        .drb-chip {\n          min-width:36px; height:24px; display:grid; place-items:center;\n          border-radius:4px; color:#fff; font-size:11px; font-weight:900;\n          animation:slideIn 260ms ease;\n        }\n        @keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }\n        .sdap-log {\n          margin-top:10px; padding:10px 12px; font-family:Consolas, monospace; font-size:12px;\n          background:#101722; color:#8ff0ad; border-radius:8px; min-height:100px; max-height:180px; overflow:auto;\n          line-height:1.55;\n        }\n        .sdap-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }\n        .sdap-controls { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:8px; margin-top:8px; }\n        .sdap-controls label { display:grid; gap:4px; font-weight:900; color:#35475d; font-size:12px; }\n      </style>\n\n      <div class=\"vis-panel sdap-demo\">\n        <section>\n          <h2>SDAP: Mapping QoS Flows to DRBs and Core Paths</h2>\n          <p class=\"hint\">The core network tags each IP traffic flow with a QFI (QoS Flow Identifier). SDAP references the matching 5QI requirements for latency, loss, and GBR, then classifies traffic into the right DRB (Data Radio Bearer).</p>\n        </section>\n\n        <section class=\"sdap-card\">\n          <div class=\"sdap-row\">\n            <button class=\"vis-button primary\" data-action=\"spawn\" type=\"button\">Inject 1 Packet from Selected Flow</button>\n            <button class=\"vis-button green\" data-action=\"run\" type=\"button\">${state.running ? \"⏸ Stop Auto Traffic\" : \"▶ Auto Traffic\"}</button>\n            <button class=\"vis-button\" data-action=\"clear\" type=\"button\">⟳ Clear Queues</button>\n          </div>\n          <div class=\"sdap-controls\">\n            <label>Manual injection flow:\n              <select data-control=\"selectedFlow\">\n                ${flows.map((f) => `<option value=\"${f.qfi}\" ${state.selectedFlow === f.qfi ? \"selected\" : \"\"}>QFI ${f.qfi} · ${f.label}</option>`).join(\"\")}\n              </select>\n            </label>\n            <label>Auto traffic rate: <b>${state.spawnRate} pkt/tick</b>\n              <input type=\"range\" min=\"1\" max=\"4\" step=\"1\" value=\"${state.spawnRate}\" data-control=\"spawnRate\"/>\n            </label>\n          </div>\n\n          <div class=\"sdap-lanes\">\n            <div class=\"sdap-col\">\n              <h4>QoS Flow (core network → gNB)</h4>\n              <div class=\"flow-row\">\n                ${flows.map((f) => `\n                  <div class=\"flow-item\" style=\"border-color:${f.color}\" data-spawn=\"${f.qfi}\">\n                    <span class=\"dot\" style=\"background:${f.color}\"></span>\n                    <div>\n                      <b>QFI ${f.qfi} · ${f.label}</b><br>\n                      <small>5QI ${f.fiveQi} · ${f.gbr ? \"GBR\" : \"non-GBR\"} · latency ≤ ${f.latency}ms</small>\n                    </div>\n                    <span class=\"badge\">→ ${(drbs.find((d) => d.accept.includes(f.qfi)) || drbs[drbs.length - 1]).id}</span>\n                  </div>\n                `).join(\"\")}\n              </div>\n            </div>\n\n            <div class=\"sdap-col\">\n              <h4>DRB (forwarded to RLC/MAC layers)</h4>\n              <div class=\"drb-row\">\n                ${drbs.map((d) => `\n                  <div class=\"drb-item\" style=\"border-color:${d.color}\">\n                    <header>\n                      <span style=\"color:${d.color}\">${d.label}</span>\n                      <small>Queued: ${d.queue.length}</small>\n                    </header>\n                    <div class=\"chips\">\n                      ${d.queue.map((p) => `<span class=\"drb-chip\" style=\"background:${p.color}\">Q${p.qfi}·#${p.id}</span>`).join(\"\")}\n                    </div>\n                  </div>\n                `).join(\"\")}\n              </div>\n            </div>\n          </div>\n\n          <div class=\"sdap-log\">${state.log.length === 0 ? \"(No logs yet)\" : state.log.join(\"\\n\")}</div>\n        </section>\n      </div>\n    `;\n\n    root.querySelectorAll(\"[data-spawn]\").forEach((el) => {\n      el.addEventListener(\"click\", () => {\n        state.selectedFlow = Number(el.dataset.spawn);\n        spawnPacket(state.selectedFlow);\n        render();\n      });\n    });\n    root.querySelector('[data-action=\"spawn\"]')?.addEventListener(\"click\", () => {\n      spawnPacket(state.selectedFlow);\n      render();\n    });\n    root.querySelector('[data-action=\"run\"]')?.addEventListener(\"click\", () => {\n      state.running = !state.running;\n      if (state.running) startTimer();\n      else stopTimer();\n      render();\n    });\n    root.querySelector('[data-action=\"clear\"]')?.addEventListener(\"click\", () => {\n      drbs.forEach((d) => { d.queue.length = 0; });\n      state.log = [];\n      render();\n    });\n    root.querySelectorAll(\"[data-control]\").forEach((el) => {\n      el.addEventListener(el.tagName === \"SELECT\" ? \"change\" : \"input\", (e) => {\n        const key = el.dataset.control;\n        state[key] = el.tagName === \"SELECT\" ? Number(e.target.value) : Number(e.target.value);\n        render();\n      });\n    });\n  }\n\n  render();\n  return () => stopTimer();\n}\n", "semcom/semcom_overview.js": "export const metadata = {\n  title: \"Semantic Communication Explorer\",\n};\n\nconst blocks = [\n  {\n    id: \"encoder\",\n    side: \"Tx\",\n    role: \"Meaning Extraction\",\n    title: \"sLLM Encoder\",\n    subtitle: \"Sentence/image → key tokens\",\n    accent: \"#6b43bd\",\n    file: \"semcom/semantic_encoder.js\",\n    brief: \"A small LLM extracts only meaning-bearing tokens from the original message. It compresses by concepts rather than sending every word as character-level bits.\",\n    feature: \"Conventional communication treats every bit equally, while the sLLM Encoder weights semantically important tokens and sharply reduces transmission bandwidth.\",\n    io: [\"Original sentence/image\", \"Token sequence\"],\n  },\n  {\n    id: \"vq\",\n    side: \"Tx\",\n    role: \"Digital Conversion\",\n    title: \"Vector Quantization\",\n    subtitle: \"Continuous embedding → codebook index\",\n    accent: \"#1a8a9d\",\n    file: \"semcom/vector_quantization.js\",\n    brief: \"Map an embedding vector to the index of the nearest codebook centroid so it becomes compatible with existing bit-based digital networks.\",\n    feature: \"VQ is a bridge layer that converts continuous AI vector output into discrete bitstreams that existing 5G/LTE modems can carry.\",\n    io: [\"Embedding vector\", \"Codebook index · bits\"],\n  },\n  {\n    id: \"world\",\n    side: \"Tx\",\n    role: \"Predictive Transmission\",\n    title: \"World Model\",\n    subtitle: \"Channel prediction + transmission strategy\",\n    accent: \"#c86414\",\n    file: \"semcom/world_model_channel.js\",\n    brief: \"Predict channel state, UE mobility, and interference to adjust modulation, code rate, and token priority in real time.\",\n    feature: \"It enables Unequal Error Protection: important semantic tokens use lower-order modulation and stronger FEC, while auxiliary tokens use more efficient modes.\",\n    io: [\"Channel feedback\", \"Modulation · code rate · token priority\"],\n  },\n  {\n    id: \"channel\",\n    side: \"Channel\",\n    role: \"Radio Channel\",\n    title: \"Existing RAN Pipeline\",\n    subtitle: \"FEC · modulation · channel · demodulation\",\n    accent: \"#245fd6\",\n    file: null,\n    brief: \"The data passes through the normal 5G NR uplink path: LDPC coding → QAM modulation → radio channel (fading/noise) → demodulation → descrambling.\",\n    feature: \"Semantic Communication is a hybrid structure that keeps the existing communication stack and adds a semantic layer on top.\",\n    io: [\"Bitstream\", \"Received bits (some errors)\"],\n  },\n  {\n    id: \"decoder\",\n    side: \"Rx\",\n    role: \"Intelligent Restoration\",\n    title: \"sLLM Decoder + KB\",\n    subtitle: \"Damaged bits → meaning inference\",\n    accent: \"#11865a\",\n    file: \"semcom/semantic_decoder.js\",\n    brief: \"Even if some received codebook indices are corrupted, the Knowledge Base uses context and semantic similarity to infer and restore the original tokens.\",\n    feature: \"In conventional communication, CRC FAIL means retransmission; the Semantic Decoder can still find the most plausible meaning in the KB from damaged bits.\",\n    io: [\"Noisy indices\", \"Restored meaning\"],\n  },\n  {\n    id: \"compare\",\n    side: \"Benchmark\",\n    role: \"Comparison Experiment\",\n    title: \"Bit-Com vs Sem-Com\",\n    subtitle: \"Compare both methods at the same SNR\",\n    accent: \"#c93e7a\",\n    file: \"semcom/semcom_vs_bitcom.js\",\n    brief: \"Compare conventional and semantic communication side by side using the same sentence and channel noise condition.\",\n    feature: \"BER measures only bit errors, while Semantic Similarity measures preserved meaning. The gap between these metrics is the key value of Sem-Com.\",\n    io: [\"Original message\", \"BER · Semantic Similarity\"],\n  },\n];\n\nexport function mount(root) {\n  let activeId = \"encoder\";\n  let cleanupSub = null;\n  let journeyTimer = null;\n  let journeyStage = 0;\n  let journeyPlaying = true;\n\n  const TOTAL_STAGES = 5;\n\n  function byId(id) {\n    return blocks.find((b) => b.id === id);\n  }\n\n  function startJourney() {\n    stopJourney();\n    journeyTimer = window.setInterval(() => {\n      journeyStage = (journeyStage + 1) % TOTAL_STAGES;\n      updateJourney();\n    }, 2200);\n  }\n\n  function stopJourney() {\n    if (journeyTimer) {\n      window.clearInterval(journeyTimer);\n      journeyTimer = null;\n    }\n  }\n\n  function setJourneyStage(n) {\n    journeyStage = ((n % TOTAL_STAGES) + TOTAL_STAGES) % TOTAL_STAGES;\n    updateJourney();\n  }\n\n  function updateJourney() {\n    const indicator = root.querySelector(\".journey-indicator\");\n    if (indicator) indicator.textContent = `Step ${journeyStage + 1} / ${TOTAL_STAGES}`;\n    root.querySelectorAll(\"[data-stage-col]\").forEach((el) => {\n      const s = Number(el.dataset.stageCol);\n      el.classList.toggle(\"active\", s === journeyStage);\n      el.classList.toggle(\"past\", s < journeyStage);\n    });\n    const playBtn = root.querySelector('[data-journey=\"play\"]');\n    if (playBtn) playBtn.textContent = journeyPlaying ? \"⏸ Auto\" : \"▶ Auto\";\n  }\n\n  async function loadSub() {\n    const sel = byId(activeId);\n    const panel = root.querySelector(\"#semMount\");\n    const title = root.querySelector(\"#semTitle\");\n    const meta = root.querySelector(\"#semMeta\");\n    const brief = root.querySelector(\"#semBrief\");\n    const feature = root.querySelector(\"#semFeature\");\n    const io = root.querySelector(\"#semIO\");\n\n    title.textContent = sel.title;\n    meta.textContent = `${sel.side} · ${sel.role} · ${sel.subtitle}`;\n    brief.textContent = sel.brief;\n    feature.textContent = sel.feature;\n    io.innerHTML = `<span>Input: ${sel.io[0]}</span><b>→</b><span>Output: ${sel.io[1]}</span>`;\n\n    if (typeof cleanupSub === \"function\") {\n      cleanupSub();\n      cleanupSub = null;\n    }\n\n    root.querySelectorAll(\"[data-block]\").forEach((el) => {\n      el.classList.toggle(\"active\", el.dataset.block === activeId);\n    });\n\n    if (!sel.file) {\n      panel.innerHTML = `\n        <div class=\"sub-placeholder\">\n          <strong>${sel.title}</strong>\n          <p>${sel.brief}</p>\n          <p style=\"color:var(--muted);font-size:13px\">This block uses the existing 5G NR uplink pipeline as-is. Detailed simulations are available in the Protocol Stack Explorer from <code>python main.py</code>.</p>\n        </div>\n      `;\n      return;\n    }\n    panel.innerHTML = '<div class=\"sub-loading\">Loading simulator.</div>';\n    try {\n      const module = await globalThis.__loadStandaloneModule(sel.file);\n      panel.innerHTML = \"\";\n      cleanupSub = module.mount(panel) || null;\n    } catch (error) {\n      panel.innerHTML = `<div class=\"sub-error\">Load failed<br>${error.message}</div>`;\n    }\n  }\n\n  function selectBlock(id) {\n    activeId = id;\n    loadSub();\n  }\n\n  function blockButton(block, index) {\n    return `\n      <button class=\"sem-block\" data-block=\"${block.id}\" style=\"--accent:${block.accent}\" type=\"button\">\n        <span class=\"sem-block-head\">\n          <span class=\"sem-step\">${index + 1}</span>\n          <span class=\"sem-side\">${block.side}</span>\n        </span>\n        <strong>${block.title}</strong>\n        <em>${block.subtitle}</em>\n        <div class=\"sem-role\">${block.role}</div>\n      </button>\n    `;\n  }\n\n  root.innerHTML = `\n    <style>\n      .sem-app { display:grid; gap:18px; }\n      .sem-header {\n        display:grid; grid-template-columns:minmax(0,1fr) auto; gap:18px; \">${journeyPlaying ? \"⏸ Auto\" : \"▶ Auto\"}</button>\n              </div>\n            </header>\n\n            <div class=\"journey-grid\">\n              <div data-stage-col=\"-1\" class=\"track-tag\" style=\"background:#fff;border:none;color:#607083;font-size:11px\">stage →</div>\n              <div data-stage-col=\"0\" class=\"jh\">1. Original</div>\n              <div data-stage-col=\"1\" class=\"jh\">2. Encoder</div>\n              <div data-stage-col=\"2\" class=\"jh\">3. Channel (Noise)</div>\n              <div data-stage-col=\"3\" class=\"jh\">4. Decoder</div>\n              <div data-stage-col=\"4\" class=\"jh\">5. Restored Result</div>\n\n              <!-- Bit-Com row -->\n              <div class=\"track-tag trad\">Traditional<br>Bit-Com</div>\n              <div data-stage-col=\"0\" class=\"cell\">\n                <div class=\"icon\">💬</div>\n                <div class=\"big\">\"A red apple is on the dining table\"</div>\n                <small>Plain text sentence</small>\n              </div>\n              <div data-stage-col=\"1\" class=\"cell\">\n                <div class=\"icon\">🔢</div>\n                <div class=\"mono\">11101010 10111001<br>10000000 10001011<br>11101000 10000010…</div>\n                <small>UTF-8 → <b>240 bits</b></small>\n              </div>\n              <div data-stage-col=\"2\" class=\"cell\">\n                <div class=\"icon\">📡🌊</div>\n                <div class=\"mono\">111<span class=\"flip\">1</span>1010 10111001<br>100000<span class=\"flip\">1</span>0 10001011<br>11<span class=\"flip\">0</span>01000 100000<span class=\"flip\">0</span>0…</div>\n                <small>BER ~1% → <b>4 bits flipped</b></small>\n              </div>\n              <div data-stage-col=\"3\" class=\"cell\">\n                <div class=\"icon\">🧮</div>\n                <div class=\"big\">Decode raw UTF-8</div>\n                <small>Broken bits → broken characters</small>\n              </div>\n              <div data-stage-col=\"4\" class=\"cell bad\">\n                <div class=\"icon\">❌</div>\n                <div class=\"big\">\"A r�d ap�le on the ta�le...\"</div>\n                <small>Broken characters → CRC FAIL → retransmission needed</small>\n              </div>\n\n              <!-- Sem-Com row -->\n              <div class=\"track-tag sem\">Semantic<br>Sem-Com</div>\n              <div data-stage-col=\"0\" class=\"cell\">\n                <div class=\"icon\">💬</div>\n                <div class=\"big\">\"A red apple is on the dining table\"</div>\n                <small>Same original message</small>\n              </div>\n              <div data-stage-col=\"1\" class=\"cell\">\n                <div class=\"icon\">🧠</div>\n                <div class=\"tok-row\">\n                  <span class=\"tok ok\">🍎 apple</span>\n                  <span class=\"tok ok\">red</span>\n                  <span class=\"tok ok\">table</span>\n                </div>\n                <small>sLLM key tokens → <b>30 bits</b> (8× compression)</small>\n              </div>\n              <div data-stage-col=\"2\" class=\"cell\">\n                <div class=\"icon\">📡🌊</div>\n                <div class=\"tok-row\">\n                  <span class=\"tok err\">🍐 pear</span>\n                  <span class=\"tok ok\">red</span>\n                  <span class=\"tok ok\">table</span>\n                </div>\n                <small>Only one token index is slightly flipped</small>\n              </div>\n              <div data-stage-col=\"3\" class=\"cell\">\n                <div class=\"icon\">📚</div>\n                <div class=\"big\">KB contextual inference</div>\n                <small>\"red + table\" → 'apple' fits 99% better than 'pear'</small>\n              </div>\n              <div data-stage-col=\"4\" class=\"cell good\">\n                <div class=\"icon\">✅</div>\n                <div class=\"tok-row\">\n                  <span class=\"tok recov\">🍎 apple</span>\n                  <span class=\" >\n            <div class=\"sem-thesis-card\">\n              <h4>③ Context-Awareness</h4>\n              <p>The World Model predicts the channel and adjusts modulation, code rate, and priority in real time, helping high mobility and dense urban scenarios.</p>\n            </div>\n          </div>\n        </article>\n\n        <aside class=\"sem-detail\" aria-label=\"Selected block detail\">\n          <header class=\"sem-detail-head\">\n            <small id=\"semMeta\"></small>\n            <h2 id=\"semTitle\"></h2>\n            <p id=\"semBrief\"></p>\n            <div class=\"sem-detail-feature\" id=\"semFeature\"></div>\n            <div class=\"sem-io\" id=\"semIO\"></div>\n          </header>\n          <section class=\"sem-sub\" id=\"semMount\"></section>\n        </aside>\n      </section>\n    </div>\n  `;\n\n  root.querySelectorAll(\"[data-block]\").forEach((btn) => {\n    btn.addEventListener(\"click\", () => selectBlock(btn.dataset.block));\n  });\n\n  root.querySelector('[data-journey=\"prev\"]')?.addEventListener(\"click\", () => {\n    journeyPlaying = false;\n    stopJourney();\n    setJourneyStage(journeyStage - 1);\n  });\n  root.querySelector('[data-journey=\"next\"]')?.addEventListener(\"click\", () => {\n    journeyPlaying = false;\n    stopJourney();\n    setJourneyStage(journeyStage + 1);\n  });\n  root.querySelector('[data-journey=\"play\"]')?.addEventListener(\"click\", () => {\n    journeyPlaying = !journeyPlaying;\n    if (journeyPlaying) startJourney();\n    else stopJourney();\n    updateJourney();\n  });\n\n  loadSub();\n  updateJourney();\n  if (journeyPlaying) startJourney();\n\n  return () => {\n    stopJourney();\n    if (typeof cleanupSub === \"function\") cleanupSub();\n  };\n}\n", "semcom/semantic_encoder.js": "export const metadata = {\n  title: \"sLLM Encoder: Meaning Extraction\",\n};\n\nexport function mount(root) {\n  const presets = [\n    \"I plan to eat pizza with friends near Gangnam Station tonight\",\n    \"A ripe red apple is in a basket on the dining table\",\n    \"The Seoul Line 2 northbound train will arrive in 10 minutes\",\n    \"Due to heavy rain, tomorrow morning's meeting will be held online\",\n  ];\n\n  const stopwords = new Set([\"a\", \"an\", \"the\", \"is\", \"are\", \"to\", \"with\", \"near\", \"on\", \"in\", \"of\", \"and\", \"will\", \"be\", \"due\"]);\n\n  const importanceMap = {\n    \"tonight\": 0.9, \"Gangnam\": 0.95, \"Station\": 0.9, \"friends\": 0.8, \"pizza\": 0.95, \"eat\": 0.85,\n    \"red\": 0.7, \"ripe\": 0.65, \"apple\": 0.95, \"basket\": 0.7, \"dining\": 0.6, \"table\": 0.6,\n    \"Seoul\": 0.75, \"Line\": 0.8, \"2\": 0.8, \"northbound\": 0.85, \"train\": 0.9, \"10\": 0.85, \"minutes\": 0.8, \"arrive\": 0.8,\n    \"heavy rain\": 0.95, \"tomorrow\": 0.9, \"morning\": 0.75, \"meeting\": 0.9, \"online\": 0.95,\n    \"near\": 0.4, \"plan\": 0.5, \"held\": 0.5, \"because\": 0.3, \"online\": 0.95,\n  };\n\n  const state = {\n    text: presets[0],\n    topK: 5,\n    showEmbedding: true,\n  };\n\n  function tokenize(text) {\n    const words = text.split(/\\s+/).filter(Boolean);\n    return words.map((w) => {\n      const core = w.replace(/[.,!?]/g, \"\");\n      const imp = importanceMap[core] ?? (stopwords.has(core) ? 0.1 : 0.4);\n      return { word: w, core, importance: imp, isStop: stopwords.has(core) };\n    });\n  }\n\n  function pseudoEmbedding(token, idx) {\n    let h1 = 0;\n    let h2 = 0;\n    for (let i = 0; i < token.core.length; i += 1) {\n      h1 = (h1 * 31 + token.core.charCodeAt(i)) % 997;\n      h2 = (h2 * 17 + token.core.charCodeAt(i) * 3) % 991;\n    }\n    const angle = (h1 / 997) * 2 * Math.PI + idx * 0.03;\n    const radius = 0.3 + token.importance * 0.6 + (h2 / 991) * 0.05;\n    return { x: radius * Math.cos(angle), y: radius * Math.sin(angle) };\n  }\n\n  function render() {\n    const tokens = tokenize(state.text);\n    const sorted = [...tokens].sort((a, b) => b.importance - a.importance);\n    const topTokens = sorted.slice(0,
